  quasi_stellar_marker_star_open_DESC:0 "$name_quasistellar$将经由该虫洞发射。"
  quasi_stellar_marker_planet:0 "天陨标记"
  quasi_stellar_marker_planet_DESC:0 "一个指定类星天陨不幸目标的虚拟标记。"
  quasi_stellar_marker_planet_MEGASTRUCTURE_DETAILS:0 "在一颗行星上放置类星天陨的目标标记。"
