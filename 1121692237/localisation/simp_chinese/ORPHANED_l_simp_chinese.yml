  district_giga_birch_physma_relay_desc:0 "来自中央意识的信号在这个巨大的信号处理中心在被传输前清理过滤掉噪音。"
  mod_district_giga_birch_physma_relay_max:0 "最大$district_giga_birch_physma_relay_plural$"
  district_giga_birch_physma_sanctuary:0 "有机庇护所"
  district_giga_birch_physma_sanctuary_plural:0 "有机庇护所"
  district_giga_birch_physma_sanctuary_desc:0 "宽敞的生活区，有机体可以以愉快、充实和——最重要的——可控的方式生活。"
  mod_district_giga_birch_physma_sanctuary_max:0 "最大$district_giga_birch_physma_sanctuary_plural$"
  mod_district_giga_origin_birch_lab_max:0 "最大$district_giga_origin_birch_lab_plural$"
  job_giga_birch_orykta_manager_effect_desc:0 "£job_giga_birch_orykta_manager£$job_giga_birch_orykta_manager_plural$将£consumer_goods£§Y$consumer_goods$§!转化为£physics_research£·£engineering_research£§Y研究点数§!并提高£job_technician£$job_technician_plural$和£job_miner£$job_miner_plural$的$giga_r_energy$$giga_r_minerals$§Y产出§!。"
  job_giga_birch_orykta_manager_drone_effect_desc:0 "£job_giga_birch_orykta_manager_drone£$job_giga_birch_orykta_manager_drone_plural$将£energy£§Y$energy$§!转化为£physics_research£·£engineering_research£§Y研究点数§!并提高£job_technician_drone£$job_technician_drone_plural$和£job_mining_drone£$job_mining_drone_plural$的$giga_r_energy$$giga_r_minerals$§Y产出§!。"
  job_giga_birch_ktisma_manager_effect_desc:0 "£job_giga_birch_ktisma_manager£$job_giga_birch_ktisma_manager_plural$将£consumer_goods£§Y$consumer_goods$§!转化为£engineering_research£§Y研究点数§!，加快£mod_planet_building_build_speed_mult£§Y$MOD_PLANET_BUILDING_BUILD_SPEED_MULT$§!并提高£job_foundry£[owner.GetAlloyProducerPlural]和[owner.GetArtisanIcon][owner.GetArtisanPlural]的$giga_r_alloys$$giga_r_cgs$§Y产出§!。"
