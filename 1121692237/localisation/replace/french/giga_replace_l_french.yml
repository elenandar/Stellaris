l_french:
  
  dyson_sphere_0:0 "$gc_mega$Site de Sphère de Dyson"
  dyson_sphere_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_basic_resource_production$\nExploite la totalité de la production énergétique d'une §Yétoile§! pour obtenir de l'§Yénergie§! £energy£ - $giga_list_scales_with_star_size$\n$giga_list_freezes_system$\n§LUne $dyson_sphere_5$ enveloppe entièrement une étoile donnée, convertissant toute sa production solaire directement en énergie.§!" #gigalistentry DYSON SPHERE
  
  ring_world_1:0 "$gc_mega$Site de Monde-anneau"
  ring_world_1_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_habitable_mega$\nCrée §Y4§! grands §Ysegments§! de type §YGaïa§!.$giga_list_removes_system_planets$\n§LUn $pc_ringworld_habitable$ permet d'accueillir plusieurs vastes zones planétaires dans un seul système." #gigalistentry RINGWORLD
  
  add_research_options_galactic_wonders_utopia:0 "Options de recherche débloquées :\n£engineering_research£§Y$tech_ring_world$§!\n£physics_research£§Y$tech_dyson_sphere$§!\n\nOptions de recherche nécessitant ceci :\n£physics_research£§Y$giga_tech_fusion_suppressor$§!\n£physics_research£§Y$giga_tech_penrose_sphere_2$§!\n£physics_research£§Y$giga_tech_ringworld_titanic_1$§!\n£society_research£§Y$giga_tech_planetary_computer$§!\n£engineering_research£§Y$giga_tech_star_lifter$§!\n£engineering_research£§Y$giga_tech_neutronium_gigaforge$§!\n£engineering_research£§Y$giga_tech_penrose_sphere_3$§!\n£engineering_research£§Y$giga_tech_ringworld_upgrade$§!\n£engineering_research£§Y$giga_tech_ringworld_titanic_2$§!\n£engineering_research£§Y$giga_tech_interstellar_ringworld$§!\n£engineering_research£§Y$giga_tech_war_moon_2$§!\n£engineering_research£§Y$tech_sm_megastructure$§!\n\nAvantages d'ascension nécessitant ceci :\n§Y$ap_gigastructural_constructs$§!"
  
  add_research_options_galactic_wonders_utopia_megacorp:0 "Options de recherche débloquées :\n£engineering_research£§Y$tech_ring_world$§!\n£physics_research£§Y$tech_matter_decompressor$§!\n£physics_research£§Y$tech_dyson_sphere$§!\n\nOptions de recherche nécessitant ceci :\n£physics_research£§Y$giga_tech_fusion_suppressor$§!\n£physics_research£§Y$giga_tech_penrose_sphere_2$§!\n£physics_research£§Y$giga_tech_ringworld_titanic_1$§!\n£society_research£§Y$giga_tech_planetary_computer$§!\n£engineering_research£§Y$giga_tech_star_lifter$§!\n£engineering_research£§Y$giga_tech_neutronium_gigaforge$§!\n£engineering_research£§Y$giga_tech_penrose_sphere_3$§!\n£engineering_research£§Y$giga_tech_ringworld_upgrade$§!\n£engineering_research£§Y$giga_tech_ringworld_titanic_2$§!\n£engineering_research£§Y$giga_tech_interstellar_ringworld$§!\n£engineering_research£§Y$giga_tech_war_moon_2$§!\n£engineering_research£§Y$tech_sm_megastructure$§!\n\nAvantages d'ascension nécessitant ceci :\n§Y$ap_gigastructural_constructs$§!"
  
  ap_master_builders_desc:0 "La construction d'une mégastructure exige une quantité sans précédent de ressources et de planification. Nous repoussons les frontières de la macro-ingénierie.\n\nAvantages d'ascension nécessitant ceci :\n§Y$ap_vast_expanses$§!"
  
  transcendence_tooltip:0 "Options de recherche nécessitant ceci :\n£society_research£§Y$giga_tech_psychic_hypersiphon_1$§!\n\nTous les membres de notre espèce libéreront leur plein potentiel psionique."
  
  ap_voidborn_desc:0 "Le vide, autrefois perçu comme une barrière froide et insurmontable, est devenu pour nous une seconde patrie. Nous nous sommes adaptés à l'habitation permanente dans les profondeurs de l'espace, réduisant nos besoins en infrastructures et libérant davantage d'espace sur nos habitats pour d'autres fonctions.\n\nOptions de recherche nécessitant ceci :\n£engineering_research£§Y$giga_tech_interstellar_habitat$§!"
  
  enable_colossus_project:0 "Lance le projet spécial : Projet Colosse\n\nAvantages d'ascension nécessitant ceci :\n§Y$ap_vast_expanses$§!\n\n"
  
  # Overwrite Unyielding Traditions text to show Maginot World
  tr_unyielding_finish_desc:0 "\n§EDébloque une mégastructure unique :§! §RLe $name_maginot$§!\nOptions de recherche nécessitant ceci :\n£society_research£§Y$giga_tech_maginot_world$§!\n\n$MOD_STARBASE_DEFENSE_PLATFORM_CAPACITY_MULT$ §G+50 %§!\n$mod_starbases_upkeep_mult$ §G-20 %§!\nDonne accès au type de fédération §Y$military_federation$§!.\nAvantages d'ascension débloqués : §G+1§!"
  tr_unyielding_federations_finish_desc:0 "\n§EDébloque une mégastructure unique :§! §RLe $name_maginot$§!\nOptions de recherche nécessitant ceci :\n£society_research£§Y$giga_tech_maginot_world$§!\n\n$MOD_STARBASE_DEFENSE_PLATFORM_CAPACITY_MULT$ §G+50 %§!\n$mod_starbases_upkeep_mult$ §G-20 %§!\nDonne accès au type de fédération §Y$military_federation$§!.\nAvantages d'ascension débloqués : §G+1§!"
  
  #NEW MEGAS FOR THE LIST
  gateway_0:0 "$gc_kilo$Portail"
  gateway_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_transportation$\nPermet le §Yvoyage instantané§! vers tous les autres §Yportails§!\n§LLe portail est un élément crucial du réseau de transport galactique de tout empire interstellaire et peut considérablement réduire les temps de trajet s'il est correctement positionné.§!" #gigalistentry GATEWAY
  
  gateway_final:0 "$gc_kilo$Portail"
  gateway_final_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_transportation$\nPermet le §Yvoyage instantané§! vers tous les autres §Yportails§!\n§LLe portail est un élément crucial du réseau de transport galactique de tout empire interstellaire et peut considérablement réduire les temps de trajet s'il est correctement positionné.§!" #gigalistentry GATEWAY
  
  habitat_central_complex:0 "$gc_kilo$Complexe central d'habitat"
  habitat_central_complex_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_mega$\nCrée un §Yhabitat§! artificiel qui peut être agrandi en construisant des §Yorbitaux§! supplémentaires\n§LUn $habitat_complex$ est un ensemble de stations autosuffisantes conçues pour une habitation permanente. Des stations satellites supplémentaires permettent l'exploitation d'un système solaire entier.§!" #gigalistentry HABITAT
  
  major_orbital:0 "$gc_kilo$Orbital majeur d'habitat"
  major_orbital_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_upgrade$\nFournit £district£ §Y$MOD_PLANET_MAX_DISTRICTS_ADD$§!, des §Ydistricts de ressources§!, et £building£ §Y$MOD_PLANET_MAX_BUILDINGS_ADD$§! à un §Y$habitat_complex$§!\n§LUn grand orbital de base conçu pour fournir des quartiers d'habitation et de travail supplémentaires à la population du complexe d'habitat local.§!"
  
  minor_orbital:0 "$gc_kilo$Orbital mineur d'habitat"
  minor_orbital_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_habitable_upgrade$\nFournit des §Ydistricts de ressources§! et £building£ §Y$MOD_PLANET_MAX_BUILDINGS_ADD$§! à un §Y$habitat_complex$§!\n§LUn petit orbital de base conçu pour fournir des quartiers d'habitation et de travail supplémentaires à la population du complexe d'habitat local.§!"
  
  interstellar_assembly_0:0 "$gc_mega$Site d'Assemblée interstellaire"
  interstellar_assembly_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\nAugmente le §Ypoids diplomatique§! et le §Ynombre d'émissaires§!\n§LL'Assemblée interstellaire est un lieu de rencontre pour les puissances galactiques, augmentant l'attraction migratoire et l'opinion globale à notre égard.§!" #gigalistentry INTERSTELLAR ASSEMBLY
  
  mega_art_installation_0:0 "$gc_mega$Site de Méga-artistique"
  mega_art_installation_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\nFournit de l'§Yunité§! £unity£ et des §Yagréments§!\n§LPhare artistique à l'échelle stellaire, cette installation inspire et représente l'esprit de ses créateurs.§!" #megalistentry MEGAART
  
  mega_shipyard_0:0 "$gc_mega$Site de Méga-chantier"
  mega_shipyard_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_ship_production$ §H(20 chantiers navals)§!\nAssemble des §Yvaisseaux§! et augmente la §Yvitesse de construction navale§!\n§LUne base stellaire massive entièrement dédiée à la construction navale, le $mega_shipyard_3$ dispose de 20 postes de production pour construire ou améliorer des vaisseaux.§!" #megalistentry MEGASHIPYARD
  
  matter_decompressor_0:0 "$gc_mega$Site de Décompresseur de matière"
  matter_decompressor_0_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ $giga_list_category_megastructure$ - $giga_list_category_basic_resource_production$\nExploite un §Ytrou noir§! pour obtenir des §Yminéraux§! £minerals£\n§LLe $matter_decompressor_4$ concentre la gravité d'un trou noir, formant une foreuse de forces gravitationnelles pour extraire des minéraux de la singularité.§!" #megalistentry MATTER DECOMPRESSOR
  
  think_tank_0:0 "$gc_mega$Site de Nexus scientifique"
  think_tank_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_science_production$\nProduit de la §Yrecherche§! £physics_research£ £society_research£ £engineering_research£ et augmente la §Yvitesse de recherche§! de §Y15 %§!\n§LLes laboratoires de recherche et les banques de données d'un $think_tank_3$ génèrent un flux immense de science brute et concentrée.§!" #megalistentry SCIENCE NEXUS
  
  spy_orb_0:0 "$gc_mega$Site de Réseau de sentinelles"
  spy_orb_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\nOctroie une §Yportée de capteurs§! sur la §Ygalaxie entière§!\n§LLes étapes du $spy_orb_4$ étendent progressivement la portée des capteurs, couvrant finalement la galaxie entière.§!"
  #megalistentry SENTRY ARRAY
  
  strategic_coordination_center_0:0 "$gc_mega$Site de Centre de coordination stratégique"
  strategic_coordination_center_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_military$\nAugmente la §Ycapacité navale§!, la §Yvitesse des vaisseaux§!, la §Ycapacité de bases stellaires§! et la §Ycapacité de plateformes§!\n§LUne installation synchronisant le réseau national de bases stellaires, renforçant les capacités défensives et offensives.§!" #megalistentry STRATEGIC COORDINATION CENTER
  
  orbital_ring:0 "$gc_kilo$Anneau orbital"
  orbital_ring_tier_1_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_miscellaneous$\nFournit des capacités supplémentaires de §Yspécialisation§! et de §Ydéfense§! à sa §Yplanète§!\n§LUn §Y$orbital_ring_tier_1$§! est une variante de base stellaire formant une bande encerclant la planète.§!" #megalistentry ORBITAL RING
  
  orbital_ring_tier_1_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - Les anneaux orbitaux peuvent fournir des avantages défensifs à la planète, offrant une plateforme pour de nombreux modules et bâtiments de base stellaire, ainsi que des modules d'habitation et des installations de production orbitales."
  
  quantum_catapult_0:0 "$gc_mega$Site de Catapulte quantique"
  quantum_catapult_0_MEGASTRUCTURE_DETAILS:0 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_transportation$\nPropulse des §Yflottes§! à travers la galaxie avec une §Yprécision limitée§!\n§LUn dispositif qui concentre les forces d'une étoile à neutrons ou d'un pulsar afin de tordre l'espace et de projeter une flotte sur de grandes distances.§!" #megalistentry QUANTUM CATAPULT
  
  quantum_catapult_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - Les premières versions de la catapulte quantique peuvent faire arriver les flottes dans des systèmes §Hen dehors§! de leur destination prévue. Ce « §Yrayon de dispersion§! » peut être réduit avec les améliorations suivantes."
  
  hyper_relay:0 "$gc_kilo$Relais hyperspatial"
  hyper_relay_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_transportation$\nRéduit considérablement le §Ytemps de transit§! s'il est construit en §Ychaîne§! à travers §Yplusieurs systèmes§!\n§LBien qu'inutile seul, plusieurs relais permettent des temps de transit nettement plus rapides entre systèmes adjacents.§!" #megalistentry HYPER RELAY
  
  
  orbital_arc_furnace_1:0 "$gc_kilo$$orbital_arc_furnace_4$ : Ceinture équatoriale"
  orbital_arc_furnace_1_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_advanced_resource_production$\nExploitant la puissance brute d'une planète en fusion, le §Y$orbital_arc_furnace_4$§! débloque des minéraux autrement inaccessibles et améliore les opérations minières à l'échelle du système.\n§LUn dispositif permettant de transformer de grands systèmes en puissances productives.§!"
  
  dyson_swarm_1:0 "$gc_kilo$$dyson_swarm_3$ : Réseau"
  dyson_swarm_1_MEGASTRUCTURE_DETAILS:0 "£gigastructural£ £megaupgrade£ $giga_list_category_kilostructure$ - $giga_list_category_basic_resource_production$\nUn réseau de satellites interconnectés, l'§Y$dyson_swarm_3$§! est conçu pour améliorer le rendement des gisements stellaires.\n§LUn §Y$dyson_swarm_3$§! est une étape vers la puissance brute de la §Y$dyson_sphere_5$§!."
  
  dyson_swarm_1_DESC:0 "Un réseau de satellites interconnectés, l'§Y$dyson_swarm_3$§! est conçu pour améliorer le rendement des gisements stellaires."
  
  dyson_swarm_2_DESC:0 "Un réseau de satellites interconnectés, l'§Y$dyson_swarm_3$§! est conçu pour améliorer le rendement des gisements stellaires."
  
  dyson_swarm_3_DESC:0 "Un réseau de satellites interconnectés, l'§Y$dyson_swarm_3$§! est conçu pour améliorer le rendement des gisements stellaires."
  
  cosmogenesis_world_0:0 "$gc_crisis$$pc_cosmogenesis_world$"
  cosmogenesis_world_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_science_production$\nUn colossal ordinateur-réservoir qui consomme effectivement des pops pour générer de la §Yrecherche§! et de la §Ylogique avancée§!. L'efficacité — et le taux d'épuisement — augmentent avec la population.\n§LPour extraire un sens des entrailles de la réalité, il faut une nouvelle forme de science...§!"
  
  cosmogenesis_needle:0 "$gc_crisis$$NAME_Cosmogenesis_Sphere$"
  cosmogenesis_needle_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_crisis$ - $giga_list_category_special$\nPour accéder à une réalité de notre propre création, nous devons embarquer notre civilisation entière à bord de l'Aiguille de l'Horizon avant de quitter cet univers pour de bon.\n§LUne violation manifeste des lois de l'univers.§!"
  
  crisis_sphere_0:99 "$gc_crisis$Aetherophasic Engine Frame"
  crisis_sphere_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_crisis$ - $giga_list_category_special$\n$crisis_sphere_0_DESC$\n§LOur minds will no longer be limited by the physical constraints of our feeble bodies, and reality itself shall be at our mercy. Truly, there can be no higher plane of existence.§!"
  
  galactic_crucible_0:99 "$gc_crisis$Galactic Crucible Frame"
  galactic_crucible_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_crisis$ - $giga_list_category_special$\nThis vast station siphons energy from its host star, powering automated shipyards that produce §Y$entropy_conduit_plural$§!; vessels capable of reshaping stellar destinies.\n§L$galactic_crucible_0_DESC$§!"
  
  grand_archive_0:0 "$gc_kilo$$grand_archive$"
  grand_archive_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_miscellaneous$\nPréserve et expose les artefacts les plus précieux que nous avons collectés à travers la galaxie.\n§LUne structure orbitale dédiée conçue pour abriter et exposer les spécimens remarquables que nous avons collectés à travers la galaxie, y compris la faune spatiale vivante.§!"
  
  deep_space_citadel_0:0 "$gc_kilo$$tech_deep_space_citadel$"
  deep_space_citadel_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_defensive$\nUne §Y$deep_space_citadel_0$§! est une base stellaire blindée conçue pour une défense maximale au sein d'un puits gravitationnel stellaire.\n§L$deep_space_citadel_0_DESC$§!"
  
  shroud_seal:0 "$SHROUD_SEAL$"
  shroud_seal_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_psionics$\nLe §Y$SHROUD_SEAL$§! atténue les §Y$PSIONIC_AURA_PLURAL$§! à proximité. L'§Y$PSIONIC_AURA$§! dans ce système décroît de $@shroud_seal_decrease|0$ en intensité, et de -1 dans les systèmes adjacents.\n§L$shroud_seal_DESC$§!"
  
  behemoth_egg:0 "OEuf de Béhémoth"
  behemoth_egg_DESC:0 "Un vaisseau organique géant portant un §YBéhémoth§! en gestation."
  behemoth_egg_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_psionics$\nCette structure soutient le développement des §Yoeufs de Béhémoth§!.\n§L$behemoth_egg_DESC$§!"
  
  # Concept Override
  # added alderson trait
  concept_automodding_hab_preference_desc:0 "Standard :\n- ['trait:trait_auto_dry_preference']\n- ['trait:trait_auto_wet_preference']\n- ['trait:trait_auto_cold_preference']\n\nSpécial :\n- ['trait:trait_auto_pc_nuked_preference']\n- ['trait:trait_auto_pc_gaia_preference']\n- ['trait:trait_auto_pc_hive_preference']\n\nArtificiel :\n- ['trait:trait_auto_pc_city_preference']\n- ['trait:trait_auto_pc_relic_preference']\n- ['trait:trait_auto_pc_habitat_preference']\n- ['trait:trait_auto_pc_ringworld_habitable_preference']\n- ['trait:trait_auto_pc_cosmogenesis_world_preference']\n- ['trait:trait_auto_pc_alderson_slice_preference']"