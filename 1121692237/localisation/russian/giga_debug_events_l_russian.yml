  giga_log.500.title:99 "Дополнительный журнал данных"
  giga_log.500.desc:99 "Спасибо за то, что играете в Gigastructural Engineering & More!\n\nРаньше мы вносили изменения на основе отзывов игроков. Продолжая развивать мод наилучшим образом, мы решили, что сбор данных от игроков окажется бесценным при принятии решений о балансировке.\n\nЕсли хотите, вы можете помочь нам, включив функцию записи журнала для отслеживания состояния вашей галактики во время игры с Гигаструктурами. По окончании сессии вы можете загрузить файл game.log и список модов в опрос по ссылке <SOMEWHERE>. Вероятно, ведение журнала добавит небольшую задержку в начале каждого игрового года. Приносим извинения за неудобства.\n\n§HВНИМАНИЕ§!: Из-за особенностей работы файлов журналов каждый раз при открытии Stellaris ваш файл журнала очищается. Вы не сможете отправить или просмотреть журнал предыдущей сессии.\n\n§LГигаструктуры, как и любые моды для Stellaris, не имеют возможности хранить ваши данные и отправлять телеметрию куда-либо. Единственные данные, которые передаются разработчикам Гигаструктур, — это те, что вы добровольно предоставляете. Файлы журналов Stellaris не содержат персональных данных, если только вы сами их не укажете.§!"
  giga_log.500.a:99 "Да, я хочу включить журналирование."
  giga_log.500.b:99 "Нет, я не хочу включать журналирование."
  
  
