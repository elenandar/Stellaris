l_russian:
  
  giga_gas_giant_home_system_NAME:0 "Мир на газовом гиганте"
  giga_gas_giant_home_system_DESC:0 "Начните с обитаемого газового гиганта с разрушенным родным миром."
  origin_gas_giant:0 "Возвышение газового гиганта"
  origin_gas_giant_desc:0 "Этот вид потерял свой родной мир в раннюю космическую эру, когда в него врезалась гигантская комета. К счастью, они уже обладали достаточной космической инфраструктурой, чтобы избежать полного исчезновения. И газовый гигант с необычайно спокойной атмосферой, который они использовали для добычи топлива, стал их основной колонией."
  origin_gas_giant_robot:0 "Взлёт с газового гиганта"
  origin_gas_giant_robot_desc:0 "В ранний космический век эта империя потеряла свой родной мир, когда в него врезалась случайная комета. Уже имея достаточную инфраструктуру в космосе для временного выживания, горнодобывающая станция на газовом гиганте стала их новым домом. За прошедшие годы газовый гигант удовлетворял их потребности многократно, давая новые знания о различных газах в галактике. Благодаря изобилию экзотических газов в период их развития, с использованием этих газов были усовершенствованы промышленные технологии, хотя и с зависимостью от этих газов даже в самой базовой промышленности."
  
  origin_gas_giant_effects:0 "Начните на $pc_habitable_gas_giant$ с уничтоженым изначальным родным миром.\n- Получите доступ к технологиям £engineering_research£ §L$tech_space_mining_1$§!.\n- Получите доступ к технологиям £society_research£ §L$tech_hydroponics$§!, если в империи есть биологическое население."
  origin_gas_giant_effects_robot:0 "- $HOMEWORLD$ ['concept_giga_habitable_gas_giant'] (Размер: £planetsize£ 16-28)$NEW_LINE$- Черта вида:$TABBED_NEW_LINE$- ['trait:trait_giga_gas_giant_hab_robot']$NEW_LINE$- $ADDITONAL_TECHNOLOGIES_STRING$ ['technology:tech_space_mining_1', £engineering_research£ $tech_space_mining_1$]"
  
  concept_giga_habitable_gas_giant:0 "$pc_habitable_gas_giant$"
  concept_giga_habitable_gas_giant_desc:0 "$pc_habitable_gas_giant_desc$"
  
  concept_giga_gas_worlds:0 "Газовый мир"
  concept_giga_gas_worlds_desc:0 "Пригодные для жизни газовые гиганты, планеты с искусственно затопленной газом атмосферой и даже некоторые немного более пригодные для жизни токсичные миры классифицируются как «Газовые миры»."
  
  building_giga_gas_giant_habitation_module:0 "Жилой модуль газового гиганта"
  building_giga_gas_giant_habitation_module_desc:0 "Набор объектов, необходимых для содержания колонии на газовом гиганте, собранные коренным населением этой планеты. Эти объекты включают реакторы для обеспечения энергией колонии, док-станции для выгрузки минералов, собранных с местных лун, и большие ангары с климат-контролем, которые можно использовать для гидропонных ферм. В дополнение к этому, эти объекты служат штаб-квартирой для сети распределения ресурсов и предоставляют различные услуги местному населению."
  
  trait_giga_gas_giant_hab:0 "Зависящий от экзотических газов"
  trait_giga_gas_giant_hab_desc:0 "§LВ результате многовекового воздействия экзотических газов при жизни на газовом гиганте этот вид стал несколько зависимым от них в повседневной жизни.§!"
  trait_giga_gas_giant_hab_tooltip:0 "§YНаука§! и §YПромышленность§! — потребление экзотических газов в должностях: §R+0.03§!\n    - Потребление жилплощади на ['concept_giga_gas_worlds', §YГазовых§!] мирах: §G-10%§!\n    - Содержание £job_researcher£ $job_researcher$ на ['concept_giga_gas_worlds', §YГазовых§!] мирах: §G-10%§!\n    - Потребление экзотических газов в должностях на ['concept_giga_gas_worlds', §YГазовых§!] мирах: §G-33%§!\n    - Потребление жилплощади на не-['concept_giga_gas_worlds', §YГазовых§!] мирах: §R+30%§!\n    - Пригодность для жизни на не-['concept_giga_gas_worlds', §YГазовых§!] мирах: §R-20%§!\n    - Потребление экзотических газов в должностях на не-['concept_giga_gas_worlds', §YГазовых§!] мирах: §R+50%§!"
  trait_giga_gas_giant_hab_robot:0 "Питаемый экзотическими газами"
  trait_giga_gas_giant_hab_robot_desc:0 "§LНебольшие самомодификации со временем накопились до почти полной зависимости от экзотических газов для питания этих машин."
  trait_giga_gas_giant_hab_robot_tooltip:0 "$trait_giga_gas_giant_hab_tooltip$"
  
