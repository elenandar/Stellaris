l_russian:
  #############################################################################################################################################
  ### Orbital Elysium #########################################################################################################################
  #############################################################################################################################################
  
  mod_giga_elysium_host_stability_add:0 "Стабильность планеты-хоста Элизиума"
  mod_giga_elysium_host_jobs_produces_mult:0 "Производительность должностей планеты-хоста Элизиума"
  
  giga_elysium_host_planet:0 "Планета-хост $name_orb_elysium$"
  giga_elysium_host_planet_desc:0 "Управляемая сверху, эта планета в значительной мере оставлена в руках планетарных властей, тогда как их начальство наблюдает со станции на орбите."
  
  giga_elysium_origin_fix:0 "Исправление родного мира начала $name_orb_elysium$"
  giga_elysium_origin_fix_desc:0 "Если вы видите этот модификатор, что-то пошло не так!"
  
  giga_elysium_origin_build_speed:0 "Сборка начала $name_orb_elysium$"
  giga_elysium_origin_build_speed_desc:0 "Если вы можете прочитать этот модификатор, что-то пошло не так!"
  
  giga_elysium_no_host:0 "Недостаточная планетарная поддержка"
  giga_elysium_no_host_desc:0 "Без поддержки инфраструктуры на планете внизу жители этой станции испытывают трудности."
  
  giga_origin_no_elysium:0 "Отсутствие орбитального надзора"
  giga_origin_no_elysium_desc:0 "Без $name_orb_elysium$, чтобы направлять их свыше, жители этого мира дезорганизованы и неэффективны."
  
  giga_dismantle_elysium:0 "Демонтировать $name_orb_elysium$"
  giga_dismantle_elysium_desc:0 "Эта станция и удушающий контроль, который она обеспечивает, больше не соответствуют нашим потребностям."
  giga_dismantle_elysium_tooltip:0 "$name_orb_elysium$ будет §Rуничтожен§!."
  
  d_giga_elysium_buildings:0 "Инфраструктура планетарной поддержки"
  d_giga_elysium_buildings_desc:0 "§W$name_orb_elysium$ получает £building£ §YСлот здания§! за каждый открытый на планете-хосте.§!\n§W--------------§!\nДалеко не независимый от своей планеты-хоста, Элизиум значительно выигрывает от достаточной поддерживающей инфраструктуры."
  
  d_giga_elysium_origin_industry:0 "Заброшенная промышленная зона"
  d_giga_elysium_origin_industry_desc:0 "Пережитки бывшего периода промышленного развития, эти устаревшие производственные объекты теперь лишь стоят на пути прогресса."
  d_giga_elysium_origin_industry_effect:0 "Заменяет некоторые £job_foundry£ §Y[owner.GetAlloyProducer]§! и [owner.GetArtisanIcon] §Y[owner.GetArtisan]§! Должности на §Y[owner.GetClerkOrMaintenanceDrone]§! Должности, когда планета имеет §YПромышленное§!, §YЛитейное§! или §YЗаводское§! назначение."
  
  
  # blocker events
  
  giga_elysium.002.name:0 "Неконтролируемое промышленное расширение на [From.GetName]"
  giga_elysium.002.desc:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на рост безработицы наблюдается рост несанкционированной промышленной деятельности. Эта §Y$d_giga_elysium_cottage_industry$§! обещает работу ищущим её, но несёт в себе зловещие признаки организованной преступности.\n\nЕё присутствие на [From.GetName], скорее всего, окажет §Yнегативное влияние на планетарную стабильность§! и может потребовать государственного вмешательства."
  giga_elysium.002.desc.hive:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на длительный простой дронов местный управляющий кластер на поверхности приказал построить §Y$d_giga_elysium_cottage_industry$§!.\n\nХотя этот новый регион и обеспечит дополнительную занятость, его полуавтономный характер порождает девиантную деятельность, и в долгосрочной перспективе он, скорее всего, окажет §Yнегативное влияние на планетарную стабильность§!. Может потребоваться удаление."
  giga_elysium.002.desc.machine:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на длительный простой дронов полуавтономный структурный планировочный подразум на поверхности приказал построить §Y$d_giga_elysium_cottage_industry$§!.\n\nХотя этот новый регион и обеспечит дополнительную занятость, качество интеграции с централизованно планируемыми системами оставляет желать лучшего, и в долгосрочной перспективе он, скорее всего, окажет §Yнегативное влияние на планетарную стабильность§!. Может потребоваться удаление."
  
  MESSAGE_GIGA_ELYSIUM_COTTAGE_INDUSTRY_TITLE:0 "Неконтролируемое промышленное расширение"
  MESSAGE_GIGA_ELYSIUM_COTTAGE_INDUSTRY:0 "Высокая безработица на §Y$PLANET$§! в системе §Y$SYSTEM$§! привела к строительству §Y$d_giga_elysium_cottage_industry$§! для обеспечения работой."
  
  d_giga_elysium_cottage_industry:0 "Стихийная промышленная зона"
  d_giga_elysium_cottage_industry_desc:0 "Эти кустарные производства были построены праздным населением для обеспечения занятости."
  
  giga_elysium.004.name:0 "Неконтролируемое городское расширение на [From.GetName]"
  giga_elysium.004.desc:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на рост бездомности группа обездоленных колонистов построила §Y$d_giga_elysium_slums$§! на окраине крупного поселения.\n\nТрудно управляемые и ещё труднее патрулируемые, они, вероятно, станут прибежищем для организованной преступности. Таким образом, их присутствие на [From.GetName], скорее всего, окажет §Yнегативное влияние на планетарную стабильность§! и может потребовать вмешательства."
  giga_elysium.004.desc.hive:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на растущий уровень бездомности группа дронов, опираясь на инстинкт выживания, построила §Y$d_giga_elysium_slums$§! для укрытия.\n\nХотя этот новый район и обеспечит дополнительное жилое пространство, лабиринтоподобные трущобы уже становятся прибежищем для девиантных элементов планетарного населения и в долгосрочной перспективе, скорее всего, окажут §Yнегативное влияние на планетарную стабильность§!. Может потребоваться снос."
  giga_elysium.004.desc.machine:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на критическую нехватку мест базирования дронов полуавтономный структурный планировочный подразум на поверхности приказал построить §Y$d_giga_elysium_slums$§!.\n\nХотя этот новый район и обеспечит жильё для бездомных дронов, его лабиринтообразная структура уже становится прибежищем для коррумпированных элементов нашей сети и в долгосрочной перспективе, скорее всего, окажет §Yнегативное влияние на планетарную стабильность§!. Может потребоваться снос."
  
  MESSAGE_GIGA_ELYSIUM_SLUMS_TITLE:0 "Неконтролируемое городское расширение"
  MESSAGE_GIGA_ELYSIUM_SLUMS:0 "Высокая бездомность на §Y$PLANET$§! в системе §Y$SYSTEM$§! привела к строительству §Y$d_giga_elysium_slums$§! для предоставления жилья."
  
  d_giga_elysium_slums:0 "Стихийная жилая зона"
  d_giga_elysium_slums_desc:0 "Плохо спланированные и пронизанные девиантной деятельностью, эти трущобы обеспечивают столь необходимое жильё."
  
  giga_elysium.005.name:0 "Скот перемещён на [From.GetName]"
  giga_elysium.005.desc:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на рост бездомности среди наших §Y$LIVESTOCK$ Поп§! местные власти приказали построить §Y$d_giga_elysium_livestock_pens$§!.\n\nМенее контролируемые, чем наши стандартные объекты, жители получат менее структурированную жизнь и в долгосрочной перспективе, скорее всего, окажут §Yнегативное влияние на планетарную стабильность§!. Может потребоваться полная замена объекта."
  giga_elysium.005.desc.hive:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на рост бездомности среди наших §Y$LIVESTOCK$ Поп§! местный управляющий кластер на поверхности приказал построить §Y$d_giga_elysium_livestock_pens$§!.\n\nМенее контролируемые, чем наши стандартные объекты, жители получат менее структурированную жизнь и в долгосрочной перспективе, скорее всего, окажут §Yнегативное влияние на планетарную стабильность§!. Может потребоваться полная замена объекта."
  giga_elysium.005.desc.machine:0 "Наш командный центр на орбитальной станции Элизиум над §Y[From.GetName]§! сообщает, что в ответ на критическую нехватку мест хранения для наших §Y$slavery_matrix$ Поп§! полуавтономный структурный планировочный подразум на поверхности приказал построить §Y$d_giga_elysium_livestock_pens$§!.\n\nМенее контролируемые, чем наши стандартные объекты, они могут содержать неизвестные конструктивные недостатки и в долгосрочной перспективе, скорее всего, окажут §Yнегативное влияние на планетарную стабильность§!. Может потребоваться полная замена объекта."
  
  MESSAGE_GIGA_ELYSIUM_LIVESTOCK_PENS_TITLE:0 "Неконтролируемое перемещение скота"
  MESSAGE_GIGA_ELYSIUM_LIVESTOCK_PENS:0 "Бездомные £pop£ §YПопы§! скота на §Y$PLANET$§! в системе §Y$SYSTEM$§! были помещены в §Y$d_giga_elysium_livestock_pens$§! для предоставления жилья."
  
  d_giga_elysium_livestock_pens:0 "Стихийный загон для скота"
  d_giga_elysium_livestock_pens_desc:0 "Менее регламентированный, чем наши стандартные объекты, этот загон предоставляет нашим «гостям» дополнительные свободы. Пожалуй, слишком много."
  
  giga_elysium.006.name:0 "[From.GetName] выведен из эксплуатации"
  giga_elysium.006.desc:0 "Орбитальная станция Элизиум над [fromfrom.GetName] успешно демонтирована, что восстановило контроль над поверхностной администрацией.\n\nВсе оставшиеся жители были переселены на поверхность планеты, а остатки станции были сведены с орбиты."
  giga_elysium.006.desc.egal:0 "Орбитальная станция Элизиум над [fromfrom.GetName] успешно демонтирована, положив конец угнетательскому господству элит, бежавших туда.\n\nВсе оставшиеся жители были переселены на поверхность планеты, а остатки станции были сведены с орбиты."
  giga_elysium.006.desc.gestalt:0 "Орбитальная станция Элизиум над [fromfrom.GetName] успешно демонтирована, передав контроль наземным установкам.\n\nВсе оставшиеся дроны были переселены на поверхность планеты, а остатки станции были сведены с орбиты."
  
  giga_elysium.006.good:0 "Скатертью дорога."
  
  #########################################
  ### Elysium districts ###################
  #########################################
  
  district_giga_elysium_housing:0 "Жилой район"
  district_giga_elysium_housing_plural:0 "Жилые районы"
  district_giga_elysium_housing_desc:0 "Просторное жильё в окружении имитированной сельской местности с прямым доступом к высокоскоростной коммуникационной инфраструктуре."
  
  district_giga_elysium_control:0 "Планетарный центр управления"
  district_giga_elysium_control_plural:0 "Планетарные центры управления"
  district_giga_elysium_control_desc:0 "Нервный центр для планетарных операций, где смотрители обеспечивают соблюдение требований населением."
  
  district_giga_elysium_admin:0 "Административный район"
  district_giga_elysium_admin_plural:0 "Административные районы"
  district_giga_elysium_admin_desc:0 "Масштабный административный комплекс, управляющий коммуникациями для станции и её планеты-хоста."
  
  district_giga_elysium_science:0 "Исследовательский район"
  district_giga_elysium_science_plural:0 "Исследовательские районы"
  district_giga_elysium_science_desc:0 "Высокотехнологичные лаборатории, где наши лучшие умы могут работать без отвлечений."
  
  district_giga_elysium_entertainment:0 "Развлекательный район"
  district_giga_elysium_entertainment_plural:0 "Развлекательные районы"
  district_giga_elysium_entertainment_desc:0 "Центр производства вещательных СМИ, способный производить бесконечный поток контента для удовлетворения масс."
  
  #########################################
  ### Elysium buildings ###################
  #########################################
  
  building_giga_elysium_host_capital:0 "Планетарный центр управления Элизиума"
  building_giga_elysium_host_capital_plural:0 "Планетарный центр управления Элизиума"
  building_giga_elysium_host_capital_desc:0 "Место сосредоточения местной бюрократии, управляющей планетой от имени вышестоящих."
  
  building_giga_elysium_host_major_capital:0 "Планетарный командный комплекс Элизиума"
  building_giga_elysium_host_major_capital_plural:0 "Планетарные командные комплексы Элизиума"
  building_giga_elysium_host_major_capital_desc:0 "Крупный административный центр, выступающий посредником между местным населением и их начальством на орбите."
  
  giga_elysium_dystopian_stability_desc:0 "\n§H$civic_dystopian_society$:§! Дополнительно получает §Y50%§! £stability£ §YСтабильности§! от орбитального Элизиума"
  
  building_giga_elysium_host_hive_capital:0 "Планетарный синаптический узел Элизиума"
  building_giga_elysium_host_hive_capital_plural:0 "Планетарные синаптические узлы Элизиума"
  building_giga_elysium_host_hive_capital_desc:0 "Первичное синаптическое реле, через которое Улей управляет планетарными функциями."
  
  building_giga_elysium_host_hive_major_capital:0 "Планетарный синаптический кластер Элизиума"
  building_giga_elysium_host_hive_major_capital_plural:0 "Планетарные синаптические кластеры Элизиума"
  building_giga_elysium_host_hive_major_capital_desc:0 "Мощное синаптическое реле, через которое Улей направляет планетарное развитие и планирование."
  
  building_giga_elysium_host_machine_capital:0 "Планетарный ретрансляционный узел Элизиума"
  building_giga_elysium_host_machine_capital_plural:0 "Планетарные ретрансляционные узлы Элизиума"
  building_giga_elysium_host_machine_capital_desc:0 "Ретрансляционный узел, передающий инструкции со станции высоко над нами."
  
  building_giga_elysium_host_machine_major_capital:0 "Планетарный ретрансляционный нексус Элизиума"
  building_giga_elysium_host_machine_major_capital_plural:0 "Планетарные ретрансляционные нексусы Элизиума"
  building_giga_elysium_host_machine_major_capital_desc:0 "Мощный административный узел и ретрансляционный центр, обрабатывающий инструкции, поступающие с орбиты."
  
  
  building_giga_elysium_host_jobs:0 "Министерство занятости"
  building_giga_elysium_host_jobs_plural:0 "Министерства занятости"
  building_giga_elysium_host_jobs_desc:0 "Всеохватывающий государственный орган, через который назначаются должности и устанавливаются квоты."
  building_giga_elysium_host_jobs_effect:0 "Предоставляет §Y$@giga_elysium_jobs_per_100|*0$§! £job£ Должности на каждые §Y100§! £pop£ Поп на планете, подходящие нашему §YТипу империи§! и текущему §YНазначению колонии§!."
  building_giga_elysium_host_jobs_amenities_effect:0 "Предоставляет §Y$@giga_elysium_jobs_per_100|*0$§! £job£ Должности на каждые §Y100§! £pop£ Поп на планете, подходящие нашему §YТипу империи§! и текущему §YНазначению колонии§!, а также дополнительные £amenities£ §YУдобства§! на £job_clerk£ §Y$job_clerk$§! Должность"
  
  building_giga_elysium_host_hive_jobs:0 "Центр назначения дронов"
  building_giga_elysium_host_hive_jobs_plural:0 "Центры назначения дронов"
  building_giga_elysium_host_hive_jobs_desc:0 "Объект, в котором размещён полуавтономный нейронный кластер, задачей которого является поддержание производительности дронов на всей планете."
  
  building_giga_elysium_host_machine_jobs:0 "Узел назначения задач"
  building_giga_elysium_host_machine_jobs_plural:0 "Узлы назначения задач"
  building_giga_elysium_host_machine_jobs_desc:0 "Вычислительный узел, распределяющий задачи между простаивающими дронами по всей планете."
  
  building_giga_elysium_host_booster:0 "Дополнительный промышленный сектор"
  building_giga_elysium_host_booster_plural:0 "Дополнительные промышленные секторы"
  building_giga_elysium_host_booster_desc:0 "Масштабный промышленный регион, построенный для увеличения планетарной производительности."
  building_giga_elysium_host_booster_effect:0 "Обеспечивает бонусы к £job£ §YПроизводительности должностей§! в зависимости от §YНазначения колонии§! и использует любые £volatile_motes£ £exotic_gases£ £rare_crystals£ §YСтратегические ресурсы§! из месторождений, обеспечивая должности по добыче"
  
  building_giga_elysium_trash_heap:0 "Огромная куча мусора"
  building_giga_elysium_trash_heap_desc:0 "Огромные груды разнообразного мусора, выброшенного обитателями станции выше. Мародёры просеивают отходы в поисках выброшенных предметов роскоши."
  building_giga_elysium_trash_heap_effect:0 "Предоставляет §Y$amenity$§! равное §Y$@giga_elysium_trash_amenities|%0$§! от §YДоступных $amenity$§! на §Y$orbital_elysium$§!"
  
  #########################################
  ### Elysium jobs ########################
  #########################################
  
  job_giga_elysium_controller:0 "Элизийский смотритель"
