  MEGASTRUCTURE_SELECTION_LEGEND:99 "§HКлюч иконок:§!\n\n£galwonders£ §EОткрывает $ap_galactic_wonders$§!\nЗавершение этой мегаструктуры удовлетворит требование к строительству перка вознесения §Y$ap_galactic_wonders$§!.\n\n£gigastructural£ §EОткрывает $ap_gigastructural_constructs$§!\nЗавершение этой мегаструктуры удовлетворит требование к строительству перка вознесения §Y$ap_gigastructural_constructs$§!.\n\n£megaupgrade£ §EПерк открывается при улучшении§!\nПри отображении рядом с одной из вышеуказанных иконок означает, что перк будет открыт только при последующем улучшении мегаструктуры и не станет доступен немедленно.\n\n§LПримечание: Мегаструктуры, добавленные модами, отличными от Gigastructural Engineering & More, не будут помечены этими иконками, однако всё равно могут открывать перки, в частности $ap_galactic_wonders$.§!"
  
