  d_giga_lifeless_zro_1:0 "Месторождение Зро"
  d_giga_lifeless_zro_1_desc:0 "На этой планете есть пригодный для добычи источник пыли зро."
  
  d_giga_lifeless_dark_matter_1:0 "Месторождение тёмной материи"
  d_giga_lifeless_dark_matter_1_desc:0 "На этой планете есть пригодный для добычи источник тёмной материи."
  
  d_giga_lifeless_living_metal_1:0 "Месторождение живого металла"
  d_giga_lifeless_living_metal_1_desc:0 "На этой планете есть пригодный для добычи источник живого металла."
  
  d_giga_lifeless_nanites_1:0 "Месторождение нанитов"
  d_giga_lifeless_nanites_1_desc:0 "На этой планете есть пригодный для добычи источник нанитов."
  
  d_giga_lifeless_iodizium_1:0 "Месторождение иодизиума"
  d_giga_lifeless_iodizium_1_desc:0 "На этой планете есть пригодный для добычи источник кристаллов иодизиума."
  
  d_giga_hab_iodizium_1:0 "Месторождение иодизиума"
  d_giga_hab_iodizium_1_desc:0 "Этот орбитальный комплекс построен вблизи пригодного для добычи месторождения кристаллов иодизиума."
  
  #########################################
  ### Mega Deposits ######################
  #########################################
  
  d_small_natural_tunnel:0 "Туннель Борея"
  d_small_natural_tunnel_desc:0 "Небольшой естественный туннель, соединяющий большое озеро, расположенное посреди одного из континентов планеты, с океаном. Его существование, по-видимому, бросает вызов всем законам природы и разума, заставляя туземцев полагать, что оно было создано самими богами."
  
  
  #########################################
  ### Flavor Deposits #####################
  #########################################
  
  d_arcane_mineral_generator:0 "Волшебный преобразователь"
  d_arcane_mineral_generator_desc:0 "Древнее устройство волшебного производства, которое добывает полезные ископаемые, казалось бы, из воздуха."
  
  d_giga_orbital_effects:0 "Транспортная сеть системы"
  d_giga_orbital_effects_desc:0 "$name_giga_orbital$ в этой системе определяет местное логистическое планирование."
  
  d_pcc_origin_blocker:0 "Повреждённый канал"
  d_pcc_origin_blocker_desc:0 "Большие части огромных вычислительных массивов планеты в настоящее время недоступны из наших исследовательских объектов из-за повреждённых соединений между вычислительными подсекциями."
  
  d_giga_rogue_ai_relay_servers:0 "Разбойные массивы процессоров"
  d_giga_rogue_ai_relay_servers_desc:0 "Огромные массивы процессоров и серверов, используемые ИИ-разбойником для проецирования своей мощности на Планетарный вычислительный комплекс, чтобы бороться с нами на каждом шагу, саботируя инфраструктуру и активно пытаясь убить наших колонистов."
  
  d_giga_rogue_ai_corrupt_code:0 "Поврежденный код"
  d_giga_rogue_ai_corrupt_code_desc:0 "Большие блоки банков данных Планетарного вычислительного комплекса заполнены опасным вредоносным программным кодом, активно мешающим нашим научным исследованиям на этой планете."
  
  d_ringworld_capital_city:0 "Великая столица"
  d_ringworld_capital_city_desc:0 "Великая столица, построенная на кольцевом мире. Это место служит центральным узлом для сегмента кольцевого мира и предоставляет местному населению различные услуги."
  
  d_interstellar_ringworld_commerce_blocker:0 "Заброшенная инфраструктура"
  d_interstellar_ringworld_commerce_blocker_desc:0 "Поскольку кольцевой мир предлагает почти бесконечное пространство, перестройке земли уделялось мало внимания, что привело к тому, что большие участки земли были заполнены давно заброшенными зданиями. Если эти территории будут очищены и застроены заново, местный бизнес сможет значительно вырасти, увеличивая богатство империи."
  
  d_great_ring_excavated_mountain:0 "Узел системы самовосстановления Мира-кольца"
  d_great_ring_excavated_mountain_desc:0 "Открытый узел автоматической системы самовосстановления кольцевого мира. Он непрерывно генерирует материю, необходимую для поддержания мегаструктуры в рабочем состоянии. И если мы будем осторожны, мы сможем перекачать часть этого материала для собственных нужд без ущерба для нашего искусственного дома."
  
  d_giga_arcane_generator:0 "$d_arcane_generator$"
  d_giga_arcane_generator_desc:0 "$d_arcane_generator_desc$"
  
  
  d_decrepit_tunnels_squareworld:0 "$d_decrepit_tunnels_1$"
  d_decrepit_tunnels_squareworld_desc:0 "$d_decrepit_tunnels_1_desc$"
  
  d_predictable_solar_flares:0 "Предсказуемые солнечные вспышки"
  d_predictable_solar_flares_desc:0 "Звезда, вокруг которой вращается наш родной мир, демонстрирует специфическое поведение перед солнечной вспышкой, что значительно облегчает извлечение энергии."
  
  d_everfree_forest:0 "Вечнозелёный лес"
  d_everfree_forest_desc:0 "Своеобразный и почти непроходимый лес, наполненный, казалось бы, магической энергией. Расчистить его было бы задачей гигантских масштабов, но изучение его эзотерической экосистемы, несомненно, даст интригующие данные."
  
  d_giga_decrepit_tunnels_1:0 "$d_decrepit_tunnels_1$"
  d_giga_decrepit_tunnels_1_desc:0 "$d_decrepit_tunnels_1_desc$"
  
