  d_giga_decrepit_tunnels_3_desc:0 "$d_decrepit_tunnels_1_desc$"
  
  d_ehof_solar_array:0 "Безупречные солнечные коллекторы"
  d_ehof_solar_array_desc:0 ""
  
  d_flusio_arcology_wreck:0 "Разрушенные мегаполисы"
  d_flusio_arcology_wreck_desc:0 "Города, частично или полностью разрушенные в ходе боёв на Флузио-Аркологии."
  d_flusio_arcology_anarchy:0 "Флузионская анархия"
  d_flusio_arcology_anarchy_desc:0 "Обширные районы Флузиона погрузились в полную анархию в результате сопутствующего ущерба от опустошительных боёв с целью вытеснения Кайзера с планеты."
  
  d_flusio_arcology_administration:0 "Администрация Флузио-Аркологии"
  d_flusio_arcology_administration_desc:0 "Управление логистическим кошмаром, окружающим Флузион, — нелёгкая задача. Из-за огромного количества районов, которые способна поддерживать Флузио-Аркология, её правильное управление требует большей осторожности."
  
  d_flusio_arcology_administration_tooltip:0 "[giga_flusion_administration_mechanics]"
  
  d_solaktropa_project:0 "Проект Рокуалтропа"
  d_solaktropa_project_desc:0 "Проект Рокуалтропа создаёт огромные количества пригодных для застройки земель для Кацценов, а также колоссальные количества воды для сельского хозяйства, ценой нарушения естественного климата Флузиона."
  
  d_solaktropa_project_wreck:0 "Руины Рокуалтропы"
  d_solaktropa_project_wreck_desc:0 "Разрушение плотины Рокуалтропа причинило неисчислимые разрушения Флузиону и его обитателям."
  
  d_katlantropa_project:0 "Проект Катлантропа"
  d_katlantropa_project_desc:0 "Проект Катлантропа орошает бывшие пустынные районы, делая их пригодными для сельского хозяйства и ирригации."
  
  d_katlantropa_project_wreck:0 "Опустынивание Катлантропа"
  d_katlantropa_project_wreck_desc:0 "Разрушение Катлантропа превратило бывшие пахотные земли в обширные пустыни."
  
  
