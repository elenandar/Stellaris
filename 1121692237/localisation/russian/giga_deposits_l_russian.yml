  d_aeternum_gigantic_fission_reactor:0 "Колоссальный реактор деления"
  d_aeternum_gigantic_fission_reactor_desc:0 "Странный реактор деления, построенный Аэтернум в отдаленной части, обрабатывающий гигантский кусок урана и производящий огромное количество электричества."
  
  d_exp_civ_primitive_preserve:0 "Заповедник Бёрча первобытной цивилизации"
  d_exp_civ_primitive_preserve_desc:0 "На куске Мира Бёрча обитает целая примитивная цивилизация. Их изучение представляет собой невероятный научный потенциал."
  
  d_exp_civ_space_preserve:0 "Заповедник Бёрча космической эры"
  d_exp_civ_space_preserve_desc:0 "На куске Мира Бёрча обитает целая цивилизация космической эры. Их изучение представляет собой невероятный научный потенциал."
  
  d_exp_civ_fe_preserve:0 "Заповедник Бёрча цивилизации предтеч"
  d_exp_civ_fe_preserve_desc:0 "На куске Мира Бёрча обитает целая древняя цивилизация-предтеч. Их изучение представляет собой невероятный научный потенциал."
  
  d_aeternum_decaying_hyperstructure:0 "Разрушающаяся гиперструктура"
  d_aeternum_decaying_hyperstructure_desc:0 "Большая часть этого Мира Бёрча пришла в упадок после тысяч лет забвения. Их ремонт, несомненно, будет сложной задачей, но это позволит нам снова расширить пригодную для жизни территорию этого Мира Бёрча.\n\nОчистив это, мы получим §G3§! $aeternum_tech_intel$."
  
  