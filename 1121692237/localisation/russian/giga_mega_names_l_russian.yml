  succ_0:0 "Строительная площадка $name_succ$"
  succ_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_strategic_resource_production$\nДобывает с §YГазового гиганта§! £exotic_gases£ и £volatile_motes£, а также £energy£ - $giga_list_category_eventually_runs_out$\n§LЭтот аппарат извлекает из атмосферы газового гиганта ресурсы и термоядерное топливо.§!" #megalistentry SUCC
  succ_0_DESC:0 "Строительная площадка для будущего $name_succ_full$. В нем размещается необходимый персонал и инфраструктура, чтобы построить $name_succ$ вокруг этого газового гиганта."
  
  succ_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - Удаляет §Y1 размер§! планеты каждые §Y2 года§!. Истощается, когда планета достигает §Yразмера 10§!, оставляя после себя §YБесплодный Мир§!."
  #Old first stage
  # succ_1:0 "$name_succ$ Orbital Apparatus"
  # succ_1_DESC:0 "This gigantic ring stretches around the Gas Giant, and houses fusion reactors for energy generation, as well as purifying facilities for harvesting exotic gases and volatile motes from the Gas Giant's atmosphere."
  
  succ_1:0 "Орбитальный аппарат $name_succ$"
  succ_1_DESC:0 "Это гигантское кольцо простирается вокруг газового гиганта и содержит термоядерные реакторы для выработки энергии, а также очистные сооружения для сбора экзотических газов и летучих пылинок из атмосферы газового гиганта."
  ########################################
  ############## STRIPMINE ###############
  ########################################
  sr_mega_extra_data:0 "§Yобнаруживает§! и §Yусиливает§! залежи стратегических ресурсов, а также §Yусиливает§! (но не создаёт) залежи обычных ресурсов."
  
  automated_stripmine_0:0 "Строительная площадка $name_auto_stripmine$"
  automated_stripmine_0_DESC:0 "Строительная площадка для будущей $name_auto_stripmine$. В ней есть все необходимое для создания орбитального горного аппарата, а также заводов на планете."
  automated_stripmine_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_basic_resource_production$\nРазбирает любой §YКаменистый мир§! на £minerals£ §YМинералы§! - $giga_list_category_eventually_runs_out$\n§LАвтоматизированная шахта сочетает в себе привязанных к планете роботов-шахтеров с орбитальными лучами-сборщиками, чтобы очищать планету и добывать ценные ресурсы§!." #gigalistentry AUTOMATED STRIPMINE
  automated_stripmine_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - Уменьшает планету на §Y1 размер§! каждые §Y2 года§!. Истощается, когда планета достигает §Yразмера 2§!. Получает дополнительные ресурсы, если построен на §YХтоническом§!, §YАлмазном§! мирах или мире §YЭтанового океана§! из мода §YPlanetary Diversity§!."
  # Old first stage
  # automated_stripmine_1:0 "$name_auto_stripmine$ Orbital Apparatus"
  # automated_stripmine_1_DESC:0 "This large orbital apparatus is equipped with two enormous tractor beams capable of pulling large amounts of minerals into orbit. Those minerals will be extracted by a plethora of automated drilling units on the surface of the planet."
  
  automated_stripmine_1:0 "Орбитальный аппарат $name_auto_stripmine$"
  automated_stripmine_1_DESC:0 "Этот большой орбитальный аппарат оснащен двумя огромными тяговыми лучами, способными выводить на орбиту большое количество минералов. Эти полезные ископаемые будут добывать множество автоматических буровых установок на поверхности планеты."
  
  #########################################
  ############## Kugelblitz ###############
  #########################################
  #Deprecated
  # kugelblitz_0:0 "$gc_mega$$name_kugelblitz$ Site"
  # kugelblitz_0_DESC:0 "The construction site for a future $name_kugelblitz$. Houses the personnel necessary to construct this incredibly advanced storage device."
  # kugelblitz_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_storage$\nStores §Y40000§! of each resource and generates £energy£ §YEnergy§!\n§LAn incredibly advanced Kugelblitz-based storage device, which can store energy and matter in the form of radiation." #megalistentry KUGELBLITZ
  
  kugelblitz_0:0 "Строительная площадка $name_kugelblitz$"
  kugelblitz_0_DESC:0 "Строительная площадка для будущего $name_kugelblitz$. Здесь размещается персонал, необходимый для создания этого невероятно современного запоминающего устройства."
  kugelblitz_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_storage$\nХранит §Y40000§! каждого ресурса и генерирует £energy£ §YЭнергию§!\n§LНевероятно продвинутое запоминающее устройство на основе Kugelblitz, которое может хранить энергию и материю в форме излучения." #megalistentry KUGELBLITZ
  
  kugelblitz_1:0 "Пустой $name_kugelblitz$"
  kugelblitz_1_DESC:0 "Большая конструкция, способная создать искусственный Кугельблиц для генерации и хранения энергии благодаря ускоренному излучению Хокинга, а также материи. Он также может извлекать накопленную энергию, чтобы использовать ее."
  
  kugelblitz_2:0 "Улучшенный $name_kugelblitz$"
  kugelblitz_2_DESC:0 "В этой конструкции находится искусственный Кугельблитц, а также устройства, способные вводить и извлекать из него энергию. Кугельблитц генерирует энергию благодаря ускоренному излучению Хокинга, и его энергия может быть извлечена и преобразована обратно в материю.\nХранит по 40000 каждого ресурса."
  
  kugelblitz_3:0 "Грандиозный $name_kugelblitz$"
  kugelblitz_3_DESC:0 "В этой конструкции находится искусственный Кугельблитц, а также устройства, способные вводить и извлекать из него энергию. С помощью четырёхмерной инженерии мы можем значительно увеличить объём доступного хранилища от одного генерируемого кугельблитца."
  
  kugelblitz_ruined:0 "Разрушенный $name_kugelblitz$"
  kugelblitz_ruined_DESC:0 "Разрушенный $name_kugelblitz$. Построенный для размещения контролируемой искусственной сингулярности, эта конструкция в прошлом понесла колоссальные повреждения и больше не работает. Ремонт возможен, хотя и труден."
  kugelblitz_ruined_MEGASTRUCTURE_DETAILS:99 "$kugelblitz_ruined_DESC$"
  
  kugelblitz_restored:99 "$name_kugelblitz$"
  kugelblitz_restored_DESC:99 "$kugelblitz_2_DESC$"
  
  #########################################
  ### Planetary Seeder Nexus ##############
  #########################################
  giga_tech_planetary_seeder_nexus:0 "Крупномасштабное питание экстремофилов"
  giga_tech_planetary_seeder_nexus_desc:0 "Безжизненные миры — и холодные, и горячие — нередко содержат основные строительные блоки жизни, только лишённые должной организации. Однако после открытия кутолоидов и амёб, процветающих в глубинах космоса, появилась возможность создавать специальные искусственные «формы жизни», которые, попав на безжизненные миры, смогут накапливать эти строительные блоки и перестраивать их в различные вещества, пригодные для сбора урожая и потребления. Поскольку всё, что они делают — это перемешивают и переставляют разрозненные молекулы в различные съедобные соединения, их необходимо регулярно пополнять, и они не составят полноценной «биосферы», но могут обеспечить полезный запас материалов для нашей пищевой промышленности."
  
  planetary_seeder_nexus_0:0 "$gc_kilo$$name_planetary_seeder_nexus$: Органические биосенсоры"
  planetary_seeder_nexus_0_DESC:0 "Этот объект послужит базой для создания $name_planetary_seeder_nexus$ — орбитального биоинженерного комплекса, производящего различных квазибиологических автоматов, способных перерабатывать разрозненные органические соединения, содержащиеся в безжизненных мирах, в съедобное вещество. Большие геологоразведочные системы постоянно сканируют близлежащие миры и развёртывают зонды, чтобы подтвердить местонахождение высококонцентрированных перерабатываемых органических соединений."
  planetary_seeder_nexus_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_basic_resource_production$\nГенерирует залежи £food£ §YПродовольствия§! на планетах системы.\n§LСтанция, построенная на орбите газового гиганта, производящая биологических автоматов, перерабатывающих органические соединения в съедобное вещество.§!" #megalistentry PLANETARY SEEDER NEXUS
  planetary_seeder_nexus_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $planetary_seeder_nexus_1_mod_tooltip$"
  
  planetary_seeder_nexus_1:0 "$name_planetary_seeder_nexus$: Биологический производственный комплекс"
  planetary_seeder_nexus_1_DESC:0 "В больших количествах производятся питательные формы жизни, напоминающие фитопланктон и способные процветать в подповерхностных океанах, скалистых корах и газообразных атмосферах, которые затем распространяются по местной системе."
  
  planetary_seeder_nexus_2:0 "$name_planetary_seeder_nexus$: Производство ферментов"
  planetary_seeder_nexus_2_DESC:0 "Для миров, не способных поддерживать обычную жизнь, передовые растения производят богатые ферментами клеточные автоматы, способные совершать невероятные достижения молекулярной химии: от перестройки коры и атмосферы богатых углеродом миров в кристаллизованные сахарные колонны до производства белковой суспензии путём манипуляции углеводородами и водой."
  
  planetary_seeder_nexus_3:99 "$name_planetary_seeder_nexus$"
  planetary_seeder_nexus_3_DESC:0 "Полноценный $name_planetary_seeder_nexus$, осуществляющий производство, развёртывание и последующий сбор урожая специализированных ферментов и питательных форм жизни почти на каждом мире этой системы."
  
  #########################################
  ### Orbital Artificial Ecosystem ########
  #########################################
  giga_tech_orbital_artificial_eco:0 "Орбитальные экосистемы"
  giga_tech_orbital_artificial_eco_desc:0 "Создание полностью работающей сложной экосистемы на орбите планеты - довольно сложная задача, но такая технология позволяет создавать большие экосистемы на орбите планеты для исследовательских целей."
  
  orbital_artificial_eco_0:0 "Строительная площадка $name_orbital_artificial_eco$"
  orbital_artificial_eco_0_DESC:0 "Эта строительня прощадка послужит основой для создания $name_orbital_artificial_eco$, которая представляет собой большую структуру, содержащую полностью искусственную экосистему, с которой мы можем свободно экспериментировать."
  orbital_artificial_eco_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\nГенерирует £society_research£ §YСоциологические исследования§! и увеличивает §YСкорость терраформирования§! на §Y7.5%§!\n§LОчень большая станция с полностью искусственной экосистемой для изучения природы.§!" #megalistentry ORBITAL ARTIFICIAL ECOSYSTEM
  orbital_artificial_eco_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $orbital_eco_arcology_1_mod_tooltip$"
  
  orbital_artificial_eco_1:0 "$name_orbital_artificial_eco$: Генный банк"
  orbital_artificial_eco_1_DESC:0 "Полная $name_orbital_artificial_eco$, заполненная импортированными видами, а также созданными благодаря генной инженерии. Наши ученые могут по желанию смоделировать и деформировать эту уникальную экосистему, чтобы изучить, как функционирует природа."
  
  orbital_artificial_eco_2:0 "$name_orbital_artificial_eco$: Экзотические вольеры"
  orbital_artificial_eco_2_DESC:0 "Экзотические вольеры содержат разнообразные имитационные среды, а также объекты, обеспечивающие устойчивую численность всей флоры и фауны."
  
  orbital_artificial_eco_3:0 "$name_orbital_artificial_eco$: Планетарное тестирование"
  orbital_artificial_eco_3_DESC:0 "Полноценная $name_orbital_artificial_eco$, заполненная импортированными видами, а также созданными благодаря генной инженерии. Наши учёные могут по желанию смоделировать и деформировать эту уникальную экосистему, чтобы изучить, как функционирует природа."
  
  orbital_artificial_eco_ruined:0 "Разрушенная $name_orbital_artificial_eco$"
  orbital_artificial_eco_ruined_DESC:0 "Разрушенная $name_orbital_artificial_eco$. Раньше здесь содержалось большое количество биотехнологических видов в контролируемой среде, но теперь это не так. Возможно, удастся восстановить ее с помощью правильных технологий."
  orbital_artificial_eco_ruined_MEGASTRUCTURE_DETAILS:99 "$orbital_artificial_eco_ruined_DESC$"
  
  orbital_artificial_eco_restored:99 "$name_orbital_artificial_eco$"
  orbital_artificial_eco_restored_DESC:99 "$orbital_artificial_eco_3_DESC$"
  
  giga_dialog.1003.name:0 "Разрушенная $name_orbital_artificial_eco$"
  giga_dialog.1003.desc:0 "Разрушенная $name_orbital_artificial_eco$ была замечена на орбите газового гиганта в системе [from.GetName]. Судя по всему, она получила большое количество повреждений, но внешняя рамка все еще не повреждена. Наши ученые считают, что ее можно было бы отремонтировать, если бы у нас были соответствующие технологии."
  giga_dialog.1003.a:0 "Интересно."
  #########################################
  ### Macroengineering Test Site ##########
  #########################################
  giga_tech_engineering_test_site:0 "Колоссальные испытательные центры"
  giga_tech_engineering_test_site_desc:0 "Строительство испытательного центра на орбите планеты может оказаться трудным и невероятно смертоносным. Однако потенциальные приложения очень многообещающие."
  
  macro_test_site_0:0 "Строительная площадка $name_eng_test_site$"
  macro_test_site_0_DESC:0 "Большая строительная площадка, на которой находятся все необходимые материалы для строительства Макроинженерной испытательной станции, структуры, которая позволит нам проводить различные инженерные эксперименты на планете внизу."
  macro_test_site_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\nГенерирует £engineering_research£ §YИнженерные исследования§! и увеличивает §YЗдоровье брони§! на §Y2.5%§!\n§LБольшая станция на орбите планеты для свободного проведения инженерных экспериментов.§!" #megalistentry MACROENGINEERING TEST SITE
  macro_test_site_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $orbital_test_site_1_mod_tooltip$"
  
  macro_test_site_1:0 "$name_eng_test_site$: Испытательные боксы материалов"
  macro_test_site_1_DESC:0 "Эта станция, оснащенная множеством научных лабораторий, а также строительными объектами, позволяет нам проводить различные тесты, связанные с нашими инженерными исследованиями на планете внизу.\n\n+25% к броне кораблей."
  
  macro_test_site_2:0 "$name_eng_test_site$: Симуляции материалов"
  macro_test_site_2_DESC:0 "Симуляции материалов позволяют повысить эффективность более практичных тестов материалов, открывая широкие возможности для моделирования разрушений и планетарных катастроф."
  
  macro_test_site_3:0 "$name_eng_test_site$: Орбитальный испытательный полигон"
  macro_test_site_3_DESC:0 "Испытательные полигоны позволяют практически непрерывно бомбардировать планету внизу, а также медленно доставлять враждебные боеприпасы на большие расстояния к другим планетам в системе, хотя для использования в боевых сценариях они слишком медлительны."
  
  macro_test_site_ruined:0 "Разрушенная $name_eng_test_site$"
  macro_test_site_ruined_DESC:0 "Разрушенная $name_eng_test_site$, построенная эоны назад космической расой. Хотя интерьер полностью разрушен, внешний корпус в основном цел и может быть отремонтирован."
  macro_test_site_ruined_MEGASTRUCTURE_DETAILS:99 "$macro_test_site_ruined_DESC$"
  
  macro_test_site_restored:99 "$name_eng_test_site$"
  macro_test_site_restored_DESC:99 "$macro_test_site_3_DESC$"
  
  macro_test_site_1_dismantle:0 "Демонтировать мегаструктуру"
  macro_test_site_1_dismantle_DESC:0 "Эта мегаструктура будет разобрана и сдана в металлолом."
  
  giga_dialog.403.name:0 "Разрушенная $name_eng_test_site$"
  giga_dialog.403.desc:0 "Наш научный корабль обнаружил довольно большую космическую станцию, вращающуюся вокруг планеты в системе [from.GetName]. При более тщательном исследовании выясняется, что эта космическая станция на самом деле является разрушенной $name_eng_test_site$, построенной давным-давно каким-то неизвестным видом. Эта космическая станция, вероятно, служила полигоном для многих экспериментов в прошлом, но с тех пор, к сожалению, превратилась в руины."
  giga_dialog.403.a:0 "Интригующе."
  
  #########################################
  ### Atmospheric Storm Observatory #######
  #########################################
  giga_tech_macro_scale_weather_manipulation:0 "Макроатмосферная климатическая манипуляция"
  giga_tech_macro_scale_weather_manipulation_desc:0 "Строительство комплекса, предназначенного для создания массивных штормов в атмосфере газовых гигантов, позволит нам изучать их эффекты значительно лучше, чем любые природные бури. Возможности такого исследования штормов очень перспективны."
  
  atmosphere_shredder_0:0 "$gc_kilo$$name_atmosphere_shredder$: Глаз бури"
  atmosphere_shredder_0_DESC:0 "Большой комплекс для манипуляции погодой, содержащий все необходимые материалы для создания экспериментального атмосферного шторма. Эта структура позволит нам проводить различные эксперименты над газовым гигантом и собирать ценные данные по всей системе."
  atmosphere_shredder_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\nГенерирует залежи £physics_research£ §YФизических исследований§! на планетах системы.\n§LБольшая станция на орбите газового гиганта, вызывающая постоянный шторм для изучения и экспериментирования.§!"
  atmosphere_shredder_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $orbital_atmosphere_shredder_1_mod_tooltip$"
  
  atmosphere_shredder_1:0 "$name_atmosphere_shredder$: Рычаги возмущения"
  atmosphere_shredder_1_DESC:0 "Колоссальные рычаги возмущения позволяют усилить мощь шторма на планете, ещё больше увеличивая потенциал для изучения."
  
  atmosphere_shredder_2:0 "$name_atmosphere_shredder$: Стабилизирующие рычаги"
  atmosphere_shredder_2_DESC:0 "Стабилизирующие рычаги позволяют создавать зоны относительного спокойствия в буре, обеспечивая безопасное возвращение дронов и других автоматических машин, отправленных изучать шторм."
  
  atmosphere_shredder_3:0 "$name_atmosphere_shredder$: Лабораторное кольцо"
  atmosphere_shredder_3_DESC:0 "В лабораторном кольце размещены менее чувствительные датчики станции. Кольцо рассчитано на то, чтобы погружаться в мощь шторма, позволяя собирать богатые данные."
  
  atmosphere_shredder_complete_name:99 "$name_atmosphere_shredder$"
  
  atmosphere_shredder_ruined:0 "Разрушенная $name_atmosphere_shredder$"
  atmosphere_shredder_ruined_DESC:0 "Разрушенная $name_atmosphere_shredder$, построенная эоны назад космической расой. Хотя механизм управления штормом и внутренние компоненты уничтожены, внешний корпус в основном цел и может быть отремонтирован."
  atmosphere_shredder_ruined_MEGASTRUCTURE_DETAILS:99 "$atmosphere_shredder_ruined_DESC$"
  
  atmosphere_shredder_restored:99 "$name_atmosphere_shredder$"
  atmosphere_shredder_restored_DESC:99 "$atmosphere_shredder_3_DESC$"
  
