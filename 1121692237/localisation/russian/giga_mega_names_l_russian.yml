  # Phase4
  ehof_megastructure_phase4:99 "$ehof_ehofp4$"
  ehof_megastructure_phase4_DESC:0 "Использует §H£giga_sr_negative_mass£Отрицательную массу§! для стабилизации $ehof_wormholes$ в целях межзвёздных путешествий и добычи $sr_dark_matter$."
