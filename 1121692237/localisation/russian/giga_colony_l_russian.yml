l_russian:
  
  giga_colony.1.pc_giga_edge_of_eternity:99 "Наш колониальный корабль мягко приземлился на широкую посадочную площадку в разрушенном космопорте аркологии на §Y[Root.GetName]§!. Хотя мы и далеко от основного массива древнего аркологического комплекса, космопорт оказался гораздо безопаснее, чем рисковать приземляться в этих опасных морях.\n\nКорабль был навсегда переоборудован в административную штаб-квартиру нового поселения, а его реакторное ядро в процессе демонтажа, чтобы послужить временным источником энергии для колонии.\n\nПо близлежащим руинам разбросаны сотни сборных укрытий, пока колонисты начинают массово высаживаться — первый [Root.Owner.GetSpeciesName] город на чужом мире."
