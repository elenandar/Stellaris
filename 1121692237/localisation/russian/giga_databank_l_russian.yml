l_russian:
  
  concept_giga_sr_amb_megaconstruction:99 "$giga_sr_amb_megaconstruction$"
  concept_giga_sr_amb_megaconstruction_desc:99 "£giga_sr_amb_megaconstruction£ §H$giga_sr_amb_megaconstruction$§! — это передовые материалы, способные выдерживать колоссальные разрывные нагрузки, что делает их незаменимыми при строительстве крупнейших космических сооружений.\n\nЧем выше наш доход от них, тем быстрее будут строиться ['concept_megastructures']. Они §Hраспределяются§! между всеми строящимися мегаструктурами, а это значит, что одновременное возведение нескольких мегаструктур §Hзамедлит§! общую скорость строительства. Таким образом, они выступают «мягким» ограничением нашей возможности параллельного строительства мегаструктур.\n\nКроме того, большинство мегаструктур имеют §Hрасходы§! на содержание, причём у более крупных они выше.\n\nДля увеличения:\n- Постройте £building£['building:building_giga_megaworkshop_hub'] или £building£ ['building:building_giga_megaworkshop']\n- Постройте £mining_station£ ['concept_mining_stations'] на ['concept_celestial_objects'] с месторождениями сверхпрочных материалов"
  
  concept_giga_sr_bulk_matter:99 "$giga_sr_bulk_matter$"
  concept_giga_sr_bulk_matter_desc:99 "£giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! — это большое количество малоценного нерафинированного материала, добываемого с небесных тел и используемого в качестве наполнителя при строительстве чрезвычайно крупных ['concept_megastructures'] или тех, что стремятся воспроизвести планетарные условия.\n\nЕго можно добывать с §HAстероидов§!, §HКаменистых планет§! и §HГазовых гигантов§! в количестве §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! за единицу ['concept_planet_size'].\n\nЭтот ресурс необходим для строительства §HКольцового мира§!, §HМозга-Матрёшки§!, §HДиска Олдерсона§!, §HМира Берча§!, §HКвазизвёздного облитератора§!, §HСверхмассивного Э.Х.О.Ф.§! и §HПучка Николла-Дайсона§!.\n\nОн также используется §HЛунным макрофабрикатором§! и §HЗаводом по сборке бегемотов§! для создания §HБоевых лун§! и §HПланетоформирующих бегемотов§! соответственно.\n\nЕсли при строительстве мегаструктура §Hудаляет планеты§!, то содержание £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! на планетах системы будет §Hвычтено§! из начальной фазы строительства. Излишки сохранятся в §HКэше насыпного материала§! над звездой системы и могут быть добыты позже.\n\nНапример, если система содержит §Y75§! £giga_sr_bulk_matter£, то §HФрейм кольцевого мира§!, который обычно требует §Y100§! £giga_sr_bulk_matter£, потребует лишь §Y25§! £giga_sr_bulk_matter£. Однако если система содержит §Y150§! £giga_sr_bulk_matter£, начальная фаза постройки мегаструктуры не потребует £giga_sr_bulk_matter£, а §HКэш§! будет содержать §Y50§! £giga_sr_bulk_matter£ для добычи. Последующие фазы строительства не затрагиваются этим механизмом и потребуют накопленного £giga_sr_bulk_matter£.\n\nДля увеличения:\n- Используйте §H$decision_harvest_matter_for_planetary_printing$§! ['concept_decision'] на не являющемся звездой ['concept_celestial_object'], чтобы построить §H$moon_printer_orbital_mass_harvester_1$§! и разобрать планету, получая §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! каждые §Y6§! месяцев. Этот процесс нельзя остановить, и он в конечном счёте полностью §Rуничтожит§! планету.\n- Выберите решение для звезды системы ['concept_star'], чтобы запустить этот процесс на каждой планете ['concept_system']."
  
