  quasi_stellar_marker_planet_open_DESC:0 "Un $name_quasistellar$ est sur le point de tirer à travers ce trou de ver."
  giga_qso.500.name:0 "$name_quasistellar$ : Paramètres"
  giga_qso.500.desc:0 "Ici, vous pouvez configurer certains aspects de l'O.Q.-S. lui-même.\n\nModifier le taux de charge modifiera la production de £giga_sr_quasaric_energy£ de l'hyper-arme. Un taux de charge plus bas générera moins, mais donnera de l'£energy£ en retour, convertie à partir de £giga_sr_quasaric_energy£. Un taux de charge plus élevé générera plus, mais coûtera de l'£energy£ en retour, car il est nécessaire de surcharger la structure.\n\nVous pouvez également choisir de déverser des ressources (£minerals£ £food£ £consumer_goods£ £alloys£ £pops£) dans le quasar. Les ressources entreront en collision avec le disque d'accrétion lumineux et généreront une cascade de particules hautement énergétiques qui pourront ensuite être utilisées pour fournir plus de £giga_sr_quasaric_energy£ à l'hyper-arme."
  giga_qso.501.name:0 "$name_quasistellar$ : Déversement de ressources"
  giga_qso.501.desc:0 "Vous pouvez déverser diverses ressources dans le quasar supermassif pour alimenter le disque d'accrétion lumineux, et générer de l'énergie à convertir en £giga_sr_quasaric_energy£\n\nVeuillez choisir ce que vous souhaitez déverser dans le quasar."
  giga_qso.1.panel:0 "Retour au panneau de contrôle"
  giga_qso.500.dump:0 "Déverser des ressources..."
  giga_qso.500.minerals:0 "Déverser 100k £minerals£ --> 25 £giga_sr_quasaric_energy£"
  giga_qso.500.alloys:0 "Déverser 50k £alloys£ --> 30 £giga_sr_quasaric_energy£"
  giga_qso.500.food:0 "Déverser 50k £food£ --> 30 £giga_sr_quasaric_energy£"
  giga_qso.500.goods:0 "Déverser 100k £consumer_goods£ --> 30 £giga_sr_quasaric_energy£"
  giga_qso.500.undesirable:0 "Déverser 25 §Bpops indésirables§! --> 5 £giga_sr_quasaric_energy£"
  giga_qso.500.undesirable.tooltip:0 "Nous déverserons 25 pops aléatoires avec la citoyenneté indésirable dans le quasar. Leur énergie constitutive sera enfin utile à quelque chose."
  giga_qso.500.increase:0 "§HAugmenter le taux de charge§!"
  giga_qso.500.decrease:0 "§EDiminuer le taux de charge§!"
  giga_qso.500.intensityphysicslimits:0 "§YTaux de charge actuel :§! §LOui.§! | 25 £giga_sr_quasaric_energy£ -22500 £energy£"
  giga_qso.500.intensityinsane:0 "§YTaux de charge actuel :§! §MIncroyablement élevé§! | 20 £giga_sr_quasaric_energy£ -15000 £energy£"
  giga_qso.500.intensityextremely:0 "§YTaux de charge actuel :§! §RExtrêmement élevé§! | 17 £giga_sr_quasaric_energy£ -10000 £energy£"
  giga_qso.500.intensityveryhigh:0 "§YTaux de charge actuel :§! §PTrès élevé§! | 14 £giga_sr_quasaric_energy£ -6000 £energy£"
  giga_qso.500.intensityhigh:0 "§YTaux de charge actuel :§! §HÉlevé§! | 12,5 £giga_sr_quasaric_energy£ -3000 £energy£"
  giga_qso.500.intensitymed:0 "§YTaux de charge actuel :§! §YMoyen§! | 10 £giga_sr_quasaric_energy£ 0 £energy£"
  giga_qso.500.intensitylow:0 "§YTaux de charge actuel :§! §GBas§! | 5 £giga_sr_quasaric_energy£ 4000 £energy£"
  giga_qso.500.intensityverylow:0 "§YTaux de charge actuel :§! §BTrès bas§! | 1,5 £giga_sr_quasaric_energy£ 8000 £energy£"
  giga_qso.500.intensitynone:0 "§YTaux de charge actuel :§! Aucun | 0 £giga_sr_quasaric_energy£ 10000 £energy£"
  giga_qso.1.name:0 "Panneau de contrôle de l'$name_quasistellar$"
  giga_qso.1.desc:0 "Bienvenue dans le panneau de contrôle de l'$name_quasistellar$.\n\nIci, vous pouvez soit choisir une cible pour l'hyper-arme, soit configurer ses paramètres.\n\nChoisir une cible vous permettra de viser soit une étoile, une planète ou une flotte. Rappelez-vous que tirer l'O.Q.-S. nécessite de l'£giga_sr_quasaric_energy£§Yénergie quasarique§!, générée par la mégastructure elle-même.\n\nAfficher les paramètres vous permettra de modifier le taux de charge de l'arme, augmentant ou diminuant la quantité d'£giga_sr_quasaric_energy£§Yénergie quasarique§! accumulée par notre O.Q.-S.\n\n§BCe menu est également accessible directement via un édit.§!"
  giga_qso.1.fire:0 "Choisir une cible"
  giga_qso.1.parameters:0 "Voir les paramètres"
  giga_qso.1.quit:0 "Quitter le panneau de contrôle"
  giga_qso.1.menu:0 "Retour au menu"
  giga_qso.10.name:0 "$name_quasistellar$ : Sélection de cible"
  giga_qso.10.desc:0 "Ici, vous pouvez sélectionner ce que vous souhaitez cibler avec l'O.Q.-S. Veuillez lire attentivement le fonctionnement de chaque méthode de ciblage. Gardez à l'esprit que détruire des cibles plus grandes nécessitera plus d'£giga_sr_quasaric_energy£§Yénergie quasarique§!."
  giga_qso.10.fleet:0 "Détruire une §Gflotte§!"
  giga_qso.10.planet:0 "Détruire une §Yplanète§!"
  giga_qso.10.star:0 "Détruire un §Ysystème solaire§!"
  giga_qso.10.starcluster:0 "Détruire un §Ramas stellaire§!"
  giga_qso.200.name:0 "$name_quasistellar$ : §GDestruction de flotte§!"
  giga_qso.200.desc:0 "Vous avez choisi de cibler une flotte ennemie avec l'$name_quasistellar$. Cela coûtera §Y20§! £giga_sr_quasaric_energy£\n\nUn vaisseau spécial, utilisé pour calibrer le viseur de l'O.Q.-S., sera créé près de la structure. Il est équipé d'un propulseur de saut spécial à portée illimitée. Déplacez ce vaisseau vers le système contenant la flotte cible, puis rouvrez le panneau de contrôle pour confirmer.\n\nLe vaisseau devra rester en vie pendant §Y5 jours§! pendant que l'hyper-arme est calibrée, assurez-vous donc qu'il est correctement escorté.\n\nUne fois ces 5 jours passés, l'O.Q.-S. tirera à travers un trou de ver, directement sur la flotte ennemie, pendant 30 jours. Le trou de ver peut cependant être perturbé par le feu ennemi, il n'est donc pas recommandé de le laisser sans surveillance.\n\nSi vous souhaitez annuler l'opération, vous pouvez soit dissoudre le vaisseau, soit utiliser le panneau de contrôle."
  giga_qso.200.yes:0 "Procédons."
  giga_qso.201.name:0 "Calibrateur quasi-stellaire assemblé"
  giga_qso.201.desc:0 "Notre O.Q.-S. a assemblé un petit vaisseau calibrateur quasi-stellaire. Il sera utilisé pour calibrer et viser correctement le trou de ver à travers lequel l'hyper-arme tirera. Pour commencer la séquence de tir, utilisez son propulseur de saut pour le déplacer vers le système contenant la flotte cible."
  giga_qso.201.a:0 "Compris."
  giga_qso.202.name:0 "Calibrateur quasi-stellaire dissous"
  giga_qso.202.desc:0 "Nous avons dissous notre calibrateur quasi-stellaire. La procédure de destruction a été annulée."
  giga_qso.202.a:0 "Compris."
  giga_qso.203.name:0 "Calibrateur quasi-stellaire détruit"
  giga_qso.203.desc:0 "Notre calibrateur quasi-stellaire a été détruit par des forces hostiles. La procédure de destruction a été annulée."
  giga_qso.203.a:0 "Compris."
  giga_qso.204.name:0 "$name_quasistellar$ : §GDestruction de flotte§!"
  giga_qso.204.desc:0 "Si vous avez placé le calibrateur quasi-stellaire dans le bon système, sélectionnez la première option. Vous devrez le protéger pendant 5 jours. Si vous souhaitez annuler, sélectionnez la troisième option, qui dissoudra le calibrateur."
  giga_qso.204.fire:0 "Commencer la calibration ! Coût : §Y20§! £giga_sr_quasaric_energy£"
  giga_qso.204.markers:0 "Le calibrateur n'est pas encore en place."
  giga_qso.205.name:0 "Calibration de l'oblitérateur"
  giga_qso.205.desc:0 "Notre $name_quasistellar$ a commencé à calibrer son arme en utilisant le vaisseau calibrateur. Nous devons nous assurer qu'il n'est pas détruit pendant 5 jours, après quoi notre super-arme déchaînera un faisceau de pure destruction sur nos ennemis. L'O.Q.-S. tirera pendant environ 30 jours, après quoi le trou de ver disparaîtra et l'O.Q.-S. sera à nouveau prêt à l'emploi."
  giga_qso.205.a:0 "Formidable."
  giga_qso.206.name:0 "$name_quasistellar$ : Calibration terminée"
  giga_qso.206.desc:0 "Notre $name_quasistellar$ a fini de calibrer son hyper-arme et le trou de ver, et va maintenant déchaîner sa fureur sur la malheureuse flotte que nous avons désignée comme cible."
  giga_qso.206.a:0 "Formidable. Qu'ils brûlent."
  giga_qso.400.name:0 "$name_quasistellar$ : §RDestruction d'amas stellaire§!"
  giga_qso.400.desc:0 "Vous avez choisi de détruire une étoile et chacun de ses voisins hyperlane immédiats. Pour ce faire, utilisez un vaisseau de construction pour construire un §Bmarqueur de cible de l'O.Q.-S.§! au-dessus des étoiles que vous souhaitez détruire.\n\nIl est construit instantanément et ne nécessite pas que le vaisseau de construction soit physiquement présent dans le système.\n\n§RLe système doit cependant être débarrassé des hostiles.§!\nVous pouvez utiliser la fonction de destruction de flotte de l'O.Q.-S. pour faciliter cela.\n\nUne fois les marqueurs de cible construits, retournez à l'O.Q.-S. et ouvrez à nouveau le panneau de contrôle pour tirer le dispositif.\n\n§BL'explosion sera si puissante qu'elle se propagera à travers les hyperlanes, résultant en la destruction complète du système cible, ainsi que de chaque système qui y est connecté, et leurs hyperlanes seront supprimés, ne laissant que du vide.§!"
  giga_qso.401.name:0 "§RDestruction d'amas stellaire§!"
  giga_qso.401.desc:0 "Si vous avez ciblé l'étoile au coeur de l'amas que vous souhaitez détruire, sélectionnez la première option. Si vous souhaitez annuler, sélectionnez la troisième option, qui supprimera le marqueur."
  giga_qso.401.fire:0 "Détruire un amas stellaire, feu ! Coût : §Y120§! £giga_sr_quasaric_energy£"
  giga_qso.401.markers:0 "Nous n'avons pas encore ciblé l'étoile."
  giga_qso.300.name:0 "$name_quasistellar$ : §HDestruction de système solaire§!"
  giga_qso.300.desc:0 "Vous avez choisi de détruire une ou plusieurs étoiles et leurs systèmes planétaires entiers. Pour ce faire, utilisez un vaisseau de construction pour construire un §Bmarqueur de cible de l'O.Q.-S.§! au-dessus des étoiles que vous souhaitez détruire.\n\nIl est construit instantanément et ne nécessite pas que le vaisseau de construction soit physiquement présent dans le système.\n\n§RLes systèmes doivent cependant être débarrassés des hostiles.§!\nVous pouvez utiliser la fonction de destruction de flotte de l'O.Q.-S. pour faciliter cela.\n\nVous pouvez cibler jusqu'à 4 étoiles à la fois, chacune ajoutant 40£giga_sr_quasaric_energy£ au coût total de tir. Si un système a plusieurs étoiles, vous n'avez besoin d'en cibler qu'une seule.\n\nUne fois les marqueurs de cible construits, retournez à l'O.Q.-S. et ouvrez à nouveau le panneau de contrôle pour tirer le dispositif.\n\n§BLa production énergétique de l'$name_quasistellar$ est si élevée qu'il peut détruire des étoiles à neutrons, des pulsars, et même des trous noirs, car le flux d'énergie est si élevé que l'espace-temps lui-même est littéralement retourné, et le trou noir s'évapore dans le néant.\n\n§BToutes les hyperlanes connectées aux systèmes disparaîtront une fois les systèmes détruits.§!"
  giga_qso.301.name:0 "$name_quasistellar$ : §HDestruction de système solaire§!"
  giga_qso.301.desc:0 "Si vous avez ciblé toutes les étoiles que vous souhaitez détruire, sélectionnez la première option. Si vous souhaitez annuler, sélectionnez la troisième option, qui supprimera tous les marqueurs."
  giga_qso.301.markers:0 "Nous devons encore cibler plus d'étoiles avant de tirer."
  giga_qso.301.fire.1:0 "Détruire 1 système solaire, feu ! Coût : §Y40§! £giga_sr_quasaric_energy£"
  giga_qso.301.fire.2:0 "Détruire 2 systèmes solaires, feu ! Coût : §Y80§! £giga_sr_quasaric_energy£"
  giga_qso.301.fire.3:0 "Détruire 3 systèmes solaires, feu ! Coût : §Y120§! £giga_sr_quasaric_energy£"
