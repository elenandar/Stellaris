  giga_qso.100.name:0 "$name_quasistellar$ : §YDestruction de planète§!"
  giga_qso.100.desc:0 "Vous avez choisi de détruire une ou plusieurs planètes. Pour ce faire, utilisez un vaisseau de construction pour construire une mégastructure §Bmarqueur de cible de l'O.Q.-S.§! au-dessus des planètes que vous souhaitez détruire.\n\nIls sont construits instantanément et ne nécessitent pas que le vaisseau de construction soit physiquement présent dans le système. Assurez-vous que le vaisseau de construction n'est pas en stance évasive.\n\nVous pouvez cibler jusqu'à 10 planètes à la fois, chacune ajoutant 5£giga_sr_quasaric_energy£ au coût total de tir, pour un maximum de 50.\n\nUne fois les marqueurs de cible construits, retournez à l'O.Q.-S. et ouvrez à nouveau le panneau de contrôle pour tirer le dispositif."
  giga_qso.101.name:0 "$name_quasistellar$ : §YDestruction de planète§!"
  giga_qso.101.desc:0 "Si vous avez ciblé toutes les planètes que vous souhaitez détruire, sélectionnez la première option. Si vous souhaitez annuler, sélectionnez la troisième option, qui supprimera tous les marqueurs."
