  quasi_stellar_01_key:0 "Calibrateur quasi-stellaire"
  quasi_stellar_wormhole_01_key:0 "Trou de ver quasi-stellaire"
  qso_intensity_verylow:0 "OQS : Charge très faible"
  qso_intensity_verylow_desc:0 "L'OQS charge très lentement, une grande partie de sa production est convertie en énergie."
  qso_intensity_veryhigh:0 "OQS : Charge très élevée"
  qso_intensity_veryhigh_desc:0 "L'OQS est surchargé, beaucoup d'énergie est utilisée pour augmenter sa production."
  qso_intensity_extremely:0 "OQS : Charge extrême"
  qso_intensity_extremely_desc:0 "L'OQS est fortement surchargé, des quantités massives d'énergie sont dépensées pour augmenter sa production."
  qso_intensity_insane:0 "OQS : Charge insensée"
  qso_intensity_insane_desc:0 "L'OQS est surchargé de manière insensée, des quantités énormes d'énergie sont nécessaires pour le maintenir."
  qso_intensity_physicslimits:0 "OQS : Charge « Oui »"
  qso_intensity_physicslimits_desc:0 "L'OQS est surchargé au maximum."
  giga_tech_repeatable_academy_cap:0 "Protocoles de gestion de bastion orbital"
  giga_tech_repeatable_academy_cap_desc:0 "Protocoles avancés de construction et de maintenance pour permettre la construction et la gestion de §Ybastions orbitaux§! supplémentaires à l'intérieur des frontières de notre empire."
  giga_academy_capacity_increase_title:0 "Capacité de §Ybastion orbital§! : §G+1§!"
  giga_academy_capacity_increase_desc:0 "La capacité de l'empire pour les §Ybastions orbitaux§! est augmentée de §G+1§!"
  giga_tech_orbital_bastion:0 "Bastions militaires orbitaux superscalaires"
  giga_tech_orbital_bastion_desc:0 "À mesure que la flotte de notre empire grandit, ses besoins aussi. Une solution aux besoins toujours croissants de la flotte est de construire des $name_orb_bastion$s massifs, abritant de vastes réseaux d'équipements militaires pour soutenir notre flotte."
  orbital_bastion_desc:0 "Un vaste complexe militaire qui aide à gérer notre armée."
  giga_dialog.601.name:0 "Site de construction du $name_orb_bastion$ terminé."
  giga_dialog.601.desc:0 "La zone d'entraînement et plusieurs casernes sont terminées. L'entraînement peut commencer.\nNous devons cependant améliorer cette station pour qu'elle bénéficie à notre empire."
  giga_dialog.602.name:0 "$name_orb_bastion$ terminé."
  giga_dialog.602.desc:0 "Nos casernes orbitales dans le système [giga_system.GetName] sont maintenant améliorées en bastion ! Avec cette installation terminée, nous sommes en mesure de former plus efficacement un grand nombre de personnel. Les simulateurs holographiques et les arènes en gravité zéro en font un endroit merveilleux pour enseigner à nos pilotes et soldats."
  giga_dialog.603.name:0 "Quartier général d'administration terminé."
  giga_dialog.603.desc:0 "Le bastion du système [giga_system.GetName] a été amélioré en quartier général d'administration. Avec cela, les besoins logistiques de l'armée sont satisfaits, et même étendus. Abritant des milliers de soldats et de pilotes entraînés, cette construction bénéficiera grandement à notre capacité militaire."
  giga_dialog.604.name:0 "Quartier général d'amiral terminé."
  giga_dialog.604.desc:0 "Un grand jour pour notre armée. Notre quartier général d'administration a maintenant été transformé en quartier général d'amiral. Avec cela, l'un de nos meilleurs amiraux dispose maintenant d'une base d'opérations personnelle. Comprend un système d'interphone complémentaire connecté à tous les vaisseaux de la flotte, pour de grandes capacités de hurlement. Fournit d'incroyables bonus à nos armadas."
  orbital_bastion_0:0 "$gc_mega$Site de construction du $name_orb_bastion$"
  orbital_bastion_0_DESC:0 "Une simple station d'entraînement ordinaire. Rien de très spécial ici. Ne fournit actuellement aucun bonus. Une armature pour construire un bastion militaire."
  orbital_bastion_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_military$\nAugmente la §Ycapacité navale§! et la §Ylimite de commandement§!\n§LUne grande structure orbitale abritant diverses installations pour améliorer les capacités de notre flotte militaire. Fournit divers bonus à nos flottes."
  orbital_bastion_1:0 "$name_orb_bastion$"
  orbital_bastion_1_DESC:0 "Plusieurs divisions de troupes s'entraînent et stationnent ici, avec tout l'équipement, la logistique et le personnel administratif que cela implique. Sergents instructeurs complémentaires. Dispose de plusieurs ancrages pour soutenir nos flottes."
  orbital_bastion_2:0 "Branche d'administration militaire"
  orbital_bastion_2_DESC:0 "Un complexe massif soutenant la marine, et toutes les exigences logistiques que cela implique."
  orbital_bastion_3:0 "Opérations de l'amirauté"
  orbital_bastion_3_DESC:0 "Le siège d'un officier militaire majeur, pour faciliter les opérations. Équipé de dizaines de cales sèches et d'ancrages, cette puissante structure aide à réduire la charge de gestion d'une armada galactique."
  quasi_stellar_marker_cluster:0 "Marqueur de cible de l'O.Q.-S."
  quasi_stellar_marker_cluster_DESC:0 "Un marqueur de cible virtuel qui désigne la malheureuse cible de l'O.Q.-S."
  quasi_stellar_marker_cluster_MEGASTRUCTURE_DETAILS:0 "Placer au-dessus d'une étoile pour la cibler avec l'O.Q.-S."
  quasi_stellar_marker_cluster_open:0 "Trou de ver de l'O.Q.-S."
  quasi_stellar_marker_cluster_open_DESC:0 "Un $name_quasistellar$ est sur le point de tirer à travers ce trou de ver."
  quasi_stellar_marker_cluster_firing:0 "Trou de ver de l'O.Q.-S."
