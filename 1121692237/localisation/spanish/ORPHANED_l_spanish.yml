  giga_qso.1.name:0 "Panel de Control de $name_quasistellar$"
  giga_qso.1.desc:0 "Bienvenido al panel de control de $name_quasistellar$.\n\nAquГ­, puedes elegir un objetivo para la hiperarma, o configurar sus parГЎmetros.\n\nElegir un objetivo te permitirГЎ apuntar a una estrella, un planeta o una flota. Recuerda que disparar el E-QE requiere ВЈgiga_sr_quasaric_energyВЈВ§YEnergГ­a CuГЎsaricaВ§!, generada por la megaestructura en sГ­.\n\nVer los parГЎmetros te permitirГЎ alterar la tasa de carga de la arma, aumentando o disminuyendo la cantidad de ВЈgiga_sr_quasaric_energyВЈВ§YEnergГ­a CuГЎsaricaВ§! acumulada por nuestro E-QE.\n\nВ§BEste menГє tambiГ©n se puede acceder directamente a travГ©s de un edicto.В§!"
  giga_qso.1.fire:0 "Elegir Objetivo"
  giga_qso.1.parameters:0 "Ver ParГЎmetros"
  giga_qso.1.quit:0 "Salir del Panel de Control"
  giga_qso.1.menu:0 "Volver al MenГє"
  giga_qso.10.name:0 "$name_quasistellar$: SelecciГіn de Objetivo"
  giga_qso.10.desc:0 "AquГ­, puedes seleccionar lo que deseas apuntar con el E-QE. Por favor, lee cГіmo funciona cada mГ©todo de selecciГіn de objetivo correctamente. Ten en cuenta que destruir objetivos mГЎs grandes requerirГЎ mГЎs ВЈgiga_sr_quasaric_energyВЈВ§YEnergГ­a CuГЎsaricaВ§!."
  giga_qso.10.fleet:0 "Destruir una В§GFlotaВ§!"
  giga_qso.10.planet:0 "Destruir un В§YPlanetaВ§!"
  giga_qso.10.star:0 "Destruir un В§HSistema SolarВ§!"
  giga_qso.10.starcluster:0 "Destruir un В§RCГєmulo de EstrellasВ§!"
  giga_qso.200.name:0 "$name_quasistellar$: В§GDestrucciГіn de FlotaВ§!"
  giga_qso.200.desc:0 "Has elegido apuntar a una flota enemiga con el $name_quasistellar$. Esto costarГЎ В§Y20В§! ВЈgiga_sr_quasaric_energyВЈ\n\nUna nave especial, utilizada para calibrar la punterГ­a del E-QE, serГЎ creada cerca de la estructura. EstГЎ equipada con un Motor de Salto especial, de alcance ilimitado. Mueve esta nave al sistema que contiene la flota objetivo, y luego vuelve a abrir el panel de control para confirmar.\n\nLa nave tendrГЎ que permanecer viva durante В§Y5 dГ­asВ§! mientras se calibra el hiperarma, asГ­ que asegГєrate de que estГ© debidamente escoltada.\n\nUna vez que hayan pasado estos 5 dГ­as, el E-QE dispararГЎ a travГ©s de un agujero de gusano, directamente a la flota enemiga, durante 30 dГ­as. Sin embargo, el agujero de gusano puede ser interrumpido por fuego enemigo, por lo que no se recomienda dejarlo solo.\n\nSi deseas cancelar la operaciГіn, desmantela la nave o usa el Panel de Control."
  giga_qso.200.yes:0 "Procedamos."
  giga_qso.201.name:0 "Calibrador Cuasi-Estelar Ensamblado"
  giga_qso.201.desc:0 "Nuestro E-QE ha ensamblado una pequeГ±a nave Calibrador Cuasi-Estelar. Se utilizarГЎ para calibrar y apuntar correctamente el agujero de gusano a travГ©s del cual dispararГЎ el hiperarma. Para comenzar la secuencia de disparo, usa su motor de salto para moverla al sistema que contiene la flota objetivo."
  giga_qso.201.a:0 "Entendido."
  giga_qso.202.name:0 "Calibrador Cuasi-Estelar Desmantelado"
  giga_qso.202.desc:0 "Hemos desmantelado nuestro Calibrador Cuasi-Estelar. El procedimiento de destrucciГіn ha sido cancelado."
  giga_qso.202.a:0 "Entendido."
  giga_qso.203.name:0 "Calibrador Cuasi-Estelar Destruido"
  giga_qso.203.desc:0 "Nuestro Calibrador Cuasi-Estelar ha sido destruido por fuerzas hostiles. El procedimiento de destrucciГіn ha sido cancelado."
  giga_qso.203.a:0 "Entendido."
  giga_qso.204.name:0 "$name_quasistellar$: В§GDestrucciГіn de la FlotaВ§!"
  giga_qso.204.desc:0 "Si has colocado el Calibrador Cuasi-Estelar en el sistema correcto, selecciona la primera opciГіn. TendrГЎs que protegerlo durante 5 dГ­as. Si deseas cancelar, selecciona la tercera opciГіn, que desmantelarГЎ el Calibrador."
  giga_qso.204.fire:0 "ВЎComienza la calibraciГіn! Costo: В§Y20В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.204.markers:0 "El Calibrador aГєn no estГЎ en su lugar."
  giga_qso.205.name:0 "Calibrando el Exterminador"
  giga_qso.205.desc:0 "Nuestro $name_quasistellar$ ha comenzado a calibrar su arma usando la nave Calibrador. Debemos asegurarnos de que no sea destruida durante 5 dГ­as, despuГ©s de lo cual nuestro superarma desatarГЎ un rayo de pura destrucciГіn sobre nuestros enemigos. El E-QE dispararГЎ durante unos 30 dГ­as, despuГ©s de lo cual el agujero de gusano desaparecerГЎ y el E-QE estarГЎ nuevamente listo para su uso."
  giga_qso.205.a:0 "Excelente."
  giga_qso.206.name:0 "$name_quasistellar$: CalibraciГіn Completa"
  giga_qso.206.desc:0 "Nuestro $name_quasistellar$ ha terminado de calibrar su hiperarma y el agujero de gusano, y ahora desatarГЎ su furia sobre la desafortunada flota que designamos como objetivo."
  giga_qso.206.a:0 "Excelente. Que ardan"
  giga_qso.400.name:0 "$name_quasistellar$: В§RDestrucciГіn del CГєmulo EstelarВ§!"
  giga_qso.400.desc:0 "Has elegido destruir una estrella y cada uno de sus vecinos inmediatos de hipervГ­as. Para hacerlo, usa una nave de construcciГіn para construir un В§BMarcador de Objetivos E-QEВ§! sobre las estrellas que deseas destruir.\n\nSe construye instantГЎneamente, y no requiere que la nave de construcciГіn estГ© fГ­sicamente presente en el sistema.\n\nВ§RВЎEl sistema sin embargo tiene que estar libre de hostilesВ§!\nPuedes usar la funciГіn de DestrucciГіn de la Flota E-QE para facilitar esto.\n\nUna vez que los marcadores de objetivo hayan sido construidos, regresa al E-QE y abre el Panel de Control una vez mГЎs para disparar el dispositivo.\n\nВ§BВЎLa explosiГіn serГЎ tan poderosa que se propagarГЎ a travГ©s de los hipervГ­as, resultando en la destrucciГіn completa del sistema objetivo, junto con cada sistema conectado a Г©l, y sus hipervГ­as serГЎn eliminados, dejando nada mГЎs que espacio vacГ­oВ§!"
  giga_qso.401.name:0 "В§RDestrucciГіn del CГєmulo EstelarВ§!"
  giga_qso.401.desc:0 "Si has apuntado a la estrella en el nГєcleo del cГєmulo que deseas destruir, selecciona la primera opciГіn. Si deseas cancelar, selecciona la tercera opciГіn, que eliminarГЎ el marcador."
  giga_qso.401.fire:0 "ВЎDestruye un cГєmulo estelar, fuego! Costo: В§Y120В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.401.markers:0 "AГєn no hemos apuntado a la estrella."
  giga_qso.300.name:0 "$name_quasistellar$: В§HDestrucciГіn del Sistema SolarВ§!"
  giga_qso.300.desc:0 "Has elegido destruir una o varias estrellas y sus sistemas planetarios enteros. Para hacerlo, usa una nave de construcciГіn para construir un В§BMarcador de Objetivos E-QEВ§! sobre las estrellas que deseas destruir.\n\nSe construye instantГЎneamente y no requiere que la nave de construcciГіn estГ© fГ­sicamente presente en el sistema.\n\nВ§RLos sistemas, sin embargo, deben ser despejados de hostiles.В§!\nPuedes usar la funciГіn DestrucciГіn de Flotas E-QE para facilitar esto.\n\nPuedes apuntar hasta 4 estrellas a la vez, cada una aГ±adiendo 40ВЈgiga_sr_quasaric_energyВЈ al costo total de disparo. Si un sistema tiene mГєltiples estrellas, solo necesitas apuntar a una de ellas.\n\nUna vez que los marcadores de objetivo hayan sido construidos, regresa al E-QE y abre el Panel de Control una vez mГЎs para disparar el dispositivo.\n\nВ§BLa salida de energГ­a de $name_quasistellar$ es tan alta que puede destruir Estrellas de Neutrones, Pulsares e incluso Agujeros Negros, ya que el flujo de energГ­a es tan alto que el espacio-tiempo en sГ­ se invierte literalmente, y el Agujero Negro se evapora en la nada.\n\nВ§BTodas las hipervГ­as conectadas a los sistemas desaparecerГЎn una vez que los sistemas sean destruidos.В§!"
  giga_qso.301.name:0 "$name_quasistellar$: В§HDestrucciГіn del Sistema SolarВ§!"
  giga_qso.301.desc:0 "Si has apuntado a todas las estrellas que deseas destruir, selecciona la primera opciГіn. Si deseas cancelar, selecciona la tercera opciГіn, que eliminarГЎ todos los marcadores."
  giga_qso.301.markers:0 "TodavГ­a necesitamos apuntar a mГЎs estrellas antes de disparar."
  giga_qso.301.fire.1:0 "Destruir 1 sistema solar, ВЎfuego! Costo: В§Y40В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.301.fire.2:0 "Destruir 2 sistemas solares, ВЎfuego! Costo: В§Y80В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.301.fire.3:0 "Destruir 3 sistemas solares, ВЎfuego! Costo: В§Y120В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.301.fire.4:0 "Destruir 4 sistemas solares, ВЎfuego! Costo: В§Y160В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.100.name:0 "$name_quasistellar$: В§YDestrucciГіn de PlanetasВ§!"
  giga_qso.100.desc:0 "Has elegido destruir uno o varios planetas. Para hacerlo, usa una nave de construcciГіn para construir una megaestructura В§BMarcador de Objetivos E-QEВ§! sobre los planetas que deseas destruir.\n\nSe construyen instantГЎneamente y no requieren que la nave de construcciГіn estГ© fГ­sicamente presente en el sistema. AsegГєrate de que la nave de construcciГіn no estГ© en postura evasiva.\n\nPuedes apuntar hasta 10 planetas a la vez, cada uno aГ±adiendo 5ВЈgiga_sr_quasaric_energyВЈ al costo total de disparo, con un mГЎximo de 50.\n\nUna vez que los marcadores de objetivo hayan sido construidos, regresa al E-QE y abre el Panel de Control una vez mГЎs para disparar el dispositivo."
  giga_qso.101.name:0 "$name_quasistellar$: В§YDestrucciГіn de PlanetasВ§!"
  giga_qso.101.desc:0 "Si has apuntado a todos los planetas que deseas destruir, selecciona la primera opciГіn. Si deseas cancelar, selecciona la tercera opciГіn, que eliminarГЎ todos los marcadores."
  giga_qso.101.fire.1:0 "Destruye 1 planeta, ВЎfuego! Costo: В§Y5В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.101.fire.2:0 "Destruye 2 planetas, ВЎfuego! Costo: В§Y10В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.101.fire.3:0 "Destruye 3 planetas, ВЎfuego! Costo: В§Y15В§! ВЈgiga_sr_quasaric_energyВЈ"
  giga_qso.101.fire.4:0 "Destruye 4 planetas, ВЎfuego! Costo: В§Y20В§! ВЈgiga_sr_quasaric_energyВЈ"
