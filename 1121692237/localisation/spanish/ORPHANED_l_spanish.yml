  giga_qso.500.name:0 "$name_quasistellar$: ParГЎmetros"
  giga_qso.500.desc:0 "AquГ­, puedes configurar algunos aspectos del E-QE en sГ­.\n\nAlterar la tasa de carga modificarГЎ la salida de ВЈgiga_sr_quasaric_energyВЈ de la hiperarma. Una tasa de carga mГЎs baja generarГЎ menos, pero darГЎ algo de ВЈenergyВЈ a cambio, convertido de ВЈgiga_sr_quasaric_energyВЈ. Una tasa de carga mГЎs alta generarГЎ mГЎs, pero costarГЎ algo de ВЈenergyВЈ a cambio, ya que es necesario sobrecargar la estructura.\n\nTambiГ©n puedes optar por arrojar algunos recursos (ВЈmineralsВЈ ВЈfoodВЈ ВЈconsumer_goodsВЈ ВЈalloysВЈ ВЈpopsВЈ) en el quГЎsar. Los recursos colisionarГЎn con el brillante disco de acreciГіn y generarГЎn una cascada de partГ­culas altamente energГ©ticas que luego se pueden usar para proporcionar algo mГЎs de ВЈgiga_sr_quasaric_energyВЈ a la hiperarma."
  giga_qso.501.name:0 "$name_quasistellar$: Vertido de Recursos"
  giga_qso.501.desc:0 "Puedes arrojar varios recursos en el cuГЎsar supermasivo para alimentar el brillante disco de acreciГіn y generar energГ­a para convertirla en ВЈgiga_sr_quasaric_energyВЈ\n\nPor favor, elige quГ© deseas arrojar en el quГЎsar."
