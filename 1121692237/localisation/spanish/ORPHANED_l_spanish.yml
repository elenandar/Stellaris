  giga_dialog.4003.name:0 "$name_terraform_molten$ Completo!"
  giga_dialog.4003.desc:0 "Nuestro $name_terraform_molten$ ahora estГЎ completo. Con la adiciГіn de tres grandes haces de enfriamiento y taladros lГЎser a escala hiper, podremos enfriar y estabilizar la actividad geolГіgica de este mundo. Ahora, debemos comenzar el proceso de terraformaciГіn real."
  giga_dialog.4003.a:0 "Lo haremos de inmediato."
  terraform_molten_2_DESC:0 "Un $name_terraform_molten$ completo, equipado con un conjunto de grandes enfriadores orbitales y taladros lГЎser para enfriar y estabilizar la superficie del planeta. Todo lo que queda por hacer ahora es comenzar el proceso de terraformaciГіn real."
  terraform_molten_3:0 "Comenzar TerraformaciГіn"
  terraform_molten_3_DESC:0 "Ordena a la tripulaciГіn de $name_terraform_molten$ que comience a transformar la superficie fundida de este planeta y su composiciГіn tectГіnica en algo que pueda ser habitado por la mayorГ­a de las formas de vida."
  giga_dialog.3803.name:0 "Generador AtmosfГ©rico de $name_terraform_barren$ Construido"
  giga_dialog.3803.desc:0 "El Generador AtmosfГ©rico de $name_terraform_barren$ acaba de ser construido. Esta gran red que rodea un mundo estГ©ril es capaz de generar grandes cantidades de atmГіsfera y puede modificar el clima de este planeta a voluntad.\nTodo lo que queda por hacer ahora es comenzar el proceso de terraformaciГіn."
  giga_dialog.3803.a:0 "Genial."
  terraform_barren_2_DESC:0 "El $name_terraform_barren$ ahora estГЎ equipado con una gran matriz de dispositivos de manipulaciГіn atmosfГ©rica, que pueden sembrar una atmГіsfera respirable y agua en la superficie de este mundo. Todo lo que queda por hacer ahora es comenzar el proceso."
  terraform_barren_3:0 "Comenzar la TerraformaciГіn"
  terraform_barren_3_DESC:0 "Ordenar a la tripulaciГіn de $name_terraform_barren$ que comience el proceso a gran escala de reactivaciГіn del campo magnГ©tico de este planeta e implemente posteriormente una atmГіsfera respirable y una hidrosfera estable."
  giga_dialog.3903.name:0 "Macromanipuladores de $name_terraform_toxic$ Construidos"
  giga_dialog.3903.desc:0 "ВЎLos Macromanipuladores de un $name_terraform_toxic$ ahora estГЎn completos! Consisten en dos bombas masivas, capaces de extraer e inyectar enormes cantidades de gases dentro y fuera de la atmГіsfera de un planeta.\n\nCon el $name_terraform_toxic$ ahora completo, debemos comenzar el proceso de terraformaciГіn en sГ­..."
  giga_dialog.3903.a:0 "FantГЎstico."
  terraform_toxic_2:0 "$name_terraform_toxic$ Macromanipuladores"
  terraform_toxic_2_DESC:0 "Este $name_terraform_toxic$ ha sido equipado con dos bombas masivas, capaces de manipular la atmГіsfera de un planeta, haciГ©ndola mГЎs o menos densa, y redistribuyendo sus gases constituyentes."
  terraform_toxic_3:0 "Comenzar la TerraformaciГіn"
  terraform_toxic_3_DESC:0 "Ordenar a la tripulaciГіn del Manipulador AtmosfГ©rico que comience a transformar la atmГіsfera y la hidrosfera de este planeta en algo que pueda ser habitado por la mayorГ­a de las formas de vida."
  giga_dialog.3502.name:0 "$name_crystal_megabore$ Centro Principal Completo"
  giga_dialog.3502.desc:0 "Nuestros ingenieros ahora han completado la construcciГіn del centro principal de nuestro $name_crystal_megabore$ en el sistema [giga_system.GetName]. Orbitando alrededor de un mundo fundido, esta masiva estaciГіn espacial alberga forjas y refinerГ­as especializadas en purificar roca fundida en cristales raros, lo cual es indispensable si deseamos cosechar eficientemente el mundo debajo."
  giga_dialog.3502.a:0 "Bueno."
  giga_dialog.3503.name:0 "$name_crystal_megabore$ Gravitogenerador Completo"
  giga_dialog.3503.desc:0 "ВЎNuestro Gravitogenerador $name_crystal_megabore$ ahora estГЎ completo! Esta gran estructura rodea completamente el centro del Megataladro y le proporcionarГЎ energГ­a. TambiГ©n servirГЎ como catalizador para el taladro principal del Megataladro y amplificarГЎ drГЎsticamente la fuerza de su haz tractor gravitacional."
  giga_dialog.3503.a:0 "Maravilloso."
  crystal_megabore_2:0 "Gravitogenerador $name_crystal_megabore$"
  crystal_megabore_2_DESC:0 "El Gravitogenerador juega un papel crucial en la minerГ­a del planeta de abajo, ya que proporciona energГ­a y actГєa como un catalizador para la perforadora principal del Taladro."
  crystal_megabore_3_DESC:0 "Un $name_crystal_megabore$ completamente operativo, extrayendo enormes cantidades de cristales y minerales directamente del nГєcleo fundido de un planeta."
  giga_dialog.401.name:0 "ConstrucciГіn $name_eng_test_site$"
  giga_dialog.401.desc:0 "Se ha terminado la construcciГіn de una gran $name_eng_test_site$ en el sistema [giga_system.GetName]. Cuando estГ© terminada, esta maravillosa estaciГіn serГЎ un lugar ideal para probar muchos diseГ±os de ingenierГ­a, desde estaciones orbitales hasta nuevos diseГ±os de naves espaciales. El planeta que orbita se convertirГЎ en un campo de pruebas para ingenierГ­a innovadora."
  giga_dialog.401.a:0 "Buen trabajo."
  giga_dialog.402.name:0 "$name_eng_test_site$ Construido"
  giga_dialog.402.desc:0 "El $name_eng_test_site$ Construido ubicado en el sistema [giga_system.GetName] ya estГЎ operativo. ServirГЎ como campo de pruebas para los diseГ±os mГЎs complejos y potencialmente mortales de nuestros ingenieros para cosas como naves espaciales y edificios. Los experimentos ya estГЎn comenzando sobre el planeta y podemos esperar muchos mГЎs en un futuro cercano, lo que impulsarГЎ enormemente nuestra investigaciГіn de ingenierГ­a."
  giga_dialog.402.a:0 "Maravilloso."
  giga_dialog.404.name:0 "$name_eng_test_site$ Reparado!"
  giga_dialog.404.desc:0 "Un $name_eng_test_site$ previamente en ruinas ha sido completamente reparado por nuestros equipos de construcciГіn.\n\nAhora estГЎ completamente operativo, y podemos comenzar a utilizarlo para fines cientГ­ficos."
  giga_dialog.404.a:0 "Maravilloso."
