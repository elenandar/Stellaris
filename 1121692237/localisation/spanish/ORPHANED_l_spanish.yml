  giga_academy_capacity_increase_title:0 "Capacidad de В§YBastiГіn OrbitalВ§!: В§G+1В§!"
  giga_academy_capacity_increase_desc:0 "La capacidad del imperio para В§YBastiones OrbitalesВ§! se incrementa en В§G+1В§!"
  giga_tech_orbital_bastion:0 "Bastiones Militares Orbitales a Gran Escala"
  giga_tech_orbital_bastion_desc:0 "A medida que la flota de nuestro imperio crece, tambiГ©n lo hacen sus necesidades. Una soluciГіn a las necesidades cada vez mayores de la flota es construir masivos $name_orb_bastion$s, albergando vastos arreglos de equipos militares para apoyar nuestra flota."
  orbital_bastion_desc:0 "Un complejo militar vasto que ayuda en la gestiГіn de nuestro militar."
  giga_dialog.601.name:0 "Emplazamiento del $name_orb_bastion$ Completado."
  giga_dialog.601.desc:0 "El ГЎrea de entrenamiento y varios cuarteles estГЎn completos. El entrenamiento puede comenzar.\nSin embargo, necesitamos mejorar esta estaciГіn para que beneficie a nuestro imperio."
  giga_dialog.602.name:0 "$name_orb_bastion$ Completado."
  giga_dialog.602.desc:0 "Nuestros cuarteles orbitales en el sistema [giga_system.GetName] ahora se han mejorado a un BastiГіn! Con esta instalaciГіn completa, somos capaces de entrenar de manera mГЎs efectiva a un gran nГєmero de personal. Simuladores hologrГЎficos y arenas de gravedad cero hacen de este un lugar maravilloso para enseГ±ar a nuestros pilotos y soldados por igual."
  giga_dialog.603.name:0 "Sede de AdministraciГіn Completada."
  giga_dialog.603.desc:0 "El BastiГіn del Sistema [giga_system.GetName] ha sido mejorado a una Sede de AdministraciГіn. Con esto completo, los requisitos logГ­sticos del militar se cumplen y se expanden. Albergando miles de soldados y pilotos entrenados, esta construcciГіn beneficiarГЎ enormemente nuestra capacidad militar."
  giga_dialog.604.name:0 "Sede del Almirante Completada."
  giga_dialog.604.desc:0 "Un gran dГ­a para nuestro militar. Nuestra Sede de AdministraciГіn ahora se ha convertido en una Sede del Almirante. Con esto completo, uno de nuestros almirantes principales ahora tiene una Base de Operaciones personal. Incluye un sistema de intercomunicaciГіn complementario conectado a todos los naves de la flota, para grandes capacidades de gritar. Proporciona increГ­bles mejoras a nuestras armadas."
  orbital_bastion_0:0 "$gc_mega$$name_orb_bastion$ Emplazamiento"
  orbital_bastion_0_DESC:0 "Solo tu estaciГіn de entrenamiento del montГіn. Nada especial aquГ­. Actualmente no proporciona bonificaciones. Un marco para construir un bastiГіn militar."
  orbital_bastion_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_military$\nAumenta В§YCapacidad NavalВ§! y В§YLГ­mite de ComandoВ§!\nВ§LUna gran estructura orbital que alberga varias instalaciones para mejorar la capacidad de nuestra flota militar. Proporciona varias mejoras a nuestras flotas."
  orbital_bastion_1_DESC:0 "Varias divisiones de tropas entrenan y se estacionan aquГ­, con todo el equipo, logГ­stica y personal administrativo que eso conlleva. Sargentos de Taladro Complementarios. Cuenta con mГєltiples anclajes para apoyar nuestras flotas."
  orbital_bastion_2:0 "Rama de AdministraciГіn Militar"
  orbital_bastion_2_DESC:0 "Un complejo masivo que apoya a la marina y todos los requisitos logГ­sticos que eso conlleva."
  orbital_bastion_3:0 "Operaciones de la Almirantazgo"
  orbital_bastion_3_DESC:0 "El asiento de un importante Oficial Militar, para facilitar las operaciones. Equipado con docenas de diques secos y anclajes, esta poderosa estructura ayuda a reducir la tensiГіn de gestionar una armada galГЎctica."
