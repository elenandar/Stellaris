  #########################################
  ### Mega Deposits ######################
  #########################################
  
  d_small_natural_tunnel:0 "Túnel de Boreas"
  d_small_natural_tunnel_desc:0 "Un pequeño túnel natural que conecta un gran lago ubicado en medio de uno de los continentes del planeta con el océano. Su existencia parece desafiar todas las leyes de la naturaleza y la razón, llevando a los nativos a creer que fue creado por los dioses mismos."
  
  
  #########################################
  ### Flavor Deposits #####################
  #########################################
  
  d_arcane_mineral_generator:0 "Transmutador Arcano"
  d_arcane_mineral_generator_desc:0 "Un antiguo dispositivo de fabricación arcana que produce recursos minerales aparentemente de la nada."
  
  d_giga_orbital_effects:0 "Red de Transporte del Sistema"
  d_giga_orbital_effects_desc:0 "El $name_giga_orbital$ en este sistema domina la planificación logística local."
  
  d_pcc_origin_blocker:0 "Conducto Decaído"
  d_pcc_origin_blocker_desc:0 "Grandes porciones de los enormes arreglos de procesamiento del planeta actualmente son inaccesibles desde nuestras instalaciones de investigación debido a conexiones dañadas entre las subsecciones computacionales."
  
  d_giga_rogue_ai_relay_servers:0 "Arreglos de Procesadores Rebeldes"
  d_giga_rogue_ai_relay_servers_desc:0 "Vastos arreglos de procesadores y servidores utilizados por la IA Rebelde para proyectar su poder sobre el Complejo de Computación Planetaria con el fin de combatirnos en cada turno saboteando la infraestructura e intentando activamente matar a nuestros colonos."
  
  d_giga_rogue_ai_corrupt_code:0 "Código Corrupto"
  d_giga_rogue_ai_corrupt_code_desc:0 "Grandes fragmentos de las bases de datos del Complejo de Computación Planetaria están llenos de código bloatware peligroso, que impide activamente nuestros esfuerzos científicos en este planeta."
  
  d_ringworld_capital_city:0 "La Gran Capital"
  d_ringworld_capital_city_desc:0 "Una gran ciudad capital construida en el anillo del mundo. Este lugar sirve como un centro central para el segmento del anillo del mundo y proporciona a la población local varios servicios."
  
  d_interstellar_ringworld_commerce_blocker:0 "Infraestructura Abandonada"
  d_interstellar_ringworld_commerce_blocker_desc:0 "Como el anillo del mundo ofrece una cantidad casi infinita de espacio, se dio poca consideración al re-desarrollo de la tierra, lo que llevó a grandes extensiones de tierra llenas de edificios abandonados desde hace mucho tiempo. Si estos territorios se despejan y se vuelven a desarrollar, las empresas locales podrán crecer considerablemente, aumentando la riqueza del imperio."
  
  d_great_ring_excavated_mountain:0 "Nodo del Sistema de Autorreparación del Mundo Anillo"
  d_great_ring_excavated_mountain_desc:0 "Un nodo expuesto del sistema de auto-reparación automatizado del anillo. Genera continuamente la materia necesaria para mantener la megaestructura en forma operativa. Y si somos cuidadosos, podemos desviar algo de esa materia para ser utilizada para nuestras propias necesidades sin comprometer nuestro hogar artificial."
  
  d_giga_arcane_generator:99 "$d_arcane_generator$"
  d_giga_arcane_generator_desc:99 "$d_arcane_generator_desc$"
  
  
  d_decrepit_tunnels_squareworld:99 "$d_decrepit_tunnels_1$"
  d_decrepit_tunnels_squareworld_desc:99 "$d_decrepit_tunnels_1_desc$"
  
  d_predictable_solar_flares:99 "Predictable Solar Flares"
  d_predictable_solar_flares_desc:99 "The star our homeworld orbits around exhibits specific behavior preceding a solar flare, making energy extraction significantly easier."
  
  d_everfree_forest:0 "Bosque Everfree"
  d_everfree_forest_desc:0 "Un bosque peculiar y casi impenetrable lleno de energías aparentemente mágicas. Despejarlo sería una tarea de proporciones mamut, pero estudiar su ecosistema esotérico seguramente produciría datos intrigantes."
  
  d_giga_decrepit_tunnels_1:99 "$d_decrepit_tunnels_1$"
  d_giga_decrepit_tunnels_1_desc:99 "$d_decrepit_tunnels_1_desc$"
  
  d_giga_decrepit_tunnels_2:99 "$d_decrepit_tunnels_1$"
  d_giga_decrepit_tunnels_2_desc:99 "$d_decrepit_tunnels_1_desc$"
  
  d_giga_decrepit_tunnels_3:99 "$d_decrepit_tunnels_1$"
  d_giga_decrepit_tunnels_3_desc:99 "$d_decrepit_tunnels_1_desc$"
  
  d_ehof_solar_array:0 "Colectores Solares Prístinos"
  d_ehof_solar_array_desc:99 ""
  
  d_flusio_arcology_wreck:0 "Ciudades Megadestruidas"
  d_flusio_arcology_wreck_desc:0 "Ciudades parcial o completamente destruidas en los combates que ocurrieron en la Flusio-Arcología."
  d_flusio_arcology_anarchy:0 "Anarquía Flusioniana"
  d_flusio_arcology_anarchy_desc:0 "Grandes extensiones de Flusion han caído en completa anarquía como resultado del daño colateral de los devastadores combates para desalojar al Kaiser del planeta."
  
  d_flusio_arcology_administration:99 "Flusio-Arcology Administration"
  d_flusio_arcology_administration_desc:99 "Administering the logistical nightmare that surrounds Flusion is no easy task. Due to the immense number of districts the Flusio-Arcology can support, more care must be taken to manage it properly."
  
  d_flusio_arcology_administration_tooltip:99 "[giga_flusion_administration_mechanics]"
  
  d_solaktropa_project:0 "Proyecto Roqualtropa"
  d_solaktropa_project_desc:0 "El Proyecto Roqualtropa crea vastas cantidades de tierra utilizable para que los Katzens construyan, así como enormes cantidades de agua para la agricultura, a costa de perturbar el clima natural de Flusion."
  
  d_solaktropa_project_wreck:0 "Ruina de Roqualtropa"
  d_solaktropa_project_wreck_desc:0 "La destrucción de la Presa Roqualtropa ha causado cantidades incalculables de devastación a Flusion y sus habitantes."
  
  d_katlantropa_project:0 "Proyecto Katlantropa"
  d_katlantropa_project_desc:0 "El Proyecto Katlantropa irriga áreas anteriormente desérticas, haciéndolas adecuadas para la agricultura y la irrigación."
  
  d_katlantropa_project_wreck:0 "Desertificación de Katlantropa"
  d_katlantropa_project_wreck_desc:0 "La destrucción de Katlantropa ha revertido áreas anteriormente cultivables en vastos desiertos."
  
  
  #########################################
  ### Birch Deposits ######################
  #########################################
  
  d_aeternum_gigantic_fission_reactor:0 "Reactor de Fisión Colosal"
  d_aeternum_gigantic_fission_reactor_desc:0 "Un extraño reactor de fisión construido por Aeternum en el pasado distante, funcionando con un gigantesco trozo de uranio y produciendo enormes cantidades de electricidad."
  
  d_exp_civ_primitive_preserve:0 "Reserva del Mundo Birch de Civilización Primitiva"
  d_exp_civ_primitive_preserve_desc:0 "Una civilización primitiva completa reside en un fragmento del Mundo Birch. Estudiarlos representa un increíble potencial científico."
  
  d_exp_civ_space_preserve:0 "Reserva del Mundo Birch de Civilización de Edad Espacial"
  d_exp_civ_space_preserve_desc:0 "Una civilización completa de la edad espacial reside en un fragmento del Mundo Birch. Estudiarlos representa un increíble potencial científico."
  
  d_exp_civ_fe_preserve:0 "Reserva del Mundo Birch de Civilización Precursora"
  d_exp_civ_fe_preserve_desc:0 "Una antigua civilización precursora completa reside en un fragmento del Mundo Birch. Estudiarlos representa un increíble potencial científico."
  
  d_aeternum_decaying_hyperstructure:0 "Hiperestructura en Decadencia"
  d_aeternum_decaying_hyperstructure_desc:0 "Grandes extensiones de este Mundo Birch han caído en desuso después de miles de años de abandono. Repararlos sin duda sería una empresa masiva, pero nos permitiría expandir nuevamente el área habitable de este Mundo Birch.\n\nLimpiar esto nos otorgará §G3§! $aeternum_tech_intel$."
  
  