 policy_raidresource_heavy_desc: "Similar as Regular, we will attempt to take all of the resources as many as possible, the life of people on it doesn't matter. This might kill ВЈpopВЈ В§YPopulationsВ§! and destroy ВЈbuildingВЈ В§YBuildingsВ§! in the process, making the raided planet even more devastated. Once raided, the planet cannot be raided again for В§Y10В§! years.\n\n$RAID_GENOCIDE$\n\n$RAID_AUTO$\n\n$RAID_KILL$\n"
