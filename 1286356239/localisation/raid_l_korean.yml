 raidresource.21.desc1_4: "В§H[event_target:rer_planet.GetName]В§!, homeworld of the В§H[event_target:rer_defender.GetSpeciesNamePlural]В§!, has fallen to advancing В§H[event_target:rer_attacker.GetSpeciesAdj]В§! forces." #homeworld
 raidresource.21.desc1_5: "В§H[event_target:rer_planet.GetName]В§!, capital of the В§H[event_target:rer_defender.GetName]В§!, has been captured by the advancing В§H[event_target:rer_attacker.GetSpeciesAdj]В§! armies in the [event_target:rer_system.GetName] system." #capital
 raidresource.21.desc1_6: "The last heavily fortified city of В§H[event_target:rer_planet.GetName]В§!, base of the В§H[event_target:rer_defender.GetName]В§!, has finally succumbed to В§H[event_target:rer_attacker.GetName]В§! attacks."
 raidresource.21.desc1_7: "Earlier today, В§H[event_target:rer_attacker.GetSpeciesAdj]В§! forces successfully occupied В§H[event_target:rer_planet.GetName]В§! in the [event_target:rer_system.GetName] system."
 raidresource.21.desc1_8: "Forces from В§H[event_target:rer_attacker.GetName]В§! have fought their way to В§H[event_target:rer_planet.GetName]В§!, the capital system of В§H[event_target:rer_defender.GetName]В§!." #capital
 raidresource.21.desc1_9: "Fighting in the area of В§H[event_target:rer_planet.GetName]В§! came to an end today, when the last pockets of resistance in the fortress were eliminated by В§H[event_target:rer_attacker.GetAdj]В§! forces."
 raidresource.21.desc1_10: "Further expanding on its conquests in the В§H[event_target:rer_defender.GetName]В§!, В§H[event_target:rer_attacker.GetName]В§! has seized В§H[event_target:rer_planet.GetName]В§! and the В§H[event_target:rer_defender.GetAdj]В§! capital В§H[event_target:rer_planet.GetName]В§!." #capital
 raidresource.21.desc1_11: "After several conflicting reports, it has now been confirmed that В§H[event_target:rer_planet.GetName]В§! has fallen to В§H[event_target:rer_attacker.GetName]В§!."
 raidresource.21.desc1_12: "В§H[event_target:rer_attacker.GetAdj]В§! soldiers entered В§H[event_target:rer_planet.GetName]В§! today, moments after the last В§H[event_target:rer_defender.GetAdj]В§! units retreated from the planet."
 raidresource.21.desc1_13: "The last pockets of В§H[event_target:rer_defender.GetAdj]В§! resistance in В§H[event_target:rer_planet.GetName]В§! were mopped up today, and the planet is now firmly under В§H[event_target:rer_attacker.GetAdj]В§! control."
 raidresource.21.desc1_14: "After a period of fierce combat, it has now been confirmed that В§H[event_target:rer_planet.GetName]В§! of В§H[event_target:rer_defender.GetAdj]В§! in [event_target:rer_system.GetName] systen has fallen to advancing В§H[event_target:rer_attacker.GetAdj]В§! forces."
 
 #Second part
 #capital
 raidresource.21.desc2_1: "Sporadic fighting continues in a few other districts, but organized resistance in the planet seems to have ceased. The loss of the capital is a serious blow to the В§H[event_target:rer_defender.GetName]В§!."
 raidresource.21.desc2_2: "Small-arms fire can still be heard from some regions, but no significant В§H[event_target:rer_defender.GetSpeciesAdj]В§! forces have been sighted within the cities."
 raidresource.21.desc2_3: "Sporadic fighting can still be heard from some suburbs, but a strange calm appears to have settled over the rest of the ruined planetary sectors."
 raidresource.21.desc2_4: "Its loss will severely hamper any В§H[event_target:rer_defender.GetSpeciesNamePlural]В§! attempt to retake the system, and the fall of the В§H[event_target:rer_planet.GetName]В§! is regarded as a significant В§H[event_target:rer_attacker.GetAdj]В§! victory."
 raidresource.21.desc2_5: "As В§H[event_target:rer_attacker.GetAdj]В§! forces retreated further in disarray, В§H[event_target:rer_attacker.GetSpeciesAdj]В§! soldiers marching through main cities of В§H[event_target:rer_planet.GetName]В§!."
 
 raidresource.21.a: "They did not stand a chance."
 raidresource.21.b: "Great news!"