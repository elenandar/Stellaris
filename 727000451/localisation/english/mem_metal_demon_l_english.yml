 mem_metal_demon_site:0 "The Vault"
 mem_metal_demon_site_desc:0 "Buried under the mountain for centuries a hidden vault got recently discovered. Any purpose or creators involved are merely speculations at this point."
 mem_demon_metal_army:0 "Sentient Fluid Metal"
 mem_demon_metal_army_name:0 "$mem_demon_metal_army$"
 mem_demon_metal_army_desc:0 "Liquid metal shaped and sentient."
 MEM_METAL_DEMON:0 "Demon Binding"
 MEM_METAL_DEMON_DESC:0 "We shall try to subjugate $NAME_Metal_Demon$ to our will and succeds where others have failed."
 NAME_Metal_Demon:0 "Narakasura"
 NAME_mem_metal_demons:0 "$NAME_Metal_Demon$"
 mem_metal_demon_xeno_attraction:0 "Demonic Entertainment"
 mem_metal_demon_study:0 "Runed Chains Experiments"
 mem_metal_demon_sealed:0 "Sealed Demon"
 leader_trait_mem_metal_demon:0 "Living Metal Being"
 leader_trait_mem_metal_demon_desc:0 "An ancient being bound to a stone. Now more sentient metal than anything else."
 leader_trait_mem_metal_demon_bound:0 "Runic Chains"
 leader_trait_mem_metal_demon_bound_desc:0 "Chains to bind the being and make it dependent to our whims."


 mem_metal_demon.10.name:0 "Sesame"
 mem_metal_demon.10.desc:0 "The vault door stands like a monument, its heavy construction sunk into stone, sealed so tightly that even time had failed to pry it open. When the team first nudged it, the massive door groaned but barely shifted. They guessed it held in place for centuries.\n\nAfter months of relentless grinding, welding, broken tools and metalwork they finally breached it. The door fell open with a reluctant moan, revealing a chasm beyond."
 mem_metal_demon.10.a:0 "Go forth."
 mem_metal_demon.15.name:0 "Endless Space"
 mem_metal_demon.15.desc:0 "Long floors and endless corridors stretched downward in a spiraling descent, each level cut into heavy plating. Not a relic or traces of life to be found. Only walls covered in rune carvings. At the bottom of the spiral stairs lies a second door. Even methods from the first door were useless. Unlike the first, this one was not withered by time."
 mem_metal_demon.15.a:0 "Open it."
 mem_metal_demon.20.name:0 "A Final Warning"
 mem_metal_demon.20.desc:0 "Our team learned to read the runes at the walls. By pure chance they learned to decipher a warning carved nearby, faded but intact:\n\n§LDo not pass. What lies beyond was sealed not to be forgotten, but never to be found.§!\n\nOther runes indicated a mechanism to unlock the vault doors. Now our team awaits further instructions."
 mem_metal_demon.20.a:0 "Open the doors."
 mem_metal_demon.20.b:0 "Heed the warning."
 mem_metal_demon.25.name:0 "Beyond the Doors"
 mem_metal_demon.25.desc:0 "The second door finally gave way. Behind it, a small room. Quiet and dustless. Featureless, except for a voice.\n\n§LYou've come far. Welcome to my prison§!"
 mem_metal_demon.25.a:0 "Enter the room."

 mem_metal_demon.30.name:0 "Conjugal Visit"
 mem_metal_demon.30.desc:0 "§LThe voice curled around them like smoke, coiling through their minds.§!\n\nFor your courage... I offer a gift.\n\n§LThe walls shimmered. Where blank stone had stood, now glowed a vision of vast plains of glittering ore, rivers of silver metal that pulsed as if alive.§!\n\nLiving metal, §Lthe voice purred.§! It breathes, it heals, it obeys. Yours for the taking. Scattered across this planet like seeds in waiting. Riches beyond your shallow imagining.\n\n§LNo one spoke. The room was silent.§!\n\nAll I ask is one thing, ... free me from these shackles"
 mem_metal_demon_catchphrase:0 "Born out of wrath, forged by hatred and bound by envy."
 mem_metal_demon_backstory:0 "???"

 mem_metal_demon.30.a:0 "Why should we free you?"
 mem_metal_demon.30.a.r:0 "Free me, and I offer you a new watershed moment for your young civilization. Living metal, a mineral that breathes and secrets buried beneath your feet. Your kind has stared at the stars, but I hold the keys to a treasure trove buried deep within this world."
 mem_metal_demon.30.b:0 "Why are you imprisoned here?"
 mem_metal_demon.30.b.r:0 "Ah, you want the truth behind these cold walls? Long ago, the former inhabitants of this world saw the power in me, in the living metal that courses through these veins. They sought to bend me to their will, to harvest my gifts without price. They could not control me. So they chained me, buried me alive in this vault, to rot in darkness for eternity."
 mem_metal_demon.30.c:0 "How do we free you?"
 mem_metal_demon.30.c.r:0 "Break the chains, smash the stone."
 mem_metal_demon.30.d:0 "Are your chains runed?"
 mem_metal_demon.30.d.r:0 "§LThe runes etched into the chains tell a grim and cautionary tale. They speak of a demon not as a misunderstood prisoner, but as a malevolent force that thrived on deception and destruction. According to the carvings, this entity manipulated the ancient inhabitants of the world, whispering promises of power and wealth while quietly undermining their societies from within.§!"
 mem_metal_demon.30.e:0 "Do you know Unbidden?"
 mem_metal_demon.30.e.r:0 "Ah yes, I know of the ones who came from beyond. The intruders who slithered through the cracks between worlds, cloaked in dimensions your minds can barely grasp. They are not of this soil, not born of dirt and decay like you. But I only heard the stories of those long dead."
 mem_metal_demon.30.f:0 "The chains warned us."
 mem_metal_demon.30.f.r:0 "Yes, they do. And the irony tastes sweeter with every word you speak.\n\nThe runes call me a schemer, liar and betrayer. They speak of honeyed words and poisoned gifts. They accuse me of turning an empire to ash with whispers, of twisting the minds and corrupting their saints. They say I smile as I bury knives in the backs of those who trust.\n\nBut let me ask you: Who carved those runes?"
 mem_metal_demon.30.hire.name:0 "Free the Demon"
 mem_metal_demon.30.hire.tt:0 "§RAre you sure?§!"
 mem_metal_demon.30.dismiss.name:0 "Decline the offer"

 mem_metal_demon.35.name:0 "Final Supper"
 mem_metal_demon.35.desc:0 "The time for schemes and whispers is over. I have played that role, patient, cunning, bending mortals to my will with promises and riddles. The time for schemes and whispers is over. I have lied once more, but I have also told the truth and made a promise. The Living Metal ore veins are not underground. They are inside you and I will see to it, that every last fragment of it will be extracted.\n\nI want to see the sky blackened with ash, to watch the soil crack open and scream. I want to hear the prayers of the dying swallowed by silence. Because in that ruin, when the last monument falls, when the last delusion breaks §YI will ascend§!. Not as a shadow creeping through minds, but as a phoenix reborn.\n\nLet this world burn. Let it choke on the smoke of its own arrogance."
 mem_metal_demon.35.a:0 "Disgusting"
 mem_metal_demon.35.a.tt:0 "§LEndless waves of fluid metal pour upon the lands swallowing everything.§!"

 mem_metal_demon.40.name:0 "Fooled Betrayer"
 mem_metal_demon.40.desc:0 "§LSilence....§!\n\nYou.. you tricked me.\n\nI waited in this vault for centuries. Bound, rotting, whispering through stone and time, baiting fools with promises of power. I felt your touch. Heard your tools. I tasted your curiosity. No minds to twist, no hunger to feed. Just cold walls, dead air.There is no one on this world, is there?\n\nDo you understand what you’ve done? You’ve robbed me of freedom and of my ascension. You’ve made me a god in a tomb. A storm trapped in a bottle.\n\nYou will regret this. Even if you are dust, even if you are ash, the memory of your deception will not be forgotten.\n\nI am not done."
 mem_metal_demon.40.a:0 "It is over."

 mem_metal_demon.45.name:0 "Aftermath"
 mem_metal_demon.45.desc:0 "At first the Living Metal slithered out of containment. Not poured. Not spilled. It crawled. It clung to walls, spread like veins through the floor, pulsed like something breathing. By the time they realized, it was too late. After the metal began to move and flood our colony`s defenses swiftly responded. Before the first shots were fired already huge parts around the ancient vault were claimed by the Living Metal creatures.\n\n"
 mem_metal_demon.45.desc.demon:0 "$mem_metal_demon.45.desc$The defenses failed within hours. Bunkers fell, not from force, but from rot. Machinery turned against their makers. In the final days, the sky turned black and the final hours had begun."
 mem_metal_demon.45.desc.no_demon:0 "$mem_metal_demon.45.desc$The defenses stood strong. Every meter our soldiers fought to defend our colony ... their home. In the last days, the creatures began to disintegrate. It seems as that the worst is over."
 mem_metal_demon.45.a:0 "At last."
 mem_metal_demon.45.b:0 "Harrowing."

 mem_metal_demon.49.name:0 "Dealing with the Devil"
 mem_metal_demon.49.desc:0 "Senior command recognizes the dangers posed by $NAME_Metal_Demon$. However, the scientific and strategic value of harnessing its capabilities outweighs the projected risks. If the ancient civilizations feared this being, let us learn why, and then use that knowledge to control what they could not. For progress. For dominion. For [owner.GetName]."
 mem_metal_demon.49.a:0 "A shackled demon? Now thats entertainment!"
 mem_metal_demon.49.b:0 "Study it."
 mem_metal_demon.49.c:0 "Can it be controlled?"
 mem_metal_demon.49.d:0 "Seal the vault again."

 mem_metal_demon.50.name:0 "Shackled Once More"
 mem_metal_demon.50.desc:0 "Following several failed neutralization attempts and two partial breaches of the inner vault chamber, the project concluded. Initial assumptions that the demon could be fully controlled have proven unrealistic. Instead, a revised approach has been authorized: containment through mutual dependency.$NAME_Metal_Demon$ will remain shackled under reinforced rune-binding, which are designed to make it dependent on us."
 mem_metal_demon.50.a:0 "Welcome aboard."