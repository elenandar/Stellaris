l_english:
 mem_lunatics_category:0 "Tides of Lunacy"
 mem_lunatics_category_desc:0 "Orbital scans of §Y[From.GetName]§! have detected an ancient but intact structure which regularly gets hit by the extreme local tides. Further investigation might reveal its purpose."
 tech_mem_lunatics_tidals:0 "Lunar Harnessing"
 tech_mem_lunatics_tidals_desc:0 "Rebuilding our power generators to actively harness power based on lunar phases might improve their output."

 mem_lunatics.1.name:0 "Act of Lunacy"
 mem_lunatics.1.desc:0 "The ancient structure is being hit regularly by the extreme local tides and powered by giant tidal generators. Within our scientists found several chambers apparently intended for ritualistic purposes as is suggested by paintings of the local moon and what is deemed to symbolize people in various acts of worship covering the walls. Most of these chambers where sealed shut when we arrived. Inside our team found corpses lying on the ground. Many whom seemed to have killed, maimed or mutilated themselves. Some deciphered records call it the "Tidal Concord" and speak of ritualistic acts to please their lunar goddess. Strangly enough further research revealed connections between the moon's phases and tidal energy generation beyond what our initial calculations predicted."
 mem_lunatics.1.a:0 "This has potential."
 mem_lunatics.1.b:0 "Hollowing."
 mem_lunatics.1.c:0 "Take what you can."
 mem_lunatics.2.name:0 "Lunatics"
 mem_lunatics.2.desc:0 "Following the revelations of the history of the Tidal Concord, our Scientists have been analyzing the effects of moons on our colonies, and realized that there might be a way to help our colonies to noticably increase their energy generation. Modifiying our power generators to actively harness power based on lunar phases should improve their output. When the effects of tidal forces are at their strongest, and we equip these tidal generators with special-made turbines, they can harness energy at an improved rate. However, some engineers working on the prototype have reported strange behaviour of colleagues. Apparently there are forces at work, regular science might not be able to quantify..."

 zone_mem_lunatics_energy:0 "Tidal Farms"
 zone_mem_lunatics_energy_desc:0 "When the effects of tidal forces are at their strongest, and we equip the tidal generators with special-made turbines, they will harness energy at an improved rate."
 zone_mem_lunatics_energy_spiritualist:0 "Tidal Enclaves"
 zone_mem_lunatics_energy_spiritualist_desc:0 "When the effects of tidal forces are at their strongest, we are the closest to our revered gods."