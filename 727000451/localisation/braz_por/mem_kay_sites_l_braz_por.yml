# Everything belonging to mem_kay_sites

l_braz_por:

 # Archaeological Sites
 mem_kay_site_a:0 "The Hollow Sanctum"
 mem_kay_site_a_desc:0 "In the not too distant past, a civilization called this world home, but there is little of them left now on the surface. Scans revealed a massive series of tunnels fused with organic material stretching deep into [planet.GetName]'s crust.\n\nWe have detected rhythmic pulses of radiation originating from the bottom of the tunnels - reminiscent of a heartbeat."

 # Relics
 r_mem_kay_site_a_thalamor_corpse:0 "Corpse of the Thalamor"
 r_mem_kay_site_a_thalamor_corpse_desc:0 "The massive grey organ of a dead bioship towers above us. For reasons we do not understand, when near the Thalamor, our citizens feel unusually soothed and excited."
 r_mem_kay_site_a_thalamor_corpse_active_tt:0 "Unlocks one £decision£ §YPlanetary Decision§!: ['concept_decision_mem_kay_site_a']"
 concept_decision_mem_kay_site_a: "$decision_mem_kay_site_a$"
 concept_decision_mem_kay_site_a_desc: "$decision_mem_kay_site_a_desc$\n§Y['modifier:mem_kay_site_a_planet_buff']§! modifier added."

 # Projects
 MEM_KAY_SITE_A_PROJECT_1:0 "Puncturing the Amber Membrane"
 MEM_KAY_SITE_A_PROJECT_1_DESC:0 "The Membrane keeping the Thalamor alive is very durable and resisted all preliminary attempts to punture it. It appears keeping our promise is no simple undertaking."

 # Decisions
 decision_mem_kay_site_a:0 "Bury Corpse Shred"
 decision_mem_kay_site_a_desc:0 "We shall place a small piece of the Thalamor on this world to let its effect benefit our colony."

 # Planet Modifiers
 mem_kay_site_a_desecrated_sanctum:0 "Desecrated Sanctum"
 mem_kay_site_a_desecrated_sanctum_desc:0 "An ancient entity has been angered and in turn it released high amounts of radiation into the atmosphere."
 mem_kay_site_a_planet_buff:0 "Soothing Presence"
 mem_kay_site_a_planet_buff_desc:0 "A soothing presence affects all biological inhabitants of this world."

 # Country Modifiers
 mem_kay_site_a_thalamor_buff:0 "Thalamor's Soothing Presence"

 # Leader Traits
 leader_trait_mem_kay_thalamor_ward:0 "Thalamor's Ward"
 leader_trait_mem_kay_thalamor_ward_desc:0 "Remnants of the Thalamor's knowledge and personality linger in this leader's mind."

 # Leader Info
 mem_kay_elkivai_catchphrase:0 "I cannot wait to leave this place!"
 mem_kay_elkivai_backstory:0 "He is the sole survivor of a group of explorers who have been traveling between the stars aboard an ancient bioship. For reasons unknown to us, they crashlanded on a primitive world where he alone survived and was left stranded among the natives who enslaved him."
 mem_kay_site_a_ward_leader_catchphrase:0 "I have been waiting for this day for all my life..."
 mem_kay_site_a_ward_leader_backstory:0 "Influenced since an early age by the Thalamor [root.GetSheHe] [root.GetHasHave] been blessed with success in all [root.GetHerHis] endeavors. [root.GetSheHeCap] strives for adventures and wonders beyond the mundane life within our empire's borders."

 # Site A - The Hollow Sanctum
 # Stage 1
 mem_kay_site_a.1.name:0 "The Skin of the World"
 mem_kay_site_a.1.desc:0 "The tunnels' walls are composed of a living alloy, something in between flesh and metal, which secretes biochemical residue when cut. They feel warm to the touch, and in some places, a faint pulse can be felt. In some areas, the surfaces of the walls feature grisly scars. The expedition leader notes that when anyone gets too close to the walls, they experience auditory hallucinations; voices whispering, but too incoherently to make out words.\n\nOur archaeological team has concluded that the scars on the walls are from some sort of primitive and likely failed surgical procedure. Organic material, apparently foreign to the original wall structure, has been added in small patches. The reason for these procedures remains unclear."
 mem_kay_site_a.1.a:0 "Harvest tissue samples for study."
 mem_kay_site_a.1.b:0 "Try to decipher the whispers."
 # Stage 2
 mem_kay_site_a.2.name:0 "The Cerebral Chapel"
 mem_kay_site_a.2.desc:0 "The first interior chamber our team has reached is filled to the brim with signs of worship. Benches and altars constructed from bone and sinew, and off to the side are several damaged medical stasis pods with humanoid figures inside. A closer look at the altars shows alien writing, while an examination of the stasis pods reveals that the inhabitants had been killed, likely in their sleep. The stasis pods had been ripped open, and the humanoids inside all had their throats slit.\n\nTissue samples from the damaged pods as well as the humanoid remains indicate that the culprit is likely of lithoid origin, yet apart from this instance we have not seen any signs of lithoid lifeforms in these tunnels or this world at large thus far. Strangely enough, it also appears like large pieces of the humanoids' flesh had been surgically removed long before their deaths. A crossreference with samples taken earlier reveals them as the source of the strange wall patches."
 mem_kay_site_a.2.a:0 "Study the alien writing."
 mem_kay_site_a.2.b:0 "Dissect a humanoid specimen."
 # Stage 3
 mem_kay_site_a.3.name:0 "The Demolished Architects"
 mem_kay_site_a.3.desc:0 "Further down within the network of tunnels our team reached another chamber containing more humanoid remains. Or, what is left of them, at least. One can tell that they were once biological creatures, but their vital organs had all been surgically removed and replaced with machinery. These cybernetic humanoids were ripped to shreds with great force, judging from their state.\n\nDespite the fact that this massacre had been quite some time in the past, our team reports higher concentrations of rare gasses in the surrounding atmosphere which they associate with the suspected lithoid attacker. They are getting closer, apparently.\n\nAdditionally, the scars lining the walls are significantly more frequent in this chamber, although the expedition leader notes that some flesh had been removed from the wall instead of transplanted onto it."
 mem_kay_site_a.3.a:0 "Draw back and survey the perimeter."
 mem_kay_site_a.3.b:0 "Proceed further."
 # Stage 4
 mem_kay_site_a.4.name:0 "The Heart's Cavern"
 mem_kay_site_a.4.desc:0 "The tunnel comes to an end at a cavern of pulsing, crimson light. In the center of the cavern lies a colossal heart suspended in a membrane of amber. Hollow tendrils snake out in all directions from the membrane, burrowing smaller tunnels up towards the surface.\n\nAs our team approached the heart, a sudden shift in the atmosphere was felt, and a massive electromagnetic pulse surged through the cavern. Video feeds from our scientists went dark, and all communication has been lost."
 # Stage 5
 mem_kay_site_a.5.name:0 "The Thalamor Speaks"
 mem_kay_site_a.5.desc:0 "We have restored communications with our archaeological team, although they appear and sound inexplicably different. They claim to have communicated with what they're calling “The Thalamor,” a colossal, sapient organ that is both a heart and a brain.\n\nAccording to our scientists, the Thalamor was once part of a spacefaring, leviathan creature that functioned as a bioship for an explorer and was worshipped by the people of [event_target:mem_kay_site_a_planet.GetName]. When the bioship crash-landed on their world after sustaining damage from space debris, they harvested the leviathan's primary organ, and buried it deep underground inside of a strange membrane.\n\nLittle did they know, the organ, or the Thalamor, was still alive, even after being disconnected from its main body, but only beat once every few years. The Thalamor felt powerless, trapped, and terrified, so it gradually grew hollow limbs, tunneling through the crust of [event_target:mem_kay_site_a_planet.GetName] in a desperate attempt to reach the surface. Sadly, the natives took this as a sign to worship the Thalamor, and they began to sacrifice their own body parts to construct massive chambers inside the tunnels, naming this underground megastructure "The Hollow Sanctum."\n\nThe Thalamor slowly releases radiation with each pulse. Over centuries, it grew closer and closer to the planet's surface, as the people of [event_target:mem_kay_site_a_planet.GetName] grew sicker and sicker from radiation poisoning. They attempted to combat this development with cybernetic implants, but failed, and eventually dwindled to just a handful of beings left still tending their sanctum. Those were eventually killed by the lithoid we encountered earlier approximately three thousand years before our arrival.\n\nAs our archaeological team had concluded before, the scars lining the walls of the Hollow Sanctum originate from these humanoids who worshipped the Thalamor. According to it they began dissecting members of their own species for flesh, which they then attempted to transplant onto the walls of the sanctum, presumably for religious purposes. Based on tissue samples, it failed miserably."
 mem_kay_site_a.5.a:0 "Attempt to communicate with the Thalamor."
 mem_kay_site_a.5.b:0 "Something doesn't add up. Those aren't our scientists. Send in the military!"

 mem_kay_site_a.6.name:0 "Beginnings of Madness"
 mem_kay_site_a.6.desc:0 "[leader.GetName] reports harrowing, violent nightmares where [leader.GetSheHe] [leader.GetIsAre] being attacked by an unseen force. Due to these reports, other symptoms, and strange behavior reported by the crew, it appears that [leader.GetName] is beginning to slip into the depths of madness. Our archaeology team reports that for the past hour, [leader.GetSheHe] [leader.GetWasWere] curled up in a ball on the floor, next to a wall, muttering the phrase “Thalamor” over and over. When dragged away, [leader.getSheHe] kept insisting that [leader.getSheHe] needed to listen to the walls."
 mem_kay_site_a.6.a:0 "[leader.getSheHeCap] will recover, in time."
 mem_kay_site_a.6.b:0 "Medication will help [leader.GetHerHim] cope."
 mem_kay_site_a.6.c:0 "Assign [leader.GetName] mandated therapy but keep [leader.GetHerHim] on the site."
 mem_kay_site_a.7.name:0 "Return to Normalcy"
 mem_kay_site_a.7.desc:0 "[root.GetName] reports that [root.GetSheHe] [root.GetIsAre] no longer experiencing nightmares or hearing whispers, and [root.GetSheHe] [root.GetHasHave] been cleared to return to duty by [root.GetHerHis] therapist."
 mem_kay_site_a.7.a:0 "A welcome relief."
 mem_kay_site_a.8.name:0 "Feral Scientist"
 mem_kay_site_a.8.desc:0 "The worst has come to pass. [root.GetName] has lost all semblance of sanity, and our archaeology team quickly followed in suit. We do not fully understand why the Hollow Sanctum is driving our scientists to madness, but it is clear that must be the root cause."
 mem_kay_site_a.8.a:0 "Whatever has happened here cannot, and will not happen again."
 mem_kay_site_a.8.b:0 "A tragedy, but we must persevere."
 mem_kay_site_a.9.name:0 "Whispers From The Walls"
 mem_kay_site_a.9.desc:0 "While excavating the Hollow Sanctum archaeological site on [event_target:mem_kay_site_a_planet.GetName], our scientist [leader.GetName] suddenly began levitating.\n\n§W"K-kill… me…"§!\n\n[leader.GetSheHeCap] strains. §W"PLEASE!"§!\n\n[leader.GetSheHeCap] lightly settles back to the floor of the sanctum lacking any recollection of the event."
 mem_kay_site_a.9.a:0 "That was... unsettling."
 mem_kay_site_a.10.name:0 "The Lithoid Beast"
 mem_kay_site_a.10.desc:0 "While casing the perimeter, our scouting team has found a lithoid beast! It has not noticed us yet. It is quite large and apparently strong, with razor-sharp talons. Judging by our observations, the beast is possibly sapient."
 mem_kay_site_a.10.a:0 "Attempt to communicate."
 mem_kay_site_a.10.b:0 "Maybe we can understand it, befriend it?"
 mem_kay_site_a.10.c:0 "Put the beast down."
 mem_kay_site_a.11.name:0 "A Beast Attacks!"
 mem_kay_site_a.11.desc:0 "Our team never saw it coming.\n\nOut of the shadows, a lithoid beast pounced on [leader.GetName], killing [leader.GetHerHim] instantly. However, following the sudden attack our security personnel promptly responded and managed to capture the beast. It is now up to us to decide what happens to it."
 mem_kay_site_a.11.a:0 "Put the beast down."
 mem_kay_site_a.11.b:0 "This beast shall suffer a fate worse than death."
 mem_kay_site_a.11.c:0 "Initiate communications."
 mem_kay_site_a.11.d:0 "Kill the apostate!"
 mem_kay_site_a.11.e:0 "As was prophesied in the beginning of our expedition..."
 mem_kay_site_a.11.f:0 "It does look quite strong, maybe it could be of use…"
 mem_kay_site_a.11.g:0 "Just a mishap... Now to the beast..."
 # Elkivai Recruitment Dialogue
 NAME_Elkivai:0 "Elkivai"
 NAME_Kelvar:0 "Kelvar"
mod_job_ship_weapons_officer_add:0 "Weapon Officer" # I cant, why is this a thing
 mem_kay_site_a.12.desc:0 "§HAs we approach the stocky lithoid beast, it snarls at our presence. Now looking at it up close, one can tell that it is very afraid.§!\n\nStay back! I bite!"
 mem_kay_site_a.12.a:0 "You killed our scientist!"
 mem_kay_site_a.12.a.response:0 "Oh… I'm sorry… I thought it was one of those evil metal-fleshy creatures. They hurt me. I didn't want to be hurt again."
 mem_kay_site_a.12.b:0 "Where did you come from?"
 mem_kay_site_a.12.b.response:0 "My parents were explorers on a great mission; I was still a child at the time, and all I remember is that they were searching for fragments of some divinity. We travelled aboard a great bioship, the Thalamor. It was psionically linked to us. It talked to us, bonded with us; it was practically my teacher, babysitter, and caretaker; but one day, we suddenly crash-landed on this wretched world. Nobody survived but me, and I only survived because our ship protected me with its psionic abilities. Everything after this is hazy. The primitives appeared. They scavenged the wreck and took me as a slave."
 mem_kay_site_a.12.c:0 "How did you survive for so long?"
 mem_kay_site_a.12.c.response:0 "I escaped my bonds and killed my captors, but that was millennia ago. Most of it is a blur. I did shameful things to survive… I even ate the walls. But for most of the time, I hibernated..."
 mem_kay_site_a.12.d:0 "You are over four thousand years old?"
 mem_kay_site_a.12.d.response:0 "I am. My species develops quite slowly but lives for approximately five millennia. We spend nearly five hundred years as infants."
 mem_kay_site_a.12.e:0 "What can you do for us?"
 mem_kay_site_a.12.e.response:0 "I am a mighty warrior! §H...he roars proudly.§!\n\nI've always dreamed of leading troops into battle. If you let me, I will fight for you with honor. I will destroy your enemies!"
 mem_kay_site_a.12.f:0 "Would you like to join us?"
 mem_kay_site_a.12.f.response:0 "I… §Hhe begins to tear up,§! I am so lonely. It has been thousands of years since I have seen another living being. To be around friends again, friends who don't want to hurt me… that is all I desire..."
 mem_kay_site_a.12.g:0 "What can you tell us about this place?"
 mem_kay_site_a.12.g.response:0 "§HElkivai tilts his head,§! I can't quite explain it, but… these tunnels are soothing. They talk to me once every few decades; they tell me that everything will be alright, and that I am loved. Perhaps, the bioship that carried me here is somehow a part of this sanctum."
 mem_kay_site_a.13.desc:0 "§HThe Thalamor speaks through our scientist, their eyes glowing crimson as they levitate off the ground of the sanctum.\n\nIn a quiet and defeated tone, it addresses us.§!\n\nPlease. End my suffering."
 mem_kay_site_a.13.a:0 "Why do you want us to end your life?"
 mem_kay_site_a.13.a.response:0 "§HA tear runs down our scientist's cheek as the Thalamor talks through [event_target:mem_kay_site_a_leader.GetHerHim].§!\n\nDo you know what it is like to live for millennia, but not be able to move, to barely be able to act, and be worshipped by raving madmen of whom you have no control over? And then the silence and isolation... I do not ask you to understand my request, only that you follow through."
 mem_kay_site_a.13.b:0 "How are you alive, and how are we communicating?"
 mem_kay_site_a.13.b.response:0 "I was the last of a dying breed even before I fell on this world, bred by a civilization so old even I forget its name. I wandered the stars for eons coexisting with many different travellers along the way. My species exhibited many unique traits. We could reach into minds and speak through them like a vessel. You would call it some kind of psionic link, I suppose. This is how my kind bonded with their traveling companions..."
 mem_kay_site_a.13.c:0 "Do you have any wisdom to provide us?"
 mem_kay_site_a.13.c.response:0 "I wandered the skies peacefully for eons, carrying explorers from planet to planet, and I saw many civilizations rise and fall, but in the end… no weapon or power was ever as strong as hope or love."
 mem_kay_site_a.13.d:0 "We will not."
 mem_kay_site_a.13.d.response:0 "§HOur scientist lets out a blood curdling wail...§!"
 mem_kay_site_a.13.e:0 "We will not. You're invaluable as a research subject."
 mem_kay_site_a.13.e.response:0 "§HOur scientist growls in anger.§!\n\nSo be it."
 mem_kay_site_a.13.f:0 "Very well. We will fulfill your request. But How?"
 mem_kay_site_a.13.f.response:0 "I… thank you.\n\n§HThrough our scientist the Thalamor weeps overcome by the prospect of relief from its torment...§!\n\nThe amber membrane surrounding me is keeping me alive. Puncture it and I shall perish."
 mem_kay_site_a.14.name:0 "It is Done"
 mem_kay_site_a.14.desc:0 "We have finally punctured the amber membrane! Our engineers were quite surprised with how durable it was, but sadly, prolonged contact with the substance which the membrane is made of results in full body rashes for [Root.Owner.GetSpeciesNamePlural]. So it has only little worth utilizing the substance in future projects.\n\nAs the membrane was broken, an overwhelming sense of calmness settled over our archaeological team. [Root.Leader.GetName] began to levitate, and sang what sounded like a line from a lullaby, but in a language we cannot understand.\n\n§W"Kom kangon, to mik neshpa hish ngaosh."§!\n\nOur scientist was slowly lowered back to the ground as the Thalamor began to turn a sickly shade of grey."
 mem_kay_site_a.14.a:0 "Shall it find peace."
 mem_kay_site_a.15.name:0 "Angered Thalamor"
 mem_kay_site_a.15.desc:0 "In our rash haste, we have angered the Thalamor. All of a sudden, the Thalamor's tunnels and interior chambers began to violently constrict, killing all [Root.GetSpeciesNamePlural] inside. The radiation released by the Thalamor has multiplied by tenfold, rapidly transforming [event_target:mem_kay_site_a_planet.GetName] into a tomb world.\n\nWe may never know what happened to the Thalamor. Did we choose wrong? Did we avert worse? Questions never answered..."
 mem_kay_site_a.15.a:0 "But wait! We only wanted to be friends!"
 mem_kay_site_a.15.b:0 "Xeno scum."
 mem_kay_site_a.15.c:0 "What a waste."
 mem_kay_site_a.15.d:0 "The last laugh will be ours!"
 mem_kay_site_a.15.e:0 "It will pay for its sins."
 mem_kay_site_a.16.name:0 "Dream Guardian"
 mem_kay_site_a.16.desc:0 "[Root.GetName], who suffered from frequent nightmares, reports that a comforting presence has appeared in [Root.GetHerHis] dreams. [Root.GetSheHeCap] shares [Root.GetHerHis] believe that somehow, a fragment of the Thalamor's consciousness continues to live on within [Root.GetHerHim], and that it is guarding [Root.GetHerHim] in [Root.GetHerHis] dreams."
 mem_kay_site_a.16.a:0 "How kind of the Thalamor."
 mem_kay_site_a.16.b:0 "We shall not tolerate xeno incursions into our minds!"
 mem_kay_site_a.16.c:0 "This will be an excellent case study!"
 mem_kay_site_a.16.e:0 "Clearly the Thalamor was sent to us by the divine."
 mem_kay_site_a.16.f:0 "This increases [Root.GetName]'s productivity for the state."
 mem_kay_site_a.17.name:0 "Neshpa Hish Ngaosh"
 mem_kay_site_a.17.desc:0 "[Root.GetName] reports a curious phenomenon occurring with [Root.GetHerHis] four year old child. Occasionally, when sleeping, it whispers the phrase, "Kom kangon, to mik neshpa hish ngaosh"; the Thalamor's last words. When prompted about this, the child claims that the Thalamor told it what it means; that it will guard the child's dreams and keep it safe from harm.\n\nApparently, the Thalamor not only took hold in [Root.GetName]'s mind, but was passed along to [Root.GetHerHis] child as well."
 mem_kay_site_a.17.a:0 "The Thalamor is truly a compassionate soul."
 mem_kay_site_a.17.b:0 "This Child will make a fine addition to our empire someday."
 mem_kay_site_a.17.c:0 "This is fascinating!"
 mem_kay_site_a.17.d:0 "Further proof of the divine's work."
 mem_kay_site_a.18.name:0 "The Ward Reports For Duty"
 mem_kay_site_a.18.desc:0 "[event_target:event_target:mem_kay_site_a_ward_leader.GetName]'s child, [event_target:mem_kay_site_a_ward_leader.GetName], who is now grown, has graduated with a degree in archaeostudies at barely eighteen years old. [event_target:mem_kay_site_a_ward_leader.GetSheHe] [event_target:mem_kay_site_a_ward_leader.GetIsAre] a prodigy, and has expressed [event_target:mem_kay_site_a_ward_leader.GetHerHis] wish to follow in [event_target:mem_kay_site_a_ward_leader.GetHerHis] parent's footsteps as a scientist for our great nation."
 mem_kay_site_a.18.a.tt:0 "[event_target:mem_kay_site_a_ward_leader.GetName] will enter our service."