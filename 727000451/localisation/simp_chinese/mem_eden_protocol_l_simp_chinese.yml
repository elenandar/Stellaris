 mem_eden_protocol_chain_desc:0 "The Environmental Diversity Expansion Network Protocol was initiated by the inhabitants of a doomed world. They did what was within their power and created a small station housing a database of their entire biosphere's DNA. We were put in place to safeguard and expand the facility in order to eventually seed new life on far away worlds."
