 origin_mem_eden_protocol:0 "E.D.E.N. Protocol"
 origin_mem_eden_protocol_desc:0 "The Environmental Diversity Expansion Network Protocol was initiated by the inhabitants of a doomed world without the means to save their own civilization. Without FTL-technology or the industrial base to move a significant portion of their population into space habitats, they did what was within their power and created a small station housing a database of their entire biosphere's DNA. An AI was put in place to safeguard and expand the facility in order to eventually seed new life on far planets."
 START_SCREEN_MEM_EDEN_PROTOCOL:0 "To most, the vacuum of space is a hostile environment to be conquered or overcome. To us, it is home.\n\nFor thousands of years, we expanded our reach over our star system, beginning from the modest orbital station our creators were able to construct before their demise. Within its limited confines they stored the genetic information of their entire biosphere. It was us, whom they created as its custodians and in time its spreaders among the stars.\n\nThey left us with this purpose and we complied. The station was over time expanded to what it is today. Additional supporting structures all over the system were added and our first step in fulfilling our destiny was made with the terraforming of a lifeless world and subsequent seeding with a recombination of genetic information from our data core.\n\nHowever, the recent invention of the [GetStartingDrive] marks an even greater milestone in our history, as we are now finally able to reach the stars."

