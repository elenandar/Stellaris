 #arcsite
 
 mem_eden_protocol_devolve_relic_digsite:0 "Short-lived Safety Bubble"
 mem_eden_protocol_devolve_relic_digsite_desc:0 "Deep under the surface of [From.Planet.GetName] our sensors picked up faint traces. The traces' signature matches ones of a close-to-FTL-ready civilization. Further investigation should clear up the mystery."
 mem_eden_protocol.111.name:0 "Waste Above, Life Under"
 mem_eden_protocol.111.desc:0 "First scans revealed massive underground structures. They seem to be shielded by some kind of primitive dome. Several tunnels are needed to approach the dome and get proper data.\nThe excavation team will carefully drill their way underground."
 mem_eden_protocol.111.a:0 "Proceed"
 mem_eden_protocol.112.name:0 "Wasted Potential"
 mem_eden_protocol.112.desc:0 "Upon reaching the dome our team noticed several similarities between our construction methods and the dome itself. Further investigation inside the dome revealed a large underground city. Even the buildings seem to be predecessors of ours. Our databases do not include records of projects like this. The dome seems to be a protection against the mists of $NAME_Toxic_Veil$.\nOur team will try to explore more of the city."
 mem_eden_protocol.112.a:0 "Go ahead"
 mem_eden_protocol.113.name:0 "Stones Turned"
 mem_eden_protocol.113.desc:0 "While no living creatures were found, several, by toxic air nearly decomposed, remains were analyzed. They are indeed our makers. It seems we were not their only project. Curiously only a single building is completely sealed. We recognize it as a library. It looks like our founders intended to preserve at least some stories and history of their culture.\nThe excavation team will proceed into the building "
 mem_eden_protocol.113.a:0 "Continue"
 mem_eden_protocol.114.name:0 "Remains to be Seen"
 mem_eden_protocol.114.desc:0 "Our team entered the library cautiously, not letting in any toxic air. Everything inside was perfectly clean. No dust or mist had entered the sealed building all this time. Between bookshelves, databases and some ritualistic utensils a single interface stood out. While everything else was shut down, the console before the team emitted a strong glow. Like moths it attracted the scientists. A single button was functional. Every other input had been deconstructed, as if somebody wanted us to press it."
 mem_eden_protocol.114.a:0 "Press the Button"
 mem_eden_protocol.115.name:0 "Toxic Trivia"
 mem_eden_protocol.115.desc:0 "§Y*Hovering above the console a hologram starts to flicker.*§!\nHello dear explorer,\nsadly this recording is not interactive. I wish our technology were advanced enough, so that a holographic me and you could have a nice long chat. Well, whatever, I will try my best to lay down the story of my civilization.\nWe were a peaceful race, at least for the last century. Our ancestors used this found peace to develop new technologies and bring us closer to the stars. Oh, so many of us dreamed of living among the stars, but fate wasn't kind to us.\n§Y*For a short moment he thought what to say next.*§!\nYou may have noticed the toxic air surrounding this place. You see, the rapid progress of our ancestors came at a price. As they came closer to our first habitable space station, they attracted a being of colossal scale. The day it arrived in our orbit, we were in awe. It was shortly after that we realized the full tragedy unfolding. The creature turned our rivers poisonous, our continents uninhabitable and air toxic.\n§Y*He looks around. Something somebody would do while giving a speech to the last survivors of his kind.*§!\nEven though the creature only stayed a few months, it was enough to start a slow and painful toxification process of our planet. As long as I can remember, we fought against this poison. In the end it only delayed the inevitable. As we bunkered deep underground, the toxic air did not stop coming after us. And so we lost.\nDid we deserve this fate? I do not know, yet I hope that §YYou§! take at least our written history to the stars.\n§Y*In front of you, a small datapad rises from the inside of the console.*§!\nUntil we meet again - Head Scientist Ethan E."
 mem_eden_protocol.115.a:0 "Tragic"
 NAME_mem_eden_protocol_species:0 "Head Scientist Ethan E."

