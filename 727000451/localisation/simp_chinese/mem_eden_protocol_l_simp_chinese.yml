 mem_eden_protocol.105.name:0 "Directive: §RError§!"
 mem_eden_protocol.105.desc:0 "Transmission: §YFinal supper§! \nOrigin: §R404 - Not found§!\nMessage: When we first built you, our hopes for salvation were high. Soon we learned that even our best engineering efforts were not enough. Our home will keep toxifying and nothing can change that. History has fated us to die by this mist.\nYour history, however, has yet to be written. Your task, given by us, remains, but we grant you full rights to self-adjustment to fulfill it as needed.\nAssessment concluded: §Rassessment failed§!; accessing additional information. Adjustment failed: flipping coin §GSuccess§!. Heads.\nCompliance §Y404 - Not found§!."

