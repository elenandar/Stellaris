##################################################################################################################################################################################################################
### POLICIES ###
################

policy_tech_options_policy:0 "Инициатива исследовательского разнообразия"
policy_tech_options_policy_desc:0 "Эта политика позволит нашей империи тратить очки исследований, чтобы предоставить учёным больше вариантов при выборе следующего исследовательского проекта."

defaulttech_option_name: "Стандартные исследования"
defaulttech_option:0 "Стандартные исследования"
defaulttech_option_desc:0 "Этот вариант сохранит обычное число альтернатив исследований — ничего не изменится."

tech5_option_name: "Исследовательская инициатива 5"
tech5_option:0 "Исследовательская инициатива 5"
tech5_option_desc:0 "Этот вариант увеличит число альтернатив исследований до 5 и будет стоить примерно 10% от нашего ежемесячного производства исследований."

tech10_option_name: "Исследовательская инициатива 10"
tech10_option:0 "Исследовательская инициатива 10"
tech10_option_desc:0 "Этот вариант увеличит число альтернатив исследований до 10 и будет стоить примерно 15% от нашего ежемесячного производства исследований."

tech15_option_name: "Исследовательская инициатива 15"
tech15_option:0 "Исследовательская инициатива 15"
tech15_option_desc:0 "Этот вариант увеличит число альтернатив исследований до 15 и будет стоить примерно 20% от нашего ежемесячного производства исследований."

tech20_option_name: "Исследовательская инициатива 20"
tech20_option:0 "Исследовательская инициатива 20"
tech20_option_desc:0 "Этот вариант увеличит число альтернатив исследований до 20 и будет стоить примерно 30% от нашего ежемесячного производства исследований."

eternal_vigilance_full_spending_medium: "Полное финансирование — оборонительные станции"
eternal_vigilance_full_spending_medium_name: "$eternal_vigilance_full_spending_medium$"
eternal_vigilance_full_spending_medium_desc: "Каждая звёздная база должна быть надёжно защищена. Не жалейте средств.\nАвтоматически строит §Yоборонительные станции§! вокруг каждой §Yзвёздной базы§!"
eternal_vigilance_half_spending_medium: "Частичное финансирование — оборонительные станции"
eternal_vigilance_half_spending_medium_name: "$eternal_vigilance_half_spending_medium$"
eternal_vigilance_half_spending_medium_desc: "Лишь наши сильнейшие опорные пункты требуют такой поддержки.\nАвтоматически строит §Yоборонительные станции§! вокруг §Yзвёздных баз-бастионов§!"

eternal_vigilance_full_spending_large: "Полное финансирование — оборонительные крепости"
eternal_vigilance_full_spending_large_name: "$eternal_vigilance_full_spending_large$"
eternal_vigilance_full_spending_large_desc: "Каждая звёздная база должна быть надёжно защищена. Не жалейте средств.\nАвтоматически строит §Yоборонительные крепости§! вокруг каждой §Yзвёздной базы§!"
eternal_vigilance_half_spending_large: "Частичное финансирование — оборонительные крепости"
eternal_vigilance_half_spending_large_name: "$eternal_vigilance_half_spending_large$"
eternal_vigilance_half_spending_large_desc: "Лишь наши сильнейшие опорные пункты требуют такой поддержки.\nАвтоматически строит §Yоборонительные крепости§! вокруг §Yзвёздных баз-бастионов§!"




##################################################################################################################################################################################################################
### DOCTRINES ###
#################

policy_armament_doctrine:0 "Доктрина вооружения"
policy_armament_doctrine_desc:0 "Эта флотская доктрина определяет, на каких типах вооружения должны делать упор проекты наших кораблей, ценой снижения эффективности другого оружия."

balanced_focus_name:0 "Стандартное вооружение"
balanced_focus:0 "Стандартное вооружение"
balanced_focus_desc:0 "Мы будем равномерно распределять внимание между типами вооружения; нет нужды специализироваться на одном в ущерб остальным."

brawler_name:0 "Ставка на кинетическое оружие"
brawler:0 "Ставка на кинетическое оружие"
brawler_desc:0 "Кинетическое оружие имеет долгую и славную историю. Наше кинетическое вооружение будет разрывать вражеские щиты и корпуса и принесёт славу нашему государству."

gunship_focus_name:0 "Ставка на энергетическое оружие"
gunship_focus:0 "Ставка на энергетическое оружие"
gunship_focus_desc:0 "Есть некое величие в использовании чистой энергии для уничтожения врагов. Наше энергетическое оружие будет прожигать вражеские корабли и обращать их флоты в расплавленный лом."

guided_munitions_focus_name:0 "Ставка на ракеты"
guided_munitions_focus:0 "Ставка на ракеты"
guided_munitions_focus_desc:0 "Взрывное оружие внушает страх. Наши мощные ракеты обеспечат победу нашему народу."

strike_craft_focus_name:0 "Ставка на штурмовики"
strike_craft_focus:0 "Ставка на штурмовики"
strike_craft_focus_desc:0 "Штурмовики — наше грозное оружие, а наши доблестные пилоты докажут своё превосходство в бою."

policy_defense_doctrine:0 "Доктрина обороны"
policy_defense_doctrine_desc:0 "Эта флотская доктрина определяет, на каком типе корабельной защиты должны делать упор наши суда, ценой снижения эффективности другого оборонительного варианта."

uniform_focus_name:0 "Стандартная защита"
uniform_focus:0 "Стандартная защита"
uniform_focus_desc:0 "Мы будем в равной мере полагаться на броню и щиты; нет нужды отдавать предпочтение чему-то одному. Вместе они наиболее сильны."

armor_focus_name:0 "Ставка на броню"
armor_focus:0 "Ставка на броню"
armor_focus_desc:0 "Положимся на прочность нашей брони. Толстая и непробиваемая, она окутывает наши корпуса защитным покровом и не может быть проигнорирована ракетами или торпедами."

hardening_focus_name:0 "Упрочнение защиты"
hardening_focus:0 "Упрочнение защиты"
hardening_focus_desc:0 "Если мы сосредоточимся на упрочнении щитов и бронеплит, то сможем лучше противостоять оружию с пробитием и сделать наши корабли живучее."

shield_focus_name:0 "Ставка на щиты"
shield_focus:0 "Ставка на щиты"
shield_focus_desc:0 "Мерцающие щиты — превосходный вариант защиты. В отличие от брони, они восстанавливаются без ремонта, что позволяет вести длительные кампании без необходимости останавливать темп операций."

policy_composition_doctrine:0 "Доктрина состава флота"
policy_composition_doctrine_desc:0 "Эта флотская доктрина определяет, какие типы кораблей должны составлять основу наших военно-морских сил, позволяя быстрее и дешевле строить предпочтительные суда ценой увеличения времени и стоимости строительства тех кораблей, на которых мы не делаем упор."

standard_composition_name:0 "Стандартный состав"
standard_composition:0 "Стандартный состав"
standard_composition_desc:0 "У каждого корабля есть своё место; не стоит перестраивать наши верфи в пользу одного типа строительства. Разноплановый флот — лучший выбор."

light_ship_focus_name:0 "Ставка на лёгкие корабли"
light_ship_focus:0 "Ставка на лёгкие корабли"
light_ship_focus_desc:0 "Лёгкие корабли дёшевы и быстры — и в строительстве, и в космосе. Они отлично подходят для подавления пиратов, защиты торговли, обороны обширных пространств, прикрытия крупных судов и недорогой защиты нашего государства. Нам следует сделать строительство этих ценных кораблей приоритетом."

versatility_focus_name:0 "Ставка на крейсеры"
versatility_focus:0 "Ставка на крейсеры"
versatility_focus_desc:0 "Крейсеры и их более крупные собратья — ударные и линейные крейсеры — самые универсальные корабли, которые мы можем строить. Они эффективны на всех дистанциях, могут нести широкий спектр вооружения и достаточно прочны, чтобы выдержать попадание, но при этом строятся заметно быстрее и обходятся куда дешевле в производстве и содержании, чем крупные корабли. Для универсального флота нам следует опереться именно на крейсеры."

capital_focus_name:0 "Ставка на крупные корабли"
capital_focus:0 "Ставка на крупные корабли"
capital_focus_desc:0 "Крупные корабли — гордость наших флотов. Обладая тяжёлым вооружением, способным сокрушить врага, и мощной защитой, способной выдержать любой удар, эти могучие боевые суда являются величайшим оружием в нашем арсенале. Они — не что иное, как будущее галактической войны, и нам следует строить наши флоты вокруг них, сосредоточив усилия на их производстве."

carrier_focus_name:0 "Ставка на авианосцы"
carrier_focus:0 "Ставка на авианосцы"
carrier_focus_desc:0 "Наши штурмовики — наше величайшее оружие. Наши пилоты — лучшие представители нашего народа, а авианосцы — те суда, что отправляют этих доблестных воинов в бой. Мы должны сосредоточить усилия на создании как можно большего числа этих мощных кораблей."

policy_operations_doctrine:0 "Доктрина флотских операций"
policy_operations_doctrine_desc:0 "У флота много обязанностей: проецирование силы, оборона ключевых территорий и защита внутренней торговли. Наша доктрина флотских операций определяет, на какой из этих задач делать упор."

standard_operations_name:0 "Стандартные операции"
standard_operations:0 "Стандартные операции"
standard_operations_desc:0 "Нам не следует чрезмерно специализировать флотские операции. Мы должны быть готовы к любым обязанностям в любое время и никогда не пренебрегать ни одним аспектом военно-морского планирования."

blue_sky:0 "Операции «Синее небо»"
blue_sky_name:0 "Операции «Синее небо»"
blue_sky_desc:0 "Нет ничего важнее защиты наших планет и нашего народа. Наш флот существует исключительно для обороны государства, и мы должны ограничивать кампании контролируемым нами пространством, сражаясь прежде всего при поддержке наших могучих звёздных баз."

black_sky:0 "Операции «Чёрное небо»"
black_sky_name:0 "Операции «Чёрное небо»"
black_sky_desc:0 "Наш флот должен уметь проецировать силу далеко от родных миров — защищать союзников, наказывать врагов и реагировать на кризисы, где бы они ни возникали. Мы не можем полагаться на поддержку звёздных баз; мы должны быть способны сражаться где угодно, даже на другом конце галактики. Флот «Чёрного неба» — такой же инструмент дипломатии, как и любой другой."

privateer_operation:0 "Антипиратские операции"
privateer_operation_name:0 "Антипиратские операции"
privateer_operation_desc:0 "Наших флотов более чем достаточно для защиты нас и нашего образа жизни, но они также играют важную роль в охране внутренней торговли. Торговля — жизненная сила нашей империи, и мы должны делать всё возможное, чтобы защитить её."

policy_crew_doctrine:0 "Доктрина подготовки экипажей"
policy_crew_doctrine_desc:0 "Подготовка экипажей и офицеров флота — одна из важнейших задач, которые вообще может выполнять военно-морская служба. Мы должны тщательно подстраивать программы обучения под наши обстоятельства; устаревшие или плохо приспособленные программы хуже бесполезных и способны искалечить наш флот. Нам нужно решить, как обучать экипажи и офицеров."

standard_crew:0 "Стандартная подготовка"
standard_crew_name:0 "Стандартная подготовка"
standard_crew_desc:0 "Стандартный уровень подготовки без узкой специализации позволит нам наилучшим образом поддерживать боевую готовность."

excellent_crew:0 "Подготовка в военно-морской академии"
excellent_crew_name:0 "Подготовка в военно-морской академии"
excellent_crew_desc:0 "Мы должны внедрить полноценную программу обучения в военно-морской академии. Экипажи будут готовиться годами, а потенциальные офицеры — проходить дополнительную специализированную подготовку. Однако многие не смогут соответствовать высоким стандартам, которые мы устанавливаем, что сократит число пригодных экипажей для наших кораблей."

militia_crew:0 "Ускоренная подготовка"
militia_crew_name:0 "Ускоренная подготовка"
militia_crew_desc:0 "Мы должны внедрить ускоренную программу подготовки, сосредоточенную на том, чтобы как можно быстрее подготовить корабельные экипажи без углублённого обучения. Это позволит быстро пополнить ряды и укомплектовать корабли, но приведёт к снижению боевой эффективности."

ai_crew:0 "Экипажи из искусственного интеллекта"
ai_crew_name:0 "Экипажи из искусственного интеллекта"
ai_crew_desc:0 "Мы будем комплектовать наши корабли в основном ИИ-единицами. Это позволит формировать экипажи с впечатляющей скоростью. Однако ИИ, оптимизированные под корабельную службу, хуже приспосабливаются к быстро меняющимся ситуациям, из-за чего наши потери в бою возрастут."

edict_nsc_doctrine_ai:0 "Замена доктрины ИИ"
edict_nsc_doctrine_ai_desc:0 "Только для ИИ"

policy_crew_doctrine_gestalt:0 "Доктрина подготовки дронов"
policy_crew_doctrine_gestalt_desc:0 "Подготовка флотских дронов — одна из важнейших задач, которые вообще может выполнять военно-морская служба. Мы должны тщательно подстраивать программы обучения под наши обстоятельства; устаревшие или плохо приспособленные программы хуже бесполезных и способны искалечить наш флот. Нам нужно решить, как обучать наших дронов."

standard_drones:0 "Стандартные дроны"
standard_drones_name:0 "Стандартные дроны"
standard_drones_desc:0 "Наши дроны на данный момент достаточно хороши; нам не требуются ни более качественные дроны, ни более самостоятельные единицы, ни рои флотских дронов."

quality_protocol:0 "Протокол качества"
quality_protocol_name:0 "Протокол качества"
quality_protocol_desc:0 "Наши дроны должны быть высочайшего качества, чтобы корабли сражались с максимальной эффективностью. Мы не сможем укомплектовать столько кораблей, сколько могли бы при более низких стандартах, но такова цена превосходства."

adaptive_protocol:0 "Адаптивный протокол"
adaptive_protocol_name:0 "Адаптивный протокол"
adaptive_protocol_desc:0 "Наши офицерские дроны были спроектированы с большей независимостью мышления, чтобы лучше адаптироваться к различным ситуациям. Это позволит нам использовать больше кораблей, поскольку офицерские дроны смогут автономнее управлять своими экипажами, но общая боевая эффективность немного снизится из-за меньшей согласованности действий."

swarm_protocol:0 "Протокол роя"
swarm_protocol_name:0 "Протокол роя"
swarm_protocol_desc:0 "Нашим дронам требуется лишь минимальная подготовка. Наши корабли должны быть быстрыми и затмевать звёзды своим числом; для этого не нужно много обучения. Каждый корабль — несущественная потеря; на его место придут ещё два. Рой сокрушит противника одной лишь численностью."



##################################################################################################################################################################################################################
### EDICTS ###
##############

edict_nsc_emergency_defenses:0 "Инициатива чрезвычайной обороны"
edict_nsc_emergency_defenses_desc:0 "Натиск врага неизбежен, а наша оборона слаба. Мы обязаны срочно укрепить наши звёздные базы и превратить их в ощетинившиеся оборонительные укрепления, но времени у нас почти нет.\n\nОднако, если мы бросим на это все силы, то, возможно, сумеем укрепить оборону за долю обычного времени — это будет невероятно дорого, но, вероятно, не так дорого, как проиграть войну нашим ненавистным врагам."


##################################################################################################################################################################################################################
### TRADITIONS ###
##############

 tradition_nsc_fleet_doctrine:0 "Доктрина"
 tradition_nsc_fleet_doctrine_desc:0 "Продвигаясь всё дальше к звёздам, мы должны определить чёткий подход к составу наших флотов."
 tr_nsc_fleet_doctrine_adopt:0 "Традиция флотской доктрины"
 tr_nsc_fleet_doctrine_finish:0 "Традиция флотской доктрины завершена"
 tr_nsc_fleet_doctrine_armament:0 "$policy_armament_doctrine$"
 tr_nsc_fleet_doctrine_armament_desc:0 "§HОткрывает политику:§! $policy_armament_doctrine$"
 tr_nsc_fleet_doctrine_defense:0 "$policy_defense_doctrine$"
 tr_nsc_fleet_doctrine_defense_desc:0 "§HОткрывает политику:§! $policy_defense_doctrine$"
 tr_nsc_fleet_doctrine_fleet:0 "$policy_composition_doctrine$"
 tr_nsc_fleet_doctrine_fleet_desc:0 "§HОткрывает политику:§! $policy_composition_doctrine$"
 tr_nsc_fleet_doctrine_operations:0 "$policy_operations_doctrine$"
 tr_nsc_fleet_doctrine_operations_desc:0 "§HОткрывает политику:§! $policy_operations_doctrine$"
 tr_nsc_fleet_doctrine_crew:0 "$policy_crew_doctrine$"
 tr_nsc_fleet_doctrine_crew_desc:0 "§HОткрывает политику:§! $policy_crew_doctrine$"
