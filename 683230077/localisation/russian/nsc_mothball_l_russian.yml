NSC_EVENTS_MOTHBALL_MESSAGE_TITLE:0 "Законсервированный флот восстановлен"
NSC_EVENTS_MOTHBALL_MESSAGE_DESC:0 "Флот §Y[From.GetName]§! был отремонтирован после консервации на орбите планеты [This.Orbit.GetName]."

nsc_events_mothball.5.name:0 "Флоты потеряны у [From.GetName]"
nsc_events_mothball.5.desc:0 "Когда [From.GetName] была потеряна и перешла к врагу, наши законсервированные флоты были уничтожены нашим персоналом, чтобы они не достались противнику."
nsc_events_mothball.5.a:0 "Мрачный день для [This.GetName]."

nsc_events_mothball.6.name:0 "Вражеские флоты уничтожены у [From.GetName]"
nsc_events_mothball.6.desc:0 "Когда мы заняли [From.GetName], на орбите находились законсервированные вражеские флоты. Вражеский персонал уничтожил их прежде, чем мы успели взять их под контроль."
nsc_events_mothball.6.a:0 "Печально."

nsc_events_mothball.8.name:0 "Флоты потеряны у [From.GetName]"
nsc_events_mothball.8.desc:0 "Когда мы покинули [From.GetName], кто-то не позаботился о повторной активации наших законсервированных флотов на орбите. В результате они были уничтожены вместе со всеми прочими орбитальными сооружениями."
nsc_events_mothball.8.a:0 "Это просто нелепо!"
