### 디시인사이드 스텔라리스 갤러리 '어ㅅㅂ' 제작 ###

###########################
### MOTHBALL EVENT ###
###########################

decision_nsc_mothball_menu:0 "Консервация флота"
decision_nsc_mothball_menu_desc:0 "Позволяет деактивировать флоты и переводить их в резерв, снижая их содержание и использование вместимости флота."
decision_nsc_mothball_menu_trigger.fail:0 "£trigger_no£ §RЧтобы использовать эту функцию, у вас должен быть принадлежащий вам флот на орбите этой планеты.§!\n\n§YЕсли вы не можете использовать эту функцию, щёлкните по каждому законсервированному флоту и нажмите правой кнопкой мыши по планете, чтобы убедиться, что они отмечены как находящиеся «на орбите».§!"
decision_nsc_mothball_menu_tooltip:0 "Открывает панель управления консервацией флота."
nsc_events_mothball.menu.name:0 "Управление консервацией флота"
nsc_events_mothball.menu.desc:0 "Добро пожаловать в систему консервации флота. В этом окне вы можете выбрать флоты для консервации или повторной активации. Обратите внимание на следующее:\n\nДля консервации флотов на орбите планета должна быть колонизирована вашей империей. Одновременно на орбите одной планеты может находиться до 5 законсервированных флотов.\n\nАрендованные флоты нельзя законсервировать.\n\nКонсервация флота снижает использование вместимости флота на 75% и уменьшает затраты на содержание на 90%, пока флот находится в законсервированном состоянии.\n\nВы не сможете управлять или перемещать законсервированные флоты. Если вы случайно щёлкнете по законсервированному флоту и попытаетесь его переместить, просто щёлкните по нему ещё раз и нажмите правой кнопкой мыши по планете, чтобы отметить его как находящийся на орбите. Вы не сможете повторно активировать флот, если он не отмечен как находящийся на орбите.\n\nПовторная активация флота потребует сплавов для ремонта кораблей до боеготового состояния. Стоимость зависит от общего числа очков корпуса всех кораблей во флоте. Повторная активация флота занимает 360 дней ремонта.\n\n§RПРЕДУПРЕЖДЕНИЕ: перед повторной активацией флота убедитесь, что вы можете позволить себе возросшие затраты на содержание и использование вместимости флота!§!"
nsc_events_mothball.menu.close:0 "Закрыть"
nsc_events_mothball.menu.fleet_mothball_stop.tooltip:0 "Повторно активировать флот и привести его в боеготовое состояние."
nsc_mothball_stop_trigger.fail:0 "Флот в данный момент проходит повторную активацию."

