l_russian:
  SHIP_GRAPHICS_STRIKECRUISER_DESC:0 "Ударные крейсеры предназначены для перехвата вражеских флотов и их удержания до прибытия союзных сил, которые завершат бой."
 SHIP_GRAPHICS_EXPLORATIONSHIP_DESC: "Боеспособный научный корабль, способный выдерживать враждебные угрозы и смело отправляться туда, где ещё никто не бывал."
 SHIP_GRAPHICS_BATTLECRUISER_DESC: "Гораздо более крупная и продвинутая версия крейсера, предназначенная для ведения боевых действий на передовой."
 SHIP_GRAPHICS_CARRIER_DESC: "Массивные боевые корабли, способные нести большое количество штурмовиков. Из-за пространства, необходимого для ангаров, обладают слабым прямым вооружением и требуют защиты со стороны других боевых судов."
 SHIP_GRAPHICS_DREADNOUGHT_DESC: "Более крупная и продвинутая версия линкора, предназначенная быть основным боевым кораблём на передовой для любой империи."
 SHIP_GRAPHICS_FLAGSHIP_DESC: "Огромный корабль управления и координации с невероятной огневой мощью. Гордость любого флота."
