PERDITION_BEAM_FLAGSHIP: "Посол справедливости"
PERDITION_BEAM_FLAGSHIP_DESC: "Самый большой лазер из существующих — для самого большого корабля из существующих, чтобы компенсировать не такой уж большой статус Лидера."

PERDITION_BEAM_STARBASE: "Атомный фазовый дезинтегратор"
PERDITION_BEAM_STARBASE_DESC: "ДаккаДаккаДаккаДакка."

XL_BEAM_STARBASE: "Поляризованный электронный модулятор"
XL_BEAM_STARBASE_DESC: "Вдвое больше дакки, вдвое меньше размер."

BASIC_XL_BEAM: "Ранний прототип ланцета"
BASIC_XL_BEAM_DESC: "Базовый прототип времён ранней разработки ланцетного оружия. Он слабее своих последователей, но для работы не требует стратегических ресурсов."

BASIC_T_BEAM: "Прототип луча погибели"
BASIC_T_BEAM_DESC: "Самый ранний рабочий образец оружия класса «Титаник», уступающий истинному лучу погибели по разрушительной мощи. При этом для работы он не требует стратегических ресурсов."

TOMAHAWK_CRUISE_MISSILE: "Продвинутая крылатая ракета «Томагавк»"
TOMAHAWK_CRUISE_MISSILE_DESC: "Чрезвычайно дорогая противокорабельная ракета против крупных целей с очень большой дальностью и высоким уроном. Особенно полезна для оборонительных станций и дальнобойных артиллерийских кораблей."

NSC_PD_MISSILE: "Продвинутый ракетный блок «Харрингтон»"
NSC_PD_MISSILE_DESC: "Продвинутый блок ракет ПВО, способный уничтожать быстрые и манёвренные цели."

FRIGATE_TORPEDO_1: "Торпеда «Гарпун»"
FRIGATE_TORPEDO_1_DESC: "Специализированная торпеда, разработанная для малых пусковых установок класса «фрегат» и предназначенная для быстрых скрытных ударов на вражеской территории."

BATTLECRUISER_TORPEDO_1: "Торпеда «Минитмен»"
BATTLECRUISER_TORPEDO_1_DESC: "Получившая название за способность стрелять быстрее большинства других торпед, «Минитмен» представляет собой особую модификацию для линейных крейсеров, предназначенную для сокрушительных ударов по крупным вражеским кораблям. Её также можно устанавливать на звёздные базы и оборонительные платформы для дальнобойной защиты от крупных кораблей."

BATTLESHIP_SNIPER_GUN_1: "Электромагнитная флюкс-пушка"
BATTLESHIP_SNIPER_GUN_1_DESC: "Эти специализированные скорострельные турели предназначены для борьбы с юркими корветами. Они отличаются высокой точностью на большой дистанции, но хуже справляются с более толстым корпусом крупных кораблей."

BATTLESHIP_SNIPER_GUN_2: "Атомно-фотонная флюкс-пушка"
BATTLESHIP_SNIPER_GUN_2_DESC: "Эти специализированные скорострельные турели предназначены для борьбы с юркими корветами. Они отличаются высокой точностью на большой дистанции, но хуже справляются с более толстым корпусом крупных кораблей."

NSC_BB_SNIPER: "Электромагнитная флюкс-пушка"
NSC_BB_SNIPER_DESC: "Эти специализированные скорострельные турели предназначены для борьбы с юркими корветами. Они отличаются высокой точностью на большой дистанции, но хуже справляются с более толстым корпусом крупных кораблей."

NSC_BB_SNIPER_2: "Атомно-фотонная флюкс-пушка"
NSC_BB_SNIPER_2_DESC: "Эти специализированные скорострельные турели предназначены для борьбы с юркими корветами. Они отличаются высокой точностью на большой дистанции, но хуже справляются с более толстым корпусом крупных кораблей."

NSC_HYPER_DISRUPTOR: "Глушитель гипердвигателей"
