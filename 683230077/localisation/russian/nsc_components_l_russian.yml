NSC_AI_COMBAT_COMPUTER: "Боевая система искусственного интеллекта"
nsc_ai: "Боевая система искусственного интеллекта"
NSC_AI_BEHAVIOR_DESC: "Эта чрезвычайно продвинутая компьютерная система способна интеллектуально управлять всеми боевыми системами корабля, не перехватывая штурвал, что позволяет полностью контролировать его перемещение в бою.\n\n§GКак использовать:§! §BЭтот компьютер доступен только для некоторых классов кораблей. Он позволяет игроку напрямую управлять перемещением этих кораблей во время боя.\n\nКорабли, оснащённые этим компьютером,§! §HДОЛЖНЫ§! §Bнаходиться в отдельном флоте или только с другими кораблями, у которых установлен такой же компьютер — управление перемещением не будет работать в смешанных флотах, где есть корабли с другими боевыми компьютерами.\n\nПосле установки флот будет перемещаться в указанную вами точку и продолжит вести огонь, пока в радиусе действия оружия есть цель.§! §HФлот не сдвинется снова, пока вы не отдадите новый приказ.§!"

EXPLORER_COMBAT_COMPUTER_DEFAULT: "Бортовой компьютер"

nsc_strike_cruiser_aura: "Продвинутая система боевого перехвата"
nsc_strike_cruiser_aura_DESC: "Продвинутые боевые системы работают как интердиктор, сковывая все вражеские корабли в радиусе действия и не позволяя им отступить или выйти из боя. Незаменимая вещь для любого адмирала, преследующего более слабого или более уклончивого противника."
nsc_strike_cruiser_aura_2: "Продвинутая система боевого перехвата II"
nsc_strike_cruiser_aura_2_DESC: "Этот обновлённый модуль продвинутых боевых систем работает как ещё более эффективный интердиктор, чем его предшественник. Все вражеские силы в радиусе действия будут вынуждены сражаться ещё долгое время, прежде чем смогут попытаться уйти."
nsc_titan_aura: "Сеть командования флотом"
nsc_flagship_aura: "Продвинутая сеть командования флотом"

STRIKE_CRUISER_UPGRADE: "Системы модернизации ударного крейсера"
NSC_STRIKE_CRUISER_AURA: "Продвинутая система боевого перехвата"
NSC_STRIKE_CRUISER_AURA_2: "Продвинутая система боевого перехвата II"
NSC_TITAN_AURA: "Сеть командования флотом"
NSC_FLAGSHIP_AURA: "Продвинутая сеть командования флотом"

STRIKE_CRUISER_AFTERBURNER: "Штурмовой форсаж"
STRIKE_CRUISER_AFTERBURNER_DESC: "Особый форсажный двигатель, значительно увеличивающий скорость и уклонение §Yударного крейсера§! для быстрого сближения и атаки вражеских флотов."

special_ship_slot: "Особый компонент"
special_ship_slot_DESC: "Слот для особого компонента."

SPECIAL_SLOT_MULTIPHASIC_SENSORS: "Кустарник"
SPECIAL_SLOT_MULTIPHASIC_SENSORS_DESC: "Нам нужен кустарник. Красивый. И не слишком дорогой."

SPECIAL_SLOT_DAMAGE_CONTROL: "Ещё один кустарник"
SPECIAL_SLOT_DAMAGE_CONTROL_DESC: "Принесите нам ещё один кустарник и поставьте его рядом с этим кустарником."

SPECIAL_SLOT_READY_ROOM: "Рыцари, говорящие «Ни»"
SPECIAL_SLOT_READY_ROOM_DESC: "Ни! Ни! Ни!"

SPECIAL_SLOT_CREW_LOUNGE: "Святая ручная граната Антиохии"
SPECIAL_SLOT_CREW_LOUNGE_DESC: "И молвил Господь: «Сперва вынь Святую Чеку. Затем считай до трёх. Не больше. Не меньше. Три — вот число, до которого ты должен считать, и число счёта да будет три. Четыре не считай, и двух тоже не считай, разве что затем перейдёшь к трём. Пять — совсем исключается. Когда же число три, будучи третьим числом, будет достигнуто, тогда брось свою Святую ручную гранату Антиохии во врага твоего, который, будучи нечестив в очах Моих, тотчас погибнет.»"

SPECIAL_SLOT_FIRE_CONTROL: "Святой Грааль"
SPECIAL_SLOT_FIRE_CONTROL_DESC: "Здесь сказано: «Здесь можно найти последние слова Иосифа Аримафейского. Тот, кто храбр и чист духом, может обрести Святой Грааль в замке Аааууугггххх...»"

SPECIAL_SLOT_STRUCTURAL_INTEGRITY: "Всего лишь царапина"
SPECIAL_SLOT_STRUCTURAL_INTEGRITY_DESC: "Это всего лишь царапина! Царапина? Да у тебя руки нет! Нет, есть."

SPECIAL_SLOT_AUXILIARY_SHIELDS: "Храбрый сэр Робин"
SPECIAL_SLOT_AUXILIARY_SHIELDS_DESC: "Храбрый сэр Робин смело выехал из Камелота. Он не боялся умереть, о храбрый сэр Робин. Он совсем не боялся быть убитым самыми ужасными способами, храбрый, храбрый, храбрый сэр Робин. Он ни капли не страшился, что его превратят в кровавое месиво, выколют глаза и переломают локти. Что ему разобьют колени, сожгут тело и изрубят все конечности, храбрый сэр Робин. Что ему размозжат голову, вырежут сердце, вытащат печень и выпустят кишки, и оторвут нос, и сожгут зад, и его..."

SPECIAL_SLOT_QUANTUM_THRUSTERS: "Камелот"
SPECIAL_SLOT_QUANTUM_THRUSTERS_DESC: "Нет, подумав ещё раз, не поедем в Камелот. Это глупое место."

SPECIAL_SLOT_DEFLECTOR_ARRAY: "Рыцари Круглого стола"
SPECIAL_SLOT_DEFLECTOR_ARRAY_DESC: "Мы — рыцари Круглого стола, танцуем, как только можем. Мы ставим номера и поём хором, а шаг у нас безупречный. В Камелоте мы едим на славу — ветчину, джем и спам в огромных количествах. Мы — рыцари Круглого стола, и наши шоу великолепны. Но часто нам достаются рифмы, которые совсем не поются. В Камелоте мы без ума от оперы и поём от самой диафрагмы. В бою мы крепки и способны, почти неутомимы. Между подвигами шьём жилеты с блёстками и изображаем Кларка Гейбла. Жизнь в Камелоте очень насыщенная!"

SPECIAL_SLOT_KITCHEN_SINK: "Кухонная раковина"
SPECIAL_SLOT_KITCHEN_SINK_DESC: "Чистый экипаж — счастливый экипаж. Счастливый экипаж всё взрывает. И нет, мы до сих пор не знаем, почему это потребляет энергию."

SPECIAL_SLOT_STELLAR_CARTOGRAPHY: "Меч Экскалибур"
SPECIAL_SLOT_STELLAR_CARTOGRAPHY_DESC: "Нельзя же претендовать на высшую исполнительную власть только потому, что какая-то водяная девица швырнула в тебя меч!"

SPECIAL_SLOT_NAVIGATIONAL_ARRAY: "Французские солдаты"
SPECIAL_SLOT_NAVIGATIONAL_ARRAY_DESC: "Я больше не желаю с тобой разговаривать, пустоголовый скребок для кормушек! Я пукаю в твою сторону! Твоя мать была хомяком, а отец пах бузиной!"

SPECIAL_SLOT_MARS_WEAPON_SYSTEM: "Насилие, заложенное в системе"
SPECIAL_SLOT_MARS_WEAPON_SYSTEM_DESC: "Помогите, помогите! Меня угнетают!! Вы видели, как он меня угнетает?? Видели же, правда??"

SPECIAL_SLOT_STRIKE_CRAFT: "Правительство"
SPECIAL_SLOT_STRIKE_CRAFT_DESC: "Странные женщины, лежащие в прудах и раздающие мечи, — не основа для системы правления!"

SPECIAL_SLOT_TARGET_MAGNET: "Счастливого 1 апреля!"
SPECIAL_SLOT_TARGET_MAGNET_DESC: "Надеемся, эта маленькая шутка вас рассмешила, и желаем счастливого Дня смеха — от команды разработчиков NSC. (Не волнуйтесь, 2 апреля эта шутка будет возвращена к обычным значкам.)"

# special_ship_slot: "Особый компонент"
# special_ship_slot_DESC: "Слот для особого компонента."

# exploration_ship_slot: "Компонент исследования"
# exploration_ship_slot_DESC: "Особый слот для исследовательского компонента."

# hq_ftl_components: "Прыжковый двигатель штаба"
# hq_ftl_components_DESC: "Слот для прыжкового двигателя штаба."

# special_ship_slot: "Особый компонент"
# special_ship_slot_DESC: "Слот для особого компонента."

# SPECIAL_SLOT_MULTIPHASIC_SENSORS: "Многофазные сенсоры"
# SPECIAL_SLOT_MULTIPHASIC_SENSORS_DESC: "Эти продвинутые сенсоры увеличивают дальность обнаружения при помощи многофазных генераторов, обновляя и расширяя нашу карту галактики за счёт предварительного сканирования огромных участков пространства издалека."

# SPECIAL_SLOT_DAMAGE_CONTROL: "Аварийно-ремонтные команды"
# SPECIAL_SLOT_DAMAGE_CONTROL_DESC: "Эти специализированные члены экипажа обучены быстрому ремонту корабля в боевых условиях, что позволяет ему дольше сохранять боеспособность и реже возвращаться домой для ремонта после сражений."

# SPECIAL_SLOT_READY_ROOM: "Капитанская каюта готовности"
# SPECIAL_SLOT_READY_ROOM_DESC: "Командование боевым кораблём — тяжкое бремя, и даже самые способные капитаны неизбежно ощущают его давление. Выделив капитану личное пространство для отдыха, при этом оставив его доступным на случай чрезвычайной ситуации, мы улучшим его психологическое состояние и повысим его способность командовать кораблём в бою."

# SPECIAL_SLOT_CREW_LOUNGE: "Кают-компания экипажа"
# SPECIAL_SLOT_CREW_LOUNGE_DESC: "Длительные походы на борту космических боевых кораблей тяжело сказываются на экипаже. Наличие специально отведённых зон отдыха даст экипажу место для снятия лишнего стресса, улучшения психологического состояния и, в конечном счёте, повысит боевую эффективность."

# SPECIAL_SLOT_FIRE_CONTROL: "Система управления огнём"
# SPECIAL_SLOT_FIRE_CONTROL_DESC: "Эта продвинутая система наведения позволяет кораблю быстрее и точнее захватывать цели, нанося больший урон вражеским судам в бою."

# SPECIAL_SLOT_STRUCTURAL_INTEGRITY: "Поле структурной целостности"
# SPECIAL_SLOT_STRUCTURAL_INTEGRITY_DESC: "Эта продвинутая система силовых полей укрепляет конструкцию корпуса корабля изнутри, помогая ему дольше выдерживать вражеский огонь до критического разрушения."

# SPECIAL_SLOT_AUXILIARY_SHIELDS: "Вспомогательная щитовая система"
# SPECIAL_SLOT_AUXILIARY_SHIELDS_DESC: "Эта вспомогательная серия резервных генераторов щита усиливает щиты корабля во время боя, делая их более устойчивыми к вражескому огню."

# SPECIAL_SLOT_QUANTUM_THRUSTERS: "Квантовые двигатели"
# SPECIAL_SLOT_QUANTUM_THRUSTERS_DESC: "Даже самые мощные флоты бесполезны, если их нет там, где они нужны, и тогда, когда они нужны. Хотя содержание этих квантовых двигателей обходится очень дорого и ускоряет износ корабля в целом, они значительно повышают досветовую скорость, позволяя нашим флотам быстрее реагировать на любые возникающие ситуации."

# SPECIAL_SLOT_DEFLECTOR_ARRAY: "Массив дефлекторов"
# SPECIAL_SLOT_DEFLECTOR_ARRAY_DESC: "Эти массивы дефлекторов снижают нагрузку на генераторы щита, позволяя щитам корабля быстрее восстанавливаться после боя и готовиться к следующему столкновению. В кампаниях, где в одной системе подряд происходят несколько сражений, это может означать разницу между победой и поражением."

# SPECIAL_SLOT_KITCHEN_SINK: "Кухонная раковина"
# SPECIAL_SLOT_KITCHEN_SINK_DESC: "Чистый экипаж — счастливый экипаж. Счастливый экипаж всё взрывает. И нет, мы до сих пор не знаем, почему это потребляет энергию."

# SPECIAL_SLOT_STELLAR_CARTOGRAPHY: "Звёздная картография"
# SPECIAL_SLOT_STELLAR_CARTOGRAPHY_DESC: "Эта крупная система используется для картографирования окружающего пространства, позволяя корабельным компьютерам быстрее рассчитывать прыжки ССД и восстанавливаться после них."

# SPECIAL_SLOT_NAVIGATIONAL_ARRAY: "Навигационный массив"
# SPECIAL_SLOT_NAVIGATIONAL_ARRAY_DESC: "Эта продвинутая трёхмерная навигационная система выполняет две функции: во-первых, повышает способность корабельного оружия отслеживать вражеские суда в бою, а во-вторых, увеличивает дальность прыжковых двигателей корабля, если таковые установлены."

# SPECIAL_SLOT_MARS_WEAPON_SYSTEM: "Система вооружения MARS"
# SPECIAL_SLOT_MARS_WEAPON_SYSTEM_DESC: "Эта продвинутая система вооружения точечной обороны специально предназначена для отслеживания маленьких, крайне манёвренных целей — ракет, торпед и штурмовиков — и обеспечивает исключительно точное наведение на огромной скорости, повышая скорострельность и урон корабельного оружия ПКО."

# SPECIAL_SLOT_STRIKE_CRAFT: "Сеть командования и управления авианосцем"
# SPECIAL_SLOT_STRIKE_CRAFT_DESC: "Продвинутая сеть радаров и коммуникационных массивов, упрощающая командование и управление большим количеством штурмовиков и повышающая их эффективность."

# SPECIAL_SLOT_TARGET_MAGNET: "Переопределение наведения"
# SPECIAL_SLOT_TARGET_MAGNET_DESC: "Антенные массивы искусственно увеличивают заметное сечение этого корабля, вынуждая вражеское оружие наводиться на него вместо ближайших союзников."



EXPLORATION_SLOT_ANOMALY_LAB: "Лаборатория исследования аномалий"
EXPLORATION_SLOT_ANOMALY_LAB_DESC: "Эта лаборатория посвящена изучению аномалий — странных и удивительных явлений галактики, которые, похоже, не подчиняются тем же законам, что и всё остальное. Каждая из них заслуживает полного и всестороннего анализа, но открытий слишком много, а времени слишком мало. Оптимизировав лабораторию для изучения этих любопытных странностей, мы сможем уделить каждой аномалии должное внимание и при этом значительно ускорить время исследований."
EXPLORATION_SLOT_SURVEY_LAB: "Разведывательная лаборатория"
EXPLORATION_SLOT_SURVEY_LAB_DESC: "Во Вселенной так много планет и систем, которые ждут, чтобы их открыли, и каждая из них может скрывать ключ к новым открытиям. Нельзя терять ни минуты, и эта специализированная лаборатория позволит нам проводить исследования гораздо быстрее — а значит, за то же время мы сможем обследовать куда больше пространства. Больше исследований — больше открытий, больше приключений и больше знаний о галактике."
EXPLORATION_SLOT_ANALYSIS_LAB: "Продвинутая аналитическая лаборатория"
EXPLORATION_SLOT_ANALYSIS_LAB_DESC: "Любая аномалия по самой своей природе заставляет нас задавать вопросы и пересматривать прежние представления. Для развития науки нет ничего ценнее. Мы не можем позволить себе упустить ни одной потенциальной аномалии и ни одной тайны, которую она скрывает. Эта специализированная лаборатория гарантирует, что мы обнаружим каждую аномалию, которую может предложить галактика."
EXPLORATION_SLOT_DEBRIS_LAB: "Лаборатория анализа обломков"
EXPLORATION_SLOT_DEBRIS_LAB_DESC: "Эта лаборатория посвящена исследованию и анализу обломков космических кораблей, оставшихся после космических сражений. Космический мусор — как современный, так и древний — может стать ключом к разгадке бесчисленных тайн Вселенной."
EXPLORATION_SLOT_ARCH_LAB: "Продвинутая археологическая лаборатория"
EXPLORATION_SLOT_ARCH_LAB_DESC: "Эта лаборатория посвящена изучению археологических исследовательских площадок. Эти места хранят бесчисленные тайны, разжигающие воображение, и заслуживают отдельной лаборатории, где всё, что с ними связано, можно изучить в полной мере."
EXPLORATION_SLOT_STELLAR_CARTOGRAPHY: "Звёздная картография"
EXPLORATION_SLOT_STELLAR_CARTOGRAPHY_DESC: "Эта крупная система используется для картографирования окружающего пространства, позволяя корабельным компьютерам рассчитывать прыжки ССД и восстанавливаться после них с гораздо большей скоростью. Эти модули звёздной картографии куда эффективнее моделей, используемых на обычных боевых кораблях, но и гораздо капризнее, поэтому требуют твёрдой руки высококвалифицированного научного офицера."
EXPLORATION_SLOT_QUANTUM_THRUSTERS: "Квантовые двигатели"
EXPLORATION_SLOT_QUANTUM_THRUSTERS_DESC: "Когда вокруг столько неизведанного, каждая секунда, потраченная на перелёты между точками исследования, — потерянное время. Эти квантовые двигатели созданы, чтобы нести наш корабль сквозь пространство с головокружительной скоростью, устремляя его к следующей планете, следующей звезде, следующей великой тайне, ожидающей разгадки."
EXPLORATION_SLOT_NAVIGATIONAL_ARRAY: "Навигационный массив"
EXPLORATION_SLOT_NAVIGATIONAL_ARRAY_DESC: "Эти продвинутые трёхмерные навигационные системы специально разработаны для максимального увеличения дальности наших сенсоров, быстро обновляя и расширяя карту галактики за счёт предварительного сканирования огромных участков пространства издалека."
EXPLORATION_SLOT_PHYSICS_LAB: "Продвинутая физическая лаборатория"
EXPLORATION_SLOT_PHYSICS_LAB_DESC: "§HПроизводит:§! 10 ед. физических исследований\nЭта продвинутая лаборатория посвящена прорывным исследованиям в области физики — изучению тайн материи и энергии, вычислительных систем и управления полями."
EXPLORATION_SLOT_SOCIETY_LAB: "Продвинутая социологическая лаборатория"
EXPLORATION_SLOT_SOCIETY_LAB_DESC: "§HПроизводит:§! 10 ед. общественных исследований\nЭта продвинутая лаборатория посвящена прорывным исследованиям в области социума — изучению тайн социологии, биологии, философии и военной теории, наук о жизни и культуре."
EXPLORATION_SLOT_ENGINEERING_LAB: "Продвинутая инженерная лаборатория"
EXPLORATION_SLOT_ENGINEERING_LAB_DESC: "§HПроизводит:§! 10 ед. инженерных исследований\nЭта продвинутая лаборатория посвящена прорывным исследованиям в области инженерии — изучению тайн материалов, промышленности, космических кораблей, двигательных систем и робототехники."

EXPLORATION_SLOT_MINING_FACILITY: "Астероидный горнодобывающий комплекс"
EXPLORATION_SLOT_MINING_FACILITY_DESC: "§HПроизводит:§! 7 минералов\n§HСодержание:§! 5 энергии\nЭтот комплекс позволяет империи переоборудовать старый исследовательский корабль в продвинутую добывающую платформу, способную ежемесячно производить небольшое количество минералов."

EXPLORATION_SLOT_SOLAR_ARRAY: "Массив солнечных панелей"
EXPLORATION_SLOT_SOLAR_ARRAY_DESC: "§HПроизводит:§! 7 энергии\n§HСодержание:§! 5 минералов\nЭтот комплекс позволяет империи переоборудовать старый исследовательский корабль в крупный массив солнечных панелей и батарейную систему, способную ежемесячно производить небольшое количество энергии."

EXPLORATION_SLOT_ALLOY_REFINERY: "Сплаволитейный комплекс"
EXPLORATION_SLOT_ALLOY_REFINERY_DESC: "§HПроизводит:§! 7 сплавов\n§HСодержание:§! 3 минерала и 3 энергии\nЭтот комплекс позволяет империи переоборудовать старый исследовательский корабль в современный сплаволитейный завод, способный ежемесячно производить небольшое количество сплавов."

FRIGATE_CLOAK: "Продвинутое маскировочное устройство фрегата"
FRIGATE_CLOAKING: "Продвинутое маскировочное устройство фрегата"
BATTLECRUISER_CLOAK: "Тяжёлое маскировочное устройство линейного крейсера"
BATTLECRUISER_CLOAKING: "Тяжёлое маскировочное устройство линейного крейсера"

FIGHTERS_HANGAR_PD_1: "Базовое авиакрыло истребителей (ПВО)"
FIGHTERS_HANGAR_PD_1_DESC: "Базовые истребители будут выдвигаться для перехвата ближайших противников, когда корабль-носитель вступит в бой. Они будут держаться рядом с носителем, чтобы перехватывать бомбардировщики и ракеты."
FIGHTERS_HANGAR_PD_2: "Улучшенное авиакрыло истребителей (ПВО)"
FIGHTERS_HANGAR_PD_2_DESC: "Улучшенные истребители поражают малые вражеские корабли, а также бомбардировщики и штурмовики, действуя в координированных манёврах. Они будут держаться рядом с носителем, чтобы перехватывать бомбардировщики и ракеты."
FIGHTERS_HANGAR_PD_3: "Продвинутое авиакрыло истребителей (ПВО)"
FIGHTERS_HANGAR_PD_3_DESC: "Продвинутое авиакрыло истребителей способно наносить значительный урон малым вражеским кораблям и эффективно противостоять вражеским штурмовикам. Оно будет держаться рядом с носителем, чтобы перехватывать бомбардировщики и ракеты."

LARGE_FIGHTERS_HANGAR_PD_1: "Базовое авиакрыло истребителей (ПВО)"
LARGE_FIGHTERS_HANGAR_PD_2: "Улучшенное авиакрыло истребителей (ПВО)"
LARGE_FIGHTERS_HANGAR_PD_3: "Продвинутое авиакрыло истребителей (ПВО)"

NSC_REACTOR_BOOSTER_1: "Гравитонные усилители"
NSC_REACTOR_BOOSTER_1_DESC: "Усилители реактора, улучшенные с помощью гравитонной энергетической технологии."
NSC_REACTOR_BOOSTER_2: "Наквадрийные усилители"
NSC_REACTOR_BOOSTER_2_DESC: "Усилители реактора, улучшенные с помощью энергетической технологии наквадрии."
NSC_REACTOR_BOOSTER_3: "Сингулярные усилители"
NSC_REACTOR_BOOSTER_3_DESC: "Усилители реактора, улучшенные с помощью энергетической технологии сингулярности."

CORVETTE_SENSOR: "Разведывательный сенсор корвета"
CORVETTE_SENSOR_DESC: "Этот специальный сенсорный комплекс позволит кораблям класса «корвет» разведывать системы на наличие угроз до отправки ваших ценных научных команд."

NSC_BOMBARDMENT_1: "Улучшенная бомбардировка"
NSC_BOMBARDMENT_1_DESC: "Теперь мы можем оснащать наши военные корабли улучшенным оружейным комплексом, который повысит урон при бомбардировке планет."
NSC_BOMBARDMENT_2: "Усиленная бомбардировка"
NSC_BOMBARDMENT_2_DESC: "Теперь мы можем оснащать наши военные корабли усиленным оружейным комплексом, который повысит урон при бомбардировке планет."
NSC_BOMBARDMENT_3: "Продвинутая бомбардировка"
NSC_BOMBARDMENT_3_DESC: "Теперь мы можем оснащать наши военные корабли продвинутым оружейным комплексом, который повысит урон при бомбардировке планет."

NSC_NANITE_FIELD: "Нанитный распылитель"
nsc_nanite_aura: "Нанитный распылитель"
nsc_starbase_nanite_aura: "Нанитный распылитель"
nsc_starbase_nanite_aura_DESC: "Продвинутые наниты, разъедающие броню вражеских кораблей, нарушая молекулярные связи."
sm_nsc_nanite_field: "Поле нанитного распылителя"
sm_nsc_nanite_field_desc: "Этот комплекс производит, хранит и развёртывает продвинутые наниты, разъедающие броню вражеских кораблей, нарушая молекулярные связи."

FLAGSHIP_JUMP_DRIVE: "Прыжковый двигатель флагмана"
FLAGSHIP_JUMP_DRIVE_DESC: "Прыжковый двигатель флагмана разрывает в самой ткани реальности отверстия размером с корабль, позволяя почти мгновенно перемещаться между системами. Природа пространства, через которое проходит корабль во время такого путешествия, до сих пор плохо изучена."

HEADQUARTERS_JUMP_DRIVE: "Прыжковый двигатель штаба"
HEADQUARTERS_JUMP_DRIVE_DESC: "Прыжковый двигатель штаба разрывает в самой ткани реальности отверстия размером со станцию, позволяя почти мгновенно перемещаться между системами. Из-за размеров и массы станции этому двигателю требуется чрезвычайно долгое время на перезарядку, поэтому использовать его можно лишь изредка."

EXPLORATION_HYPER_DRIVE: "Гипердвигатель исследователя"
EXPLORATION_HYPER_DRIVE_DESC: "Корабли, оснащённые гипердвигателями, быстро перемещаются между окраинами звёздных систем по межзвёздным гиперлиниям."

# NSC_AMMO_CRYSTAL_1: "Фокусирующий кристалл"
# NSC_AMMO_CRYSTAL_1_DESC: "Особый кристалл, предназначенный для фокусировки лазерных лучей и усиления их разрушительной мощи. Из-за высокого энергопотребления другие типы оружия будут стрелять медленнее."

