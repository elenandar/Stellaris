TECH_UNLOCK_PD_FRIGATE_CONSTRUCTION_TITLE: "§HОткрывает тип секции:§! Эскортный фрегат"
TECH_UNLOCK_PD_FRIGATE_CONSTRUCTION_DESC: "§HФрегат ПКО§!\nРакеты, торпеды и штурмовики представляют серьёзную угрозу для наших флотов. Наши флотские инженеры предлагают перепроектировать фрегаты, оснастив их множеством систем точечной обороны, чтобы сбивать такие цели до того, как они достигнут наших кораблей."

TECH_UNLOCK_STRIKECRUISER_CONSTRUCTION_TITLE: "§HОткрывает тип корабля:§! Ударный крейсер"
TECH_UNLOCK_STRIKECRUISER_CONSTRUCTION_DESC: "§HУдарный крейсер§!\nБоевой опыт и обширные штабные игры показывают, что сражения флотов часто заканчиваются без решающего исхода, потому что проигрывающая сторона немедленно совершает аварийный скачок в ССД. Наши лучшие учёные сумели миниатюризировать субпространственный захват, используемый на звёздных базах, для размещения на корабле. Эти суда будут невероятно быстрыми, чтобы настигать вражеские флоты и ловить их в свои захваты, достаточно манёвренными, чтобы не позволять врагу выйти из боя, и достаточно прочными, чтобы выдерживать серьёзный урон и как можно дольше удерживать противника на месте."

TECH_UNLOCK_BATTLECRUISER_CONSTRUCTION_TITLE: "§HОткрывает тип корабля:§! Линейный крейсер"
TECH_UNLOCK_BATTLECRUISER_CONSTRUCTION_DESC: "§HЛинейный крейсер§!\nПо мере того как всё более крупные корабли становятся обычным явлением, бои ведутся на всё больших дистанциях, а огневая мощь становится всё более решающим фактором в сражении. Наши военно-морские теоретики предлагают построить длинное и мощное судно, способное нести крупные, средние и, что особенно важно, направляемые системы вооружения, чтобы специализироваться на обрушении на врага максимально возможного количества огня как в боях на средней, так и на дальней дистанции."

TECH_UNLOCK_ESCORTCARRIER_CONSTRUCTION_TITLE: "§HОткрывает модернизацию корабля:§! Лёгкий авианосец"
TECH_UNLOCK_ESCORTCARRIER_CONSTRUCTION_DESC: "§HЭскортный авианосец§!\nКорабли класса «эсминец» можно переоборудовать в специализированные лёгкие платформы для штурмовиков, что позволит нашим флотам получить столь необходимую огневую поддержку на передовой."

TECH_UNLOCK_CARRIER_CONSTRUCTION_TITLE: "§HОткрывает тип корабля:§! Авианосец"
TECH_UNLOCK_CARRIER_CONSTRUCTION_DESC: "§HАвианосец§!\nШтурмовики доказали свою высокую эффективность в космических сражениях. Пришло время спроектировать специализированный боевой корабль, созданный специально для доставки этого вооружения в бой, а также размещения большого числа обслуживающего персонала и технических отсеков, необходимых для его эксплуатации. Это позволит новым авианосцам нести куда больше штурмовиков, чем их более импровизированные предшественники."

TECH_UNLOCK_HEAVYCARRIER_CONSTRUCTION_TITLE: "§HОткрывает тип секции:§! Тяжёлый авианосец"
TECH_UNLOCK_HEAVYCARRIER_CONSTRUCTION_DESC: "§HТяжёлый авианосец§!\nПо мере роста наших возможностей в кораблестроении мы продолжаем искать новые способы развития существующих схем кораблей. В сочетании с новыми достижениями в миниатюризации множества систем обслуживания штурмовиков мы полагаем, что сможем переоборудовать существующие авианосцы в тяжёлые авианосцы, способные поддерживать больше ангарных отсеков."

TECH_UNLOCK_SUPERCARRIER_CONSTRUCTION_TITLE: "§HОткрывает тип секции:§! Суперавианосец"
TECH_UNLOCK_SUPERCARRIER_CONSTRUCTION_DESC: "§HСуперавианосец§!\nДальнейшие успехи как в кораблестроении, так и в миниатюризации систем обслуживания штурмовиков позволят нам втиснуть в авианосцы поистине невероятное число ангарных отсеков. Эти суперавианосцы смогут поддерживать целые рои штурмовиков, чтобы лучше защищать наши флоты от атак и сокрушать врага руками лучших пилотов."

TECH_UNLOCK_SPITFIRE_CONSTRUCTION_TITLE: "§HМодернизация линкора «Спитфайр»§!"
TECH_UNLOCK_SPITFIRE_CONSTRUCTION_DESC: "Хотя крупные корабли куда мощнее любых судов, что были до них, они также гораздо дороже и представляют собой лакомые цели для роев меньших и более дешёвых кораблей, способных задавить их числом. Чтобы противостоять этому, наши инженеры работают над чертежами, которые позволят превратить линкор в настоящую машину для уничтожения корветов и эсминцев, снабдив его оружием, специально предназначенным для этой роли. Эти новые проекты сделают «линкоры-спитфайр» ещё дороже в производстве, но такая жертва оправданна, если она позволит защитить наши уязвимые крупные корабли."

TECH_UNLOCK_DREADNOUGHT_CONSTRUCTION_TITLE: "§HОткрывает тип корабля:§! Дредноут"
TECH_UNLOCK_DREADNOUGHT_CONSTRUCTION_DESC: "§HДредноут§!\nЛинкор ознаменовал новую эпоху в кораблестроении и военно-морском бою. Возможность наносить и выдерживать огромный урон на дальней дистанции, а также появление разрушительного XL-оружия полностью изменили саму природу войны. Наши флотские инженеры считают, что нам следует разработать ещё более совершенную версию этих мощных судов. Предлагаемые ими «дредноуты» смогут нести более тяжёлую защиту, больше орудий и даже два тех самых невероятных XL-орудия, уже доказавших свою эффективность на поле боя."

TECH_UNLOCK_FLAGSHIP_CONSTRUCTION_TITLE: "§HОткрывает тип корабля:§! Флагман"
TECH_UNLOCK_FLAGSHIP_CONSTRUCTION_DESC: "§HФлагман§!\nГонка военно-морских вооружений привела к появлению всё больших и больших боевых кораблей, и конца этому не видно. Наши флотские инженеры предложили довести эту последовательную эскалацию до логического предела, построив настолько огромный и мощный корабль, что ни одна империя не сможет содержать более одного такого судна одновременно. Предлагаемый флагман станет величайшим боевым кораблём. Благодаря максимальной универсальности каждая его секция сможет иметь множество конфигураций, позволяя нам проектировать флагман под конкретные задачи. Имея гораздо больше двигателей на тонну массы, чем любой другой корабль, флагман сможет занимать любую позицию во флоте — от дальнобойной батареи в тылу до массивного штурмового тарана на острие атаки.\n\nОднако такая мощь и универсальность обойдутся очень дорого. Само строительство флагмана станет грандиозным предприятием, требующим колоссального запаса ресурсов и значительных вложений времени и рабочей силы. После завершения на его содержание будет уходить весь ВВП небольшого звёздного государства; в результате для одобрения проекта потребуется огромное политическое влияние."

TECH_UNLOCK_SUPPORTSHIP_CONSTRUCTION_TITLE: "§HОткрывает модернизацию корабля:§! Эсминец поддержки"
TECH_UNLOCK_SUPPORTSHIP_CONSTRUCTION_DESC: "§HКорабль поддержки флота§!\nПо мере роста наших флотов и увеличения дальности их походов становится необходимым обеспечивать их поддержку изнутри, а не пытаться поддерживать длинные линии снабжения. Эсминец поддержки — ответ на эту проблему: он расширяет вспомогательные возможности наших крейсеров за счёт установки продвинутых модулей." 

TECH_UNLOCK_EXPLORATIONSHIP_CONSTRUCTION_TITLE: "§HОткрывает тип корабля:§! Исследователь"
TECH_UNLOCK_EXPLORATIONSHIP_CONSTRUCTION_DESC: "§HИсследователь§!\nНашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши флотские инженеры предлагают разработать крупный боеспособный научный корабль, предназначенный для исследования новых миров, поиска новой жизни и новых цивилизаций и для смелых полётов туда, где ещё никто не бывал."

TECH_UNLOCK_EXPLORATIONSHIP2_CONSTRUCTION_TITLE: "§HОткрывает модернизацию корабля:§! Исследователь — уровень 2"
TECH_UNLOCK_EXPLORATIONSHIP2_CONSTRUCTION_DESC: "§HИсследователь — уровень 2§!\nНашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши флотские инженеры, довольные характеристиками «Исследователя», предлагают разработать более мощный вариант, чтобы ещё лучше защитить наших лучших и талантливейших научных офицеров."

TECH_UNLOCK_EXPLORATIONSHIP3_CONSTRUCTION_TITLE: "§HОткрывает модернизацию корабля:§! Исследователь — уровень 3"
TECH_UNLOCK_EXPLORATIONSHIP3_CONSTRUCTION_DESC: "§HИсследователь — уровень 3§!\nНашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши флотские инженеры, довольные характеристиками улучшенной формы «Исследователя», предлагают разработать ещё более мощный вариант, чтобы ещё лучше защитить наших лучших и талантливейших научных офицеров."

TECH_UNLOCK_EXPLORATIONSHIP4_CONSTRUCTION_TITLE: "§HОткрывает модернизацию корабля:§! Исследователь — уровень 4"
TECH_UNLOCK_EXPLORATIONSHIP4_CONSTRUCTION_DESC: "§HИсследователь — уровень 4§!\nНашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши флотские инженеры, довольные характеристиками улучшенной формы «Исследователя», предлагают разработать ещё более мощный вариант, чтобы ещё лучше защитить наших лучших и талантливейших научных офицеров."

TECH_UNLOCK_DRYDOCK_CONSTRUCTION_TITLE: "§HОткрывает здание звёздной базы:§! Сухой док"
TECH_UNLOCK_DRYDOCK_CONSTRUCTION_DESC: "§HСухой док§!\nЭто специально спроектированное сооружение использует передовые технологии для поддержания атмосферного давления внутри верфей, позволяя рабочим легче строить, обслуживать, модернизировать и ремонтировать сразу множество боевых кораблей."

TECH_UNLOCK_SENSORSTATION_CONSTRUCTION_TITLE: "§HОткрывает здание звёздной базы:§! Сенсорная станция"
TECH_UNLOCK_SENSORSTATION_CONSTRUCTION_DESC: "§HСенсорная станция§!\nСенсорная станция звёздной базы использует продвинутые сенсорные массивы, расширяя наши возможности сбора разведданных на несколько звёздных систем и заранее предупреждая о возможных угрозах у наших границ."

TECH_UNLOCK_STRONGHOLD_CONSTRUCTION_TITLE: "§HОткрывает улучшение звёздной базы:§! Великая цитадель"
TECH_UNLOCK_STRONGHOLD_CONSTRUCTION_DESC: "§HОплот§!\nПо мере того как флоты становятся больше и сильнее, нашим звёздным базам и оборонительным сооружениям тоже необходимо наращивать мощь. «Великая цитадель» — это мощная и высокоразвитая станция системной обороны, представляющая собой огромный шаг вперёд по сравнению с нынешними звёздными базами класса «Цитадель». Эти ценные и развитые базы играют важную роль для нашей империи и могут поддерживать широкий спектр сооружений."

TECH_UNLOCK_HEADQUARTERS_CONSTRUCTION_TITLE: "§HОткрывает улучшение звёздной базы:§! Солнечный бастион"
TECH_UNLOCK_HEADQUARTERS_CONSTRUCTION_DESC: "§HСолнечный бастион§!\nФинальное улучшение в цепочке звёздных баз, «Солнечный бастион», — это высшая командная и оборонительная станция, крупнейший класс звёздной базы, который вообще возможно построить. Вражеские флоты будут разбиваться об эти громадные оплоты, и каждая такая база является жизненно важным активом нашей империи, защищая самые критические точки на карте галактики."

TECH_UNLOCK_DEFENSESTATION_CONSTRUCTION_TITLE: "§HОткрывает станцию:§! Оборонительная станция звёздной базы"
TECH_UNLOCK_DEFENSESTATION_CONSTRUCTION_DESC: "§HОборонительная станция звёздной базы§!\nПо мере того как флоты становятся больше и сильнее, нашим оборонительным сооружениям тоже необходимо наращивать мощь. Эти расширенные оборонительные станции, представляющие собой улучшение базовых оборонительных платформ, которые мы используем сейчас, позволят нам лучше защищать нашу территорию от вражеских атак."

TECH_UNLOCK_DEFENSEFORTRESS_CONSTRUCTION_TITLE: "§HОткрывает станцию:§! Оборонительная крепость звёздной базы"
TECH_UNLOCK_DEFENSEFORTRESS_CONSTRUCTION_DESC: "§HОборонительная крепость звёздной базы§!\nПо мере того как флоты становятся больше и сильнее, нашим оборонительным сооружениям тоже необходимо наращивать мощь. Эти расширенные оборонительные сооружения уровня крепости, являющиеся улучшением используемых сейчас оборонительных станций, позволят нам лучше защищать нашу территорию от вражеских атак."

TECH_UNLOCK_SPECIALCOMPONENTS_CONSTRUCTION_TITLE: "§HОткрывает набор компонентов:§! Продвинутые компоненты боевых кораблей"
TECH_UNLOCK_SPECIALCOMPONENTS_CONSTRUCTION_DESC: "§HПродвинутые компоненты боевых кораблей§!\nНаши учёные разработали широкий спектр мощных новых модулей, позволяющих усиливать и дополнительно специализировать наши боевые корабли. Теперь остаётся лишь миниатюризировать их, чтобы сделать достаточно компактными для размещения на наших судах."

TECH_UNLOCK_NSC_DLC_CONSTRUCTION_TITLE: "Это автоматическая стартовая технология для проверки наличия DLC Apocalypse."
TECH_UNLOCK_NSC_DLC_CONSTRUCTION_DESC: "Это автоматическая стартовая технология для проверки наличия DLC Apocalypse."

TECH_UNLOCK_MINING_BASE_CONSTRUCTION_TITLE: "§HОткрывает здание звёздной базы:§! Системный минералообрабатывающий комплекс"
TECH_UNLOCK_MINING_BASE_CONSTRUCTION_DESC: "§HДобывающая база§!\nСистемный центр переработки минералов, повышающий производство минералов во всей системе."

TECH_UNLOCK_POWER_STATON_CONSTRUCTION_TITLE: "§HОткрывает здание звёздной базы:§! Системная энергосеть"
TECH_UNLOCK_POWER_STATON_CONSTRUCTION_DESC: "§HЭнергостанция§!\nСистемная энергосеть, повышающая выработку энергии во всей системе."

TECH_UNLOCK_AICOMPUTER_CONSTRUCTION_TITLE: "§HОткрывает боевой компьютер:§! Боевая система искусственного интеллекта"
TECH_UNLOCK_AICOMPUTER_CONSTRUCTION_DESC: "§HБоевая ИИ-система§!\nЭта чрезвычайно продвинутая компьютерная система способна интеллектуально управлять всеми боевыми системами определённых кораблей, не перехватывая штурвал, что позволяет полностью контролировать их перемещение в бою."

TECH_UNLOCK_CRUISEMISSILE_CONSTRUCTION_TITLE: "§HОткрывает оружие:§! Продвинутая крылатая ракета «Томагавк»\n§HОткрывает оружие:§! Торпеда «Гарпун»"
TECH_UNLOCK_CRUISEMISSILE_CONSTRUCTION_DESC: "§HПродвинутые крылатые ракеты§!\nС появлением линейных крейсеров, рассчитанных на установку большого числа ракетных пусковых установок, а также с развитием боёв на всё больших дистанциях и появлением массивных крупных кораблей и оборонительных сооружений возникла явная необходимость в более крупных и мощных ракетах, способных противостоять этим новым угрозам и запускаться с наших линейных крейсеров. Эти продвинутые крылатые ракеты и являются ответом на новую потребность."

TECH_UNLOCK_GALACTIC_MALL_TITLE: "§HОткрывает мегасооружение:§! Галактический торговый центр"
TECH_UNLOCK_GALACTIC_MALL_DESC: "Крупнейший торговый центр галактики, способный производить огромные объёмы потребительских товаров и обеспечивать идеальный поход за покупками для самых преданных любителей шопинга."

TECH_UNLOCK_HOPSITAL_TITLE: "§HОткрывает мегасооружение:§! Галактическая центральная больница"
TECH_UNLOCK_HOSPITAL_DESC: "Гигантская высокотехнологичная космическая больница, посвящённая изучению различных ксенорас галактики, а также анализу и лечению всех заболеваний и состояний, которым они подвержены."
