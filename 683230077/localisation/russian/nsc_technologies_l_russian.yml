l_russian:

##################################################################################################################################################################################################################
### TECHNOLOGIES ###
####################

tech_pd_frigate_1: "Модернизация эскортного фрегата"
tech_pd_frigate_1_desc: "Ракеты, торпеды и штурмовики представляют серьёзную угрозу для наших флотов. Наши флотские инженеры предлагают перепроектировать фрегаты, оснастив их множеством систем точечной обороны, чтобы сбивать такие цели до того, как они достигнут наших кораблей."

tech_StrikeCruiser_1: "Ударный крейсер"
tech_StrikeCruiser_1_desc: "Боевой опыт и обширные штабные игры показывают, что сражения флотов часто заканчиваются без решающего исхода, потому что проигрывающая сторона немедленно совершает аварийный скачок в ССД. Наши лучшие учёные сумели миниатюризировать субпространственный захват, используемый на звёздных базах, для размещения на корабле. Эти суда будут невероятно быстрыми, чтобы настигать вражеские флоты и ловить их в свои захваты, достаточно манёвренными, чтобы не позволять врагу выйти из боя, и достаточно прочными, чтобы выдерживать серьёзный урон и как можно дольше удерживать противника на месте."

tech_Battlecruiser_1: "Линейный крейсер"
tech_Battlecruiser_1_desc: "По мере того как всё более крупные корабли становятся обычным явлением, бои ведутся на всё больших дистанциях, а огневая мощь становится всё более решающим фактором в сражении. Наши военно-морские теоретики предлагают построить длинное и мощное судно, способное нести крупные, средние и, что особенно важно, направляемые системы вооружения, чтобы специализироваться на обрушении на врага максимально возможного количества огня как в боях на средней, так и на дальней дистанции."

tech_escortcarrier_1: "Модернизация лёгкого авианосца"
tech_escortcarrier_1_desc: "Корабли класса «эсминец» можно переоборудовать в лёгкие платформы для штурмовиков, что позволит нашим флотам получить столь необходимую огневую поддержку на передовой."

tech_Carrier_1: "Авианосец"
tech_Carrier_1_desc: "Штурмовики доказали свою высокую эффективность в космических сражениях. Пришло время спроектировать специализированный боевой корабль, созданный специально для доставки этого вооружения в бой, а также размещения большого числа обслуживающего персонала и технических отсеков, необходимых для его эксплуатации. Это позволит новым авианосцам нести куда больше штурмовиков, чем их более импровизированные предшественники."

tech_heavycarrier_1: "Модернизация тяжёлого авианосца"
tech_heavycarrier_1_desc: "По мере роста наших возможностей в кораблестроении мы продолжаем искать новые способы развития существующих схем кораблей. В сочетании с новыми достижениями в миниатюризации множества систем обслуживания штурмовиков мы полагаем, что сможем переоборудовать существующие авианосцы в тяжёлые авианосцы, способные поддерживать больше ангарных отсеков."

tech_supercarrier_1: "Модернизация суперавианосца"
tech_supercarrier_1_desc: "Дальнейшие успехи как в кораблестроении, так и в миниатюризации систем обслуживания штурмовиков позволят нам втиснуть в авианосцы поистине невероятное число ангарных отсеков. Эти суперавианосцы смогут поддерживать целые рои штурмовиков, чтобы лучше защищать наши флоты от атак и сокрушать врага руками лучших пилотов."

tech_spitfire_1: "Специализация линкора «Спитфайр»"
tech_spitfire_1_desc: "Хотя крупные корабли куда мощнее любых судов, что были до них, они также гораздо дороже и представляют собой лакомые цели для роев меньших и более дешёвых кораблей, способных задавить их числом. Чтобы противостоять этому, наши инженеры работают над чертежами, которые позволят превратить линкор в настоящую машину для уничтожения корветов и эсминцев, снабдив его оружием, специально предназначенным для этой роли. Эти новые проекты сделают «линкоры-спитфайр» ещё дороже в производстве, но такая жертва оправданна, если она позволит защитить наши уязвимые крупные корабли."

tech_Dreadnought_1: "Дредноут"
tech_Dreadnought_1_desc: "Линкор ознаменовал новую эпоху в кораблестроении и военно-морском бою. Возможность наносить и выдерживать огромный урон на дальней дистанции, а также появление разрушительного XL-оружия полностью изменили саму природу войны. Наши флотские инженеры считают, что нам следует разработать ещё более совершенную версию этих мощных судов. Предлагаемые ими «дредноуты» смогут нести более тяжёлую защиту, больше орудий и даже два тех самых невероятных XL-орудия, уже доказавших свою эффективность на поле боя."

tech_Flagship_1: "Флагман"
tech_Flagship_1_desc: "Гонка военно-морских вооружений привела к появлению всё больших и больших боевых кораблей, и конца этому не видно. Наши флотские инженеры предложили довести эту последовательную эскалацию до логического предела, построив настолько огромный и мощный корабль, что ни одна империя не сможет содержать более одного такого судна одновременно. Предлагаемый флагман станет величайшим боевым кораблём. Благодаря максимальной универсальности каждая его секция сможет иметь множество конфигураций, позволяя нам проектировать флагман под конкретные задачи. Имея гораздо больше двигателей на тонну массы, чем любой другой корабль, флагман сможет занимать любую позицию во флоте — от дальнобойной батареи в тылу до массивного штурмового тарана на острие атаки.\n\nОднако такая мощь и универсальность обойдутся очень дорого. Само строительство флагмана станет грандиозным предприятием, требующим колоссального запаса ресурсов и значительных вложений времени и рабочей силы. После завершения на его содержание будет уходить весь ВВП небольшого звёздного государства; в результате для одобрения проекта потребуется огромное политическое влияние."

tech_supportcruiser_1: "Модернизация эсминца поддержки"
tech_supportcruiser_1_desc: "По мере роста наших флотов и увеличения дальности их походов становится необходимым обеспечивать их поддержку изнутри, а не пытаться поддерживать длинные линии снабжения. Эсминец поддержки — ответ на эту проблему: он расширяет вспомогательные возможности наших эсминцев за счёт установки продвинутых модулей." 

tech_explorationship_1: "Исследователь (уровень 1)"
tech_explorationship_1_desc: "Нашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши флотские инженеры предлагают разработать крупный боеспособный научный корабль, предназначенный для исследования новых миров, поиска новой жизни и новых цивилизаций и для смелых полётов туда, где ещё никто не бывал."

tech_explorationship_2: "Исследователь (уровень 2)"
tech_explorationship_2_desc: "Нашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши флотские инженеры, довольные характеристиками «Исследователя», предлагают разработать более мощный вариант, чтобы ещё лучше защитить наших лучших и талантливейших научных офицеров."

tech_explorationship_3: "Исследователь (уровень 3)"
tech_explorationship_3_desc: "Нашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши флотские инженеры, довольные характеристиками улучшенной формы «Исследователя», предлагают разработать ещё более мощный вариант, чтобы ещё лучше защитить наших лучших и талантливейших научных офицеров."

tech_explorationship_4: "Исследователь (уровень 4)"
tech_explorationship_4_desc: "Нашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши флотские инженеры, довольные характеристиками улучшенной формы «Исследователя», предлагают разработать ещё более мощный вариант, чтобы ещё лучше защитить наших лучших и талантливейших научных офицеров."

tech_drydock_1: "Сухой док звёздной базы"
tech_drydock_1_desc: "Это специально спроектированное сооружение использует передовые технологии для поддержания атмосферного давления внутри верфей, позволяя рабочим легче строить, обслуживать, модернизировать и ремонтировать сразу множество боевых кораблей."

tech_sensorstation_1: "Сенсорная станция"
tech_sensorstation_1_desc: "Сенсорная станция звёздной базы использует продвинутые сенсорные массивы, расширяя наши возможности сбора разведданных на несколько звёздных систем и заранее предупреждая о возможных угрозах у наших границ."

tech_starbase_6: "Звёздная база «Великая цитадель»"
tech_starbase_6_desc: "По мере того как флоты становятся больше и сильнее, нашим звёздным базам и оборонительным сооружениям тоже необходимо наращивать мощь. «Великая цитадель» — это мощная и высокоразвитая станция системной обороны, представляющая собой огромный шаг вперёд по сравнению с нынешними звёздными базами класса «Цитадель». Эти ценные и развитые базы играют важную роль для нашей империи и могут поддерживать широкий спектр сооружений."

tech_starbase_7: "Звёздная база «Солнечный бастион»"
tech_starbase_7_desc: "Финальное улучшение в цепочке звёздных баз, «Солнечный бастион», — это высшая командная и оборонительная станция, крупнейший класс звёздной базы, который вообще возможно построить. Вражеские флоты будут разбиваться об эти громадные оплоты, и каждая такая база является жизненно важным активом нашей империи, защищая самые критические точки на карте галактики."

tech_space_defense_station_2: "Глубококосмическая оборона 2"
tech_space_defense_station_2_desc: "По мере того как флоты становятся больше и сильнее, нашим оборонительным сооружениям тоже необходимо наращивать мощь. Эти расширенные оборонительные станции, представляющие собой улучшение базовых оборонительных платформ, которые мы используем сейчас, позволят нам лучше защищать нашу территорию от вражеских атак."

tech_space_defense_station_3: "Глубококосмическая оборона 3"
tech_space_defense_station_3_desc: "По мере того как флоты становятся больше и сильнее, нашим оборонительным сооружениям тоже необходимо наращивать мощь. Эти расширенные оборонительные сооружения уровня крепости, являющиеся улучшением используемых сейчас оборонительных станций, позволят нам лучше защищать нашу территорию от вражеских атак."

tech_specialcomponents_1: "Продвинутые компоненты боевых кораблей"
tech_specialcomponents_1_desc: "Наши учёные разработали широкий спектр мощных новых модулей, позволяющих усиливать и дополнительно специализировать наши боевые корабли. Теперь остаётся лишь миниатюризировать их, чтобы сделать достаточно компактными для размещения на наших судах."

tech_ship_upkeep_1: "Эффективные линии снабжения флота"
tech_ship_upkeep_1_desc: "Развитие технологий и логистики позволяет нам создавать гораздо более эффективные линии снабжения для наших флотов, тем самым значительно снижая расходы на содержание кораблей."

tech_starbase_upkeep_1: "Эффективное обслуживание звёздных баз"
tech_starbase_upkeep_1_desc: "Развитие технологий и обучения позволяет научить персонал поддержки звёздных баз куда более эффективным методам обслуживания, тем самым значительно снижая расходы на содержание звёздных баз."

tech_singularity_power: "Сингулярная энергия"
tech_singularity_power_desc: "Реактор, работающий на квантовой сингулярности."

tech_bh_power_3: "Продвинутые реакторы флагмана"
tech_bh_power_3_desc: "Реактор, работающий на искусственной чёрной дыре."

tech_bh_power_2: "Улучшенные реакторы флагмана"
tech_bh_power_2_desc: "Реактор, работающий на искусственной чёрной дыре."

tech_optimized_enigmatic_power: "Оптимизированный реактор тёмной материи"
tech_optimized_enigmatic_power_desc: "Усиленный реактор тёмной материи"

tech_graviton_power: "Гравитонный реактор"
tech_graviton_power_desc: "Добавление гравитационных и гравитонных частиц для усиления антиматериальной реакции значительно повышает выработку энергии нашими реакторами."

tech_multidimensional_power: "Многомерный реактор"
tech_multidimensional_power_desc: "Создание моста материи между различными измерениями и альтернативными реальностями позволяет направлять стабильный, хотя и несколько ограниченный, поток вакуумной энергии для питания реакторов нового поколения."

tech_naquadria_power: "Наквадрийный реактор"
tech_naquadria_power_desc: "Специализированный реактор, работающий на древних и редких кристаллах."

nsc_sec_power_core: "Вторичный реактор"
nsc_sec_power_core_desc: "Слот вторичного реактора для станций и крепостей"

tech_nsc_reactor_boosters_1: "Гравитонные усилители"
tech_nsc_reactor_boosters_1_desc: "Открытие гравитонной энергии позволяет устанавливать на наши корабли более эффективные усилители реактора."
tech_nsc_reactor_boosters_2: "Наквадрийные усилители"
tech_nsc_reactor_boosters_2_desc: "Открытие наквадрийной энергии позволяет устанавливать на наши корабли более эффективные усилители реактора."
tech_nsc_reactor_boosters_3: "Сингулярные усилители"
tech_nsc_reactor_boosters_3_desc: "Открытие сингулярной энергии позволяет устанавливать на наши корабли более эффективные усилители реактора."

tech_nsc_dlc_check: "Апокалипсис уже наступил?"
tech_nsc_dlc_check_desc: "Это автоматическая стартовая технология для проверки наличия DLC Apocalypse."

tech_strikecruiser_build_speed: "Стандартизированные схемы ударных крейсеров"
tech_strikecruiser_build_speed_desc: "Установление новых стандартов проектирования и строительства ударных крейсеров значительно повышает эффективность производственного цикла."
tech_strikecruiser_hull_1: "Улучшенные корпуса ударных крейсеров"
tech_strikecruiser_hull_1_desc: "Развитие строительных технологий позволит создавать более прочные и надёжные ударные крейсеры."
tech_strikecruiser_hull_2: "Продвинутые корпуса ударных крейсеров"
tech_strikecruiser_hull_2_desc: "Новейшее поколение корпусов ударных крейсеров оснащено оптимизированными полями структурной целостности и улучшенными переборками."

tech_battlecruiser_build_speed: "Стандартизированные схемы линейных крейсеров"
tech_battlecruiser_build_speed_desc: "Установление новых стандартов проектирования и строительства линейных крейсеров значительно повышает эффективность производственного цикла."
tech_battlecruiser_hull_1: "Улучшенные корпуса линейных крейсеров"
tech_battlecruiser_hull_1_desc: "Развитие строительных технологий позволит создавать более прочные и надёжные линейные крейсеры."
tech_battlecruiser_hull_2: "Продвинутые корпуса линейных крейсеров"
tech_battlecruiser_hull_2_desc: "Новейшее поколение корпусов линейных крейсеров оснащено оптимизированными полями структурной целостности и улучшенными переборками."

tech_carrier_build_speed: "Стандартизированные схемы авианосцев"
tech_carrier_build_speed_desc: "Установление новых стандартов проектирования и строительства авианосцев значительно повышает эффективность производственного цикла."
tech_carrier_hull_1: "Улучшенные корпуса авианосцев"
tech_carrier_hull_1_desc: "Развитие строительных технологий позволит создавать более прочные и надёжные авианосцы."
tech_carrier_hull_2: "Продвинутые корпуса авианосцев"
tech_carrier_hull_2_desc: "Новейшее поколение корпусов авианосцев оснащено оптимизированными полями структурной целостности и улучшенными переборками."

tech_dreadnought_build_speed: "Стандартизированные схемы дредноутов"
tech_dreadnought_build_speed_desc: "Установление новых стандартов проектирования и строительства дредноутов значительно повышает эффективность производственного цикла."
tech_dreadnought_hull_1: "Улучшенные корпуса дредноутов"
tech_dreadnought_hull_1_desc: "Развитие строительных технологий позволит создавать более прочные и надёжные дредноуты."
tech_dreadnought_hull_2: "Продвинутые корпуса дредноутов"
tech_dreadnought_hull_2_desc: "Новейшее поколение корпусов дредноутов оснащено оптимизированными полями структурной целостности и улучшенными переборками."

tech_flagship_build_speed: "Стандартизированные схемы флагманов"
tech_flagship_build_speed_desc: "Установление новых стандартов проектирования и строительства флагмана значительно повышает эффективность производственного цикла."
tech_flagship_hull_1: "Улучшенные корпуса флагманов"
tech_flagship_hull_1_desc: "Развитие строительных технологий позволит создавать более прочные и надёжные флагманы."
tech_flagship_hull_2: "Продвинутые корпуса флагманов"
tech_flagship_hull_2_desc: "Новейшее поколение корпусов флагманов оснащено оптимизированными полями структурной целостности и улучшенными переборками."

tech_stronghold_upgrades: "Улучшенные звёздные базы"
tech_stronghold_upgrades_desc: "Установление новых стандартов проектирования и строительства всех звёздных баз значительно повышает эффективность производственного цикла."

tech_mining_base: "Системный минералообрабатывающий комплекс"
tech_mining_base_desc: "Расширяясь среди звёзд, мы нуждаемся во всё большем количестве ресурсов для поддержания нашей цивилизации. Создание специализированных космических минералообрабатывающих комплексов поможет централизовать производство и повысить эффективность, что приведёт к росту добычи минералов."

tech_power_station: "Системная энергосеть"
tech_power_station_desc: "Растущей звёздной империи требуется всё больше энергии для поддержания своего существования. Создание специализированных космических энергетических объектов позволит централизовать выработку энергии в ключевых системах и лучше обеспечивать энергетические нужды нашего государства."

tech_defense_platforms_1: "Увеличение числа оборонительных платформ — уровень 1"
tech_defense_platforms_1_desc: "Развитие технологий позволяет нам строить больше оборонительных платформ для наших звёздных баз."

tech_defense_platforms_2: "Увеличение числа оборонительных платформ — уровень 2"
tech_defense_platforms_2_desc: "Развитие технологий позволяет нам строить больше оборонительных платформ для наших звёздных баз."

tech_defense_platforms_3: "Увеличение числа оборонительных платформ — уровень 3"
tech_defense_platforms_3_desc: "Развитие технологий позволяет нам строить больше оборонительных платформ для наших звёздных баз."

tech_defense_platforms_4: "Увеличение числа оборонительных платформ — уровень 4"
tech_defense_platforms_4_desc: "Развитие технологий позволяет нам строить больше оборонительных платформ для наших звёздных баз."

tech_nsc_ai_computer_1: "Боевая система искусственного интеллекта"
tech_nsc_ai_computer_1_desc: "Эта чрезвычайно продвинутая компьютерная система способна интеллектуально управлять всеми боевыми системами корабля, не перехватывая штурвал, что позволяет полностью контролировать перемещение в бою. Доступна для авианосцев, кораблей поддержки флота и флагмана."

tech_tomahawk_cruise_missile_1: "Продвинутые крылатые ракеты"
tech_tomahawk_cruise_missile_1_desc: "По мере того как бои ведутся на всё больших дистанциях, а также с появлением массивных крупных кораблей и оборонительных сооружений, возникает явная необходимость в более крупных и мощных ракетах, способных противостоять этим новым угрозам и запускаться с наших собственных кораблей. Эти продвинутые крылатые ракеты и являются ответом на новую потребность."

tech_nsc_disabled_sections: "Отключённые секции кораблей NSC"
tech_nsc_disabled_sections_desc: "Если вы видите эту технологию, значит что-то пошло не так или вы воспользовались консолью."

tech_hospital: "Галактическая центральная больница"
tech_hospital_desc: "Гигантская высокотехнологичная космическая больница, посвящённая изучению различных ксенорас галактики, а также анализу и лечению всех заболеваний и состояний, которым они подвержены."

tech_galactic_mall: "Галактический торговый центр"
tech_galactic_mall_desc: "Крупнейший торговый центр галактики, способный производить огромные объёмы потребительских товаров и обеспечивать идеальный поход за покупками для самых преданных любителей шопинга."

tech_hyperlane_generation: "Генерация гиперлиний"
tech_hyperlane_generation_desc: "Недавние достижения в проектировании гипердвигателей и активации заброшенных Врат позволяют нам разработать методы создания новых гиперлиний и удаления существующих, что наконец даст нам возможность менять географию галактики в соответствии с нашими нуждами."
requires_tech_hyperlane_generation: "§RТребуется технология £physics£ §Y$tech_hyperlane_generation$§!.§!"

