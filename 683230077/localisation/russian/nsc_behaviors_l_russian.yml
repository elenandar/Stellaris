ai_behaviour_stationary_200: "Тактика удержания дистанции (200)"
ai_behaviour_stationary_200_DESC: "Корабли будут отходить на указанную дистанцию (200), после чего удерживать позицию. ВНИМАНИЕ: этот режим оставляет корабль вне обычной дальности оружия, защищая его от большинства атак, но также не позволяя вести огонь. Идеально подходит для кораблей, которым следует по возможности избегать боя."

