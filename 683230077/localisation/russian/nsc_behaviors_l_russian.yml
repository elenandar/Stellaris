ai_behaviour: "Тактика ИИ"
ai_behaviour_DESC: "Слот тактики ИИ."

ai_behaviour_default: "Стандартное поведение"
ai_behaviour_default_DESC: "Использует тактическое поведение, заданное базовым боевым компьютером. Предназначено для использования со стандартными компьютерами.

§GКак использовать:§! §BВыберите этот компьютер, если хотите использовать стандартное поведение в слоте выше и НЕ применять продвинутую тактику. Если же хотите использовать продвинутую тактику для этого класса корабля, сначала выберите стандартный компьютер в слоте выше, а затем выберите тактику в этом слоте.§!

"

ai_behaviour_follow: "Тактика сопровождения"
ai_behaviour_follow_DESC: "Корабли будут следовать за остальным флотом. Сбалансированное поведение по умолчанию."

ai_behaviour_charge: "Тактика сближения"
ai_behaviour_charge_DESC: "Корабли будут стремиться максимально быстро сократить дистанцию до противника и вступить в бой на ближней дистанции."

ai_behaviour_stationary_30: "Артиллерийская тактика (дистанция: 30)"
ai_behaviour_stationary_30_DESC: "Корабли будут сближаться до указанной дистанции (30), после чего удерживать позицию и вести огонь."
