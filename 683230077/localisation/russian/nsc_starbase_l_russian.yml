##################################################################################################################################################################################################################
### STARBASE MODULES & BUILDINGS ###
####################################

stb_shipyard: "Верфь"
stb_shipyard_desc: "Звёздная база, ориентированная на строительство кораблей.\n"

sm_drydock: "Сухой док"
sm_drydock_desc: "Это специально спроектированное сооружение использует передовые технологии для поддержания атмосферного давления внутри верфей, позволяя рабочим легче строить, обслуживать, модернизировать и ремонтировать боевые корабли.\n"
sm_drydock_desc_modifier: "Увеличивает производственную мощность каждого §Y$sm_shipyard$§! на §G1§!\n"

sm_fleet_anchorage: "Флотский док"
sm_fleet_anchorage_desc: "Значительно более крупная версия стандартной якорной стоянки для нашего стремительно растущего флота.\n"
sm_fleet_anchorage_desc_modifier: "§Y$Fleet Capacity$§! +100\n"

sm_sensor_station: "Сенсорная станция"
sm_sensor_station_desc: "Сенсорная станция звёздной базы использует продвинутые сенсорные массивы, расширяя наши возможности сбора разведданных на несколько звёздных систем и заранее предупреждая о возможных угрозах у наших границ.\n"

sm_solar_panel: "Солнечная панель"
sm_solar_panel_desc: "Этот набор солнечных панелей снабжает звёздную базу энергией, помогая компенсировать затраты на содержание комплекса и вырабатывая излишки энергии.\n"

sm_starbase_management: "Администрация звёздной базы"
sm_starbase_management_desc: "Некоторые системы абсолютно критичны для поддержания торговых сетей нашей империи. Администрация звёздной базы — это резиденция очень важного чиновника нашей империи, отвечающего за защиту местных торговых путей и оборону этой ключевой звёздной базы.\n"

sm_customs_office: "Таможенное управление звёздной базы"
sm_customs_office_desc: "Центральный пункт всей иммиграции в системе.\n"

sm_starbase_management_machine: "Узел сети звёздной базы"
sm_starbase_management_machine_desc: "01000101 01110010 01110010 01101111 01110010 00100000 00110100 00110000 00110100 0001010\n"

sm_starbase_management_hive: "Логово звёздной базы"
sm_starbase_management_hive_desc: "Мы едины.\n"

sm_mining_base: "Системный минералообрабатывающий комплекс"
sm_mining_base_desc: "Некоторые системы специализируются на добыче минеральных ресурсов, питающих нашу экономику. Системный минералообрабатывающий комплекс даёт звёздной базе возможность повысить эффективность добычи минералов на всех планетах в пределах системы.\n"

sm_farming_base: "Системный аграрный терминал"
sm_farming_base_desc: "Некоторые системы специализируются на производстве огромных объёмов продовольствия для содержания нашего постоянно растущего населения. Системный аграрный терминал координирует работу всех сельскохозяйственных предприятий звёздной системы, повышая урожайность на всех затронутых планетах.\n"

sm_power_station: "Системная энергосеть"
sm_power_station_desc: "Некоторые системы специализируются на выработке энергии, необходимой для функционирования любой цивилизации. Системная энергосеть координирует все усилия по производству энергии в системе, повышая эффективность работы техников на всех планетах звёздной системы.\n"

sm_artifact_silo: "Хранилище малых артефактов"
sm_artifact_silo_desc: "Этот специализированный силос может использоваться для хранения малых артефактов на звёздной базе.\n"

sm_public_plaza: "Общественная площадь"
sm_public_plaza_desc: "Прекрасная площадь, где жители могут собираться и отдыхать."

sm_fleet_club: "Клуб флотских офицеров"
sm_fleet_club_desc: "Место отдыха и восстановления сил, предназначенное специально для офицеров флота."

sm_storage_room: "Складское помещение"
sm_storage_room_desc: "Небольшое складское помещение для различных ресурсов."

sm_nightclub: "Ночной клуб"
sm_nightclub_desc: "Нет вечеринки лучше вечеринки на звёздной базе, потому что вечеринка на звёздной базе не заканчивается никогда."

sm_public_market: "Общественный рынок"
sm_public_market_desc: "Крупный торговый рынок, доступный широкой публике."



##################################################################################################################################################################################################################
### STARBASE EXTENDED ###
#########################

 sm_shield_module: "Генератор щитов"
 sm_shield_module_desc: "Добавляет звёздной базе больше щитов.\n"

 sm_armor_module: "Бронеплиты"
 sm_armor_module_desc: "Добавляет звёздной базе больше брони.\n"

 sm_pd_battery: "Система ПКО"
 sm_pd_battery_desc: "Добавляет звёздной базе четыре слота оружия ПКО.\n"

 sm_gun_battery: "Орудийная батарея"
 sm_gun_battery_desc: "Добавляет звёздной базе два слота среднего оружия.\n"

 sm_missile_battery: "Торпедная батарея"
 sm_missile_battery_desc: "Добавляет звёздной базе два слота торпедного оружия.\n"

 sm_large_battery: "Тяжёлая батарея"
 sm_large_battery_desc: "Добавляет звёздной базе два слота крупного оружия.\n"

 sm_xl_battery: "Сверхтяжёлая батарея"
 sm_xl_battery_desc: "Добавляет звёздной базе один слот сверхтяжёлого оружия.\n\n§YПРЕДУПРЕЖДЕНИЕ: лимит постройки — 5 таких модулей на одну звёздную базу.§!\n"

 sm_titanic_battery: "Титаническая батарея"
 sm_titanic_battery_desc: "Добавляет звёздной базе один слот титанического оружия.\n\n§YПРЕДУПРЕЖДЕНИЕ: лимит постройки — 2 таких модуля на одну звёздную базу.§!\n"

 sm_construction_office: "Строительное управление звёздной базы"
 sm_construction_office_desc: "Повышает эффективность, с которой звёздная база строит модули, здания и улучшения.\n"

 sm_planetary_construction_office: "Планетарное строительное управление"
 sm_planetary_construction_office_desc: "Повышает эффективность строительства зданий на планетах.\n"

 sm_asteroid_mining: "Астероидная добывающая команда"
 sm_asteroid_mining_desc: "Команда, добывающая ресурсы на дрейфующих астероидах, слишком малых для обычной добывающей станции. Наличие §Gуправляющего астероидной добычей§! повышает выработку на §Y2 минерала§! £minerals.\n"

 sm_mining_manager: "Управляющий астероидной добычей"
 sm_mining_manager_desc: "Управляющий, повышающий эффективность каждой астероидной добывающей команды. Повышает выработку каждой §Gастероидной добывающей команды§! на §Y2 минерала§! £minerals.\n"

 sm_solar_capacitor: "Солнечные накопители"
 sm_solar_capacitor_desc: "Система накопителей, повышающая эффективность выработки энергии солнечными панелями.\n\nПроизводство §Yсолнечной панели§!: §G+2 энергии§! £energy\n\n\nСодержание §Yсолнечной панели§!: §R+1 минерал§! £minerals  (для гештальтов) и  §R+1 потребительский товар§! £consumer_goods£  (для негештальтов)\n"

 sm_reinforced_defenses: "Укреплённая оборона звёздной базы"
 sm_reinforced_defenses_desc: "Улучшает щиты и броню звёздной базы.\n"

 sm_strategic_defenses: "Стратегическая оборона звёздной базы"
 sm_strategic_defenses_desc: "Улучшает щиты и вооружение звёздной базы.\n"

 sm_adv_starbase_defenses: "Продвинутая оборона звёздной базы"
 sm_adv_starbase_defenses_desc: "Улучшает броню и вооружение звёздной базы.\n"

 sm_orbital_lab: "Орбитальная исследовательская лаборатория"
 sm_orbital_lab_desc: "Продвинутая исследовательская лаборатория. Наличие §Gвспомогательной лаборатории§! повысит объём исследований.\n"

 sm_orbital_physics_support_lab: "Физическая вспомогательная лаборатория"
 sm_orbital_physics_support_lab_desc: "Лаборатория, специализирующаяся на физических исследованиях. Повышает выработку каждой §Gорбитальной исследовательской лаборатории§! на §Y2 физических исследования§!.\n"

 sm_orbital_society_support_lab: "Социологическая вспомогательная лаборатория"
 sm_orbital_society_support_lab_desc: "Лаборатория, специализирующаяся на общественных исследованиях. Повышает выработку каждой §Gорбитальной исследовательской лаборатории§! на §Y2 общественных исследования§!.\n"

 sm_orbital_engineering_support_lab: "Инженерная вспомогательная лаборатория"
 sm_orbital_engineering_support_lab_desc: "Лаборатория, специализирующаяся на инженерных исследованиях. Повышает выработку каждой §Gорбитальной исследовательской лаборатории§! на §Y2 инженерных исследования§!.\n"

 sm_ground_forces_academy: "Академия наземных войск"
 sm_ground_forces_academy_desc: "Повышает эффективность набора и подготовки наземных армий.\n"

 sm_repair_module: "Ремонтный комплекс"
 sm_repair_module_desc: "Комплекс, специализирующийся на быстром ремонте кораблей на орбите звёздной базы.\n"

 sm_space_foundry: "Космическая литейная"
 sm_space_foundry_desc: "Космическая литейная перерабатывает минералы в сплавы. Наличие §Gконвейерного производства§! повысит выработку на §Y1 сплав§!  £alloys.\n"

 sm_space_factory: "Космическая фабрика"
 sm_space_factory_desc: "Космическая фабрика перерабатывает минералы в потребительские товары. Наличие §Gконвейерного производства§! повысит выработку на §Y2 потребительских товара§!  £consumer_goods.\n"

 sm_security_branch_office: "Офис службы безопасности"
 sm_security_branch_office_desc: "Офис службы безопасности сосредоточится на защите ваших торговых путей от местного пиратства.\n"

 sm_administration_office: "Административное управление"
 sm_administration_office_desc: "Помогает в задачах управления на уровне империи, повышая административные возможности империи.\n"

 sm_synthetic_crystal_fabricator: "Производство синтетических кристаллов"
 sm_synthetic_crystal_fabricator_desc: "Особый перерабатывающий комплекс, превращающий минералы в редкие кристаллы.\n"

 sm_synthetic_volatile_motes_fabricator: "Производство синтетических летучих пылинок"
 sm_synthetic_volatile_motes_fabricator_desc: "Особый перерабатывающий комплекс, превращающий минералы в летучие пылинки.\n"

 sm_synthetic_gase_fabricator: "Производство синтетических газов"
 sm_synthetic_gase_fabricator_desc: "Особый перерабатывающий комплекс, превращающий минералы в экзотические газы.\n"

 sm_robot_assembly: "Комплекс сборки роботов"
 sm_robot_assembly_desc: "Создаёт роботизированные поселения и автоматически направляет их в колонии системы.\n"

 sm_assembly_line_manufacturing: "Конвейерное производство"
 sm_assembly_line_manufacturing_desc: "Помогает в производстве сплавов и потребительских товаров как в космосе, так и на планетах. Также повышает выработку каждой §Gкосмической литейной§! на §Y1 сплав§!  £alloys  и каждой §Gкосмической фабрики§! на §Y2 потребительских товара§!  £consumer_goods.\n" 

 sm_federal_reserve_bank: "Центральный резервный банк"
 sm_federal_reserve_bank_desc: "Крупный финансовый банк, способствующий улучшению торговли в системе.\n"

 sm_cloning_facilities: "Клонирующие комплексы"
 sm_cloning_facilities_desc: "Комплексы, повышающие рост населения по всей системе ценой снижения счастья населения.\n"

 sm_navcom_ai: "Навигационный ИИ"
 sm_navcom_ai_desc: "Чрезвычайно продвинутая навигационная система, способная быстро рассчитывать координаты для экстренных прыжков. Повышает шанс кораблей успешно выйти из боя.\n"

 sm_starbase_ai: "Искусственный интеллект звёздной базы"
 sm_starbase_ai_desc: "Чрезвычайно продвинутый ИИ-компьютер, способный улучшить атакующие, оборонительные и торгово-защитные возможности звёздной базы.\n"

 sm_tv_studio: "Развлекательная телестудия"
 sm_tv_studio_desc: "Телестудия, производящая развлекательные программы для жителей всей системы, повышая планетарные удобства.\n"

 sm_real_estate_dev: "Агентство недвижимости"
 sm_real_estate_dev_desc: "Офис, в котором агенты по недвижимости помогают гражданам находить подходящие места для новых домов. Увеличивает доступное жильё на планетах.\n"

 sm_tv_network: "Телевизионная новостная сеть"
 sm_tv_network_desc: "Телестудия, производящая новостные программы для жителей всей системы, повышая планетарную стабильность. Хотите узнать больше?\n"

 POINT_DEFENCE_STARBASE: "Автоматизированная оборонительная система"
 POINT_DEFENCE_STARBASE_DESC: "Автоматизированная оборонительная система"
 CITADEL_DARK_MATTER_REACTOR: "Реактор тёмной материи"
 CITADEL_DARK_MATTER_REACTOR_DESC: "Реактор тёмной материи"
