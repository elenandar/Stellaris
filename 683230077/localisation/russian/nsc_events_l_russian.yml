##################################################################################################################################################################################################################
### Explorer EVENTS ###
##################################

EXPLORATION_CRUISER_UPGRADE_PROJECT: "Проект модернизации научного корабля"
EXPLORATION_CRUISER_UPGRADE_PROJECT_DESC: "Наши флотские инженеры готовы приступить к грандиозной задаче по переоборудованию одного из имеющихся у нас научных кораблей в новый класс «Исследователь». Ожидается, что выполнение этого проекта займёт приблизительно 250 дней. По завершении учёный-лидер этого корабля автоматически перейдёт на новое судно."

nsc_events_exploration_ship.3.name: "Прототип «Исследователя»"
nsc_events_exploration_ship.3.desc: "Нашим отважным научным офицерам приходилось сталкиваться с невероятными опасностями в стремлении исследовать галактику и раскрыть все её тайны. Наши корабельные инженеры совместно с учёными работали над решением этой проблемы. Похоже, мы наконец нашли ответ.\n\n«Исследователь» — это крупный научный корабль, способный участвовать в бою и предназначенный для изучения новых миров, а также поиска новой жизни и новых цивилизаций. Нашим учёным больше не придётся бояться ужасов пустоты!"

nsc_events_exploration_ship.3.a: "Превосходно, мы смело отправимся туда, где ещё никто не бывал!"

nsc_events_exploration_ship.10.name: "Модернизация научного флота"
nsc_events_exploration_ship.10.desc: "Теперь, когда мы завершили окончательный проект «Исследователя», наша служба флотской логистики хотела бы узнать, желаете ли вы модернизировать наш флот научных кораблей до этой новой, улучшенной модели. Модернизация каждого корабля займёт примерно §G250 дней§! и потребует вложения §B400 сплавов§! и §Y50 энергии§! на корабль, но даст нашим ведущим учёным-исследователям гораздо больше шансов на выживание во всё более враждебной Вселенной. Мы можем модернизировать до 8 научных кораблей до нового класса. Для каждого корабля, который вы захотите модернизировать, будет создан особый проект, для начала которого этот корабль потребуется переместить в нашу родную систему. Срока завершения этих проектов нет. Мы ждём вашего решения."

nsc_events_exploration_ship.10.1: "Выбрать модернизацию §Y1§! корабля. (§Y50 энергии§! и §B400 сплавов§!)"
nsc_events_exploration_ship.10.2: "Выбрать модернизацию §Y2§! кораблей. (§Y100 энергии§! и §B800 сплавов§!)"
nsc_events_exploration_ship.10.3: "Выбрать модернизацию §Y3§! кораблей. (§Y150 энергии§! и §B1200 сплавов§!)"
nsc_events_exploration_ship.10.4: "Выбрать модернизацию §Y4§! кораблей. (§Y200 энергии§! и §B1600 сплавов§!)"
nsc_events_exploration_ship.10.5: "Выбрать модернизацию §Y5§! кораблей. (§Y250 энергии§! и §B2000 сплавов§!)"
nsc_events_exploration_ship.10.6: "Выбрать модернизацию §Y6§! кораблей. (§Y300 энергии§! и §B2400 сплавов§!)"
nsc_events_exploration_ship.10.7: "Выбрать модернизацию §Y7§! кораблей. (§Y350 энергии§! и §B2800 сплавов§!)"
nsc_events_exploration_ship.10.8: "Выбрать модернизацию §Y8§! кораблей. (§Y400 энергии§! и §B3200 сплавов§!)"
nsc_events_exploration_ship.10.end: "Не модернизировать ни одного корабля. (§M+25 влияния§!)"

nsc_events_exploration_ship.11.name: "Модернизация научного корабля завершена"
nsc_events_exploration_ship.11.desc: "Мы завершили проект модернизации научного корабля. Учёный-лидер занял свой пост, и новый корабль теперь ожидает ваших приказов."

##################################################################################################################################################################################################################
### FLAGSHIP EVENT CHAIN ###
############################

nsc_flagship_cannot_be_acquired_by_conventional_means.tooltip.fail: "§R$TRIGGER_FAIL$§! Из-за своих размеров и сложности корабль класса «Флагман» может быть построен только мегасооружением $nsc_flagship_shipyard$."

nsc_flagship_shipyard: "Великая верфь"
nsc_flagship_shipyard_DESC: "Эта колоссальная космическая станция необходима для строительства крупнейшего и смертоноснейшего боевого корабля, который когда-либо видела галактика."

nsc_flagship_shipyard_MEGASTRUCTURE_DETAILS: "$nsc_flagship_shipyard_DESC$"
requires_no_existing_nsc_grand_shipyard:0 "$TRIGGER_FAIL$Нельзя построить более одной $nsc_flagship_shipyard$."
requires_no_existing_nsc_flagship: "£trigger_no£ Нельзя построить более одного флагмана."
can_not_start_another_nsc_flagship_building: "£trigger_no£ Нельзя начать ещё один проект строительства флагмана."

nsc_flagship_shipyard_complete: "Великая верфь"
nsc_flagship_shipyard_complete_DESC: "На этой огромной верфи базируется могучий флагман нашей империи."

nsc_events_flagship.1.name: "Великая верфь готова к строительству"
nsc_events_flagship.1.desc: "Проект огромной верфи, необходимой для строительства флагмана, завершён. Мы можем начать возведение сборочного комплекса, однако нашим флотским инженерам необходимо утвердить один — и только один — проект этого поистине исполинского корабля. Мы сможем построить лишь один флагман, поэтому, хотя после постройки судно можно будет переоборудовать и модернизировать, до начала строительства нам необходимо определиться с единственным окончательным проектом."
nsc_events_flagship.1.a: "Корабль, способный переломить ход войны..."

nsc_events_flagship.3.name: "Секрет больше не секрет"
nsc_events_flagship.3.desc: "Строительство нашего могучего флагмана, разумеется, засекречено на самом высоком доступном уровне, и мы потратили немало времени, усилий и ресурсов, чтобы окутать этот проект тайной.\n\nОднако, несмотря на все наши героические попытки сохранить строительство в строжайшем секрете, столь масштабный проект практически невозможно скрыть, и иностранные державы галактики уже некоторое время о нём знают. Они не собираются бездействовать, пока мы в одиночку меняем облик межзвёздной войны. Наши агенты сообщают, что многие империи уже начали строительство собственных флагманов, надеясь сохранить баланс сил в галактике.\n\nНачалась новая гонка вооружений."
nsc_events_flagship.3.a: "Неприятно, но вполне ожидаемо."

nsc_events_flagship.4.name: "Абсолютная мощь Вселенной"
nsc_events_flagship.4.desc: "После долгих лет работы, расходования колоссальных объёмов ресурсов, строительства невероятной верфи и затраты значительного политического капитала флагман наконец завершён и полностью введён в строй. Это совершенный боевой корабль, способный уничтожать вражеские флоты и переламывать ход целых войн.\n\nПоявление этого громадного нового военного корабля стало шоком для граждан нашей собственной империи, как и для масс чужеродных ксеносов. Но, как и указывали предыдущие разведданные, их правительства не были застигнуты врасплох и уже готовились противостоять нашему могучему новому оружию. Разведка сообщает, что несколько империй полным ходом спешат наладить производство собственных флагманов."
nsc_events_flagship.4.a: "Превосходно."

nsc_events_flagship.6.name: "Выравнивание сил"
nsc_events_flagship.6.desc: "Наши агенты теперь сообщают, что несколько иностранных держав уже ввели в строй собственные полностью боеготовые флагманы, пытаясь не отстать в морской гонке вооружений. Теперь в галактике существует несколько таких исполинских кораблей, каждый из которых несёт достаточно огневой мощи, чтобы сокрушить целый флот. Хотя огромные затраты на постройку и содержание этих судов не позволят ни одной державе иметь более одного флагмана, их невероятная мощь наверняка повлияет на любой будущий вооружённый конфликт, в котором они примут участие."
nsc_events_flagship.6.a: "Понятно."

nsc_events_flagship.7.name: "Эпическая катастрофа"
nsc_events_flagship.7.desc: "Наш флагман, гордость нашего флота, славный символ мощи нашей империи, уничтожен!\n\nПотрясение от такой ужасной катастрофы невозможно переоценить. Общество возлагало огромные надежды на способность нашего флагмана защищать нас, а в нашей пропаганде ему отводилось важнейшее место как источнику вдохновения для граждан. В ближайшие дни, недели и годы многие наверняка станут задаваться вопросом о тех командных решениях, которые привели к гибели самого мощного боевого корабля, когда-либо созданного нашей империей.\n\nТеперь, когда нам больше не нужно тратить значительные ресурсы на содержание флагмана, у нас появится возможность построить новый, хотя для этого снова потребуется столь же масштабный особый проект, как и прежде, — и нам следует позаботиться о том, чтобы не потерять и следующий флагман. Пересмотр нашей военно-морской стратегии определённо необходим."
nsc_events_flagship.7.a: "Понятно, мы скоро начнём проект."

nsc_events_flagship.8.name: "Добровольное разоружение"
nsc_events_flagship.8.desc: "Существование таких могучих супероружий, как флагман, вызывает мощный резонанс. Содержание подобных невероятных кораблей обходится очень дорого, а сам факт их существования служит символом воинственного курса государства, что может повышать международную напряжённость и ускорять гонку морских вооружений.\n\nПо экономическим или политическим причинам вы, наш уважаемый [Root.GetRulerTitle], решили разобрать флагман, хотя верфь остаётся в рабочем состоянии. Можно вложить значительные ресурсы и немедленно начать строительство нового флагмана, хотя столь масштабный проект будет трудно сохранить в тайне — впрочем, теперь это несколько проще, поскольку сами огромные верфи уже существуют, — а обоснованность разборки и последующего восстановления столь грандиозного проекта, мягко говоря, сомнительна. В любом случае для этого потребуется особый проект.\n\nС другой стороны, если благоразумнее подождать и сохранить свободу действий на будущее, теперь доступен указ о восстановлении флагмана — на тот случай, когда строительство нового флагмана вновь станет необходимым или желательным."
nsc_events_flagship.8.a: "Мы восстановим флагман, когда он снова понадобится."

nsc_events_flagship.9.name: "Новый флагман завершён"
nsc_events_flagship.9.desc: "Наш новый флагман наконец завершён и готов к спуску. Будем надеяться, что его не постигнет та же мрачная участь, что и предыдущий, — в конце концов, такие корабли не дёшевы и не заменяются быстро, а их потеря наносит колоссальный удар по нашему боевому духу и военной мощи. Флагман — самое могущественное оружие в нашем арсенале, и обращаться с ним следует осторожно.\n\nМы не должны подвести наш народ."
nsc_events_flagship.9.a: "Мы больше не потерпим неудачи."

##################################################################################################################################################################################################################
### FLAGSHIP DUEL EVENT ###
###########################

nsc_events_flagship.10.name: "Легендарная битва"
nsc_events_flagship.10.desc: "С самого зарождения проекта «Флагман», ещё до того как была построена колоссальная верфь для сборки этого судна, многие военно-морские теоретики предполагали, что, подобно тому как прежние достижения привели к сосредоточению на столкновениях тяжёлых кораблей, новая фаза морской гонки вооружений однажды приведёт к встрече вражеских флагманов на поле боя. Некоторые даже утверждали, что единственным реальным способом противостоять флагману станет другой флагман, что делало такие столкновения неизбежными.\n\nЭтот день наконец настал. Наш флагман вот-вот вступит в бой с вражеским флагманом, и небеса содрогнутся от их мощи. Обе державы вложили огромные ресурсы в разработку своих флагманов и как минимум частично выстроили военные доктрины вокруг этих могучих кораблей. Теперь вся галактика увидит результат — на кону баланс сил в галактике, а также будущее военно-морской мысли и войны."
nsc_events_flagship.10.a: "К славе!"
