mod_light_ship_focus: "Ставка на лёгкие корабли"
mod_light_ship_focus_desc: "Политика, ориентированная на флот быстрых лёгких боевых кораблей. Даёт +20% к скорости строительства и -20% к стоимости строительства корветов, эсминцев и крейсеров, но поскольку наши верфи будут сосредоточены на этих типах кораблей, более крупные классы будут строиться на 20% медленнее и стоить на 20% дороже."
mod_versatility_focus: "Ставка на крейсеры"
mod_versatility_focus_desc: "Политика, ориентированная на флот боевых кораблей среднего размера. Даёт +20% к скорости строительства и -20% к стоимости строительства крейсеров, ударных крейсеров и линейных крейсеров, но поскольку наши верфи будут сосредоточены на этих типах кораблей, остальные классы будут строиться на 20% медленнее и стоить на 20% дороже."
mod_capital_focus: "Ставка на крупные корабли"
mod_capital_focus_desc: "Политика, ориентированная на флот крупных и мощных боевых кораблей. Даёт +20% к скорости строительства и -20% к стоимости строительства линкоров, авианосцев, дредноутов и титанов, но поскольку наши верфи будут сосредоточены на этих типах кораблей, более мелкие классы будут строиться на 20% медленнее и стоить на 20% дороже."
mod_carrier_focus: "Ставка на авианосцы"
mod_carrier_focus_desc: "Политика, ориентированная на флот авианосцев, оснащённых большим числом штурмовиков. Даёт +35% к скорости строительства и -35% к стоимости строительства эскортных авианосцев и авианосцев, но поскольку наши верфи будут сосредоточены на этих типах кораблей, остальные классы будут строиться на 20% медленнее и стоить на 20% дороже."

